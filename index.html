<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>王者小游戏 · 轻量玩法合集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#D4A84B;--dark:#1A1A2E;--red:#E74C3C;--blue:#3498DB;
  --bg:#0a0a1a;--card-bg:rgba(26,26,46,0.85);--text:#f5f5f5;--text-dim:#8a8a9a;
}
html,body{width:100%;height:100%;overflow-x:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  -webkit-font-smoothing:antialiased;touch-action:pan-y;user-select:none;-webkit-user-select:none}

/* Header */
.header{padding:16px 20px 8px;text-align:center;position:relative}
.header h1{font-size:22px;color:var(--gold);text-shadow:0 0 20px rgba(212,168,75,0.4);letter-spacing:2px;margin-bottom:2px}
.header .subtitle{font-size:12px;color:var(--text-dim);letter-spacing:1px}

/* Season Banner */
.season-banner{margin:12px 16px;padding:14px 18px;border-radius:14px;
  background:linear-gradient(135deg,rgba(212,168,75,0.15),rgba(212,168,75,0.05));
  border:1px solid rgba(212,168,75,0.25);display:flex;justify-content:space-between;align-items:center}
.season-info .season-name{font-size:16px;font-weight:700;color:var(--gold)}
.season-info .season-desc{font-size:11px;color:var(--text-dim);margin-top:2px}
.season-timer{text-align:right}
.season-timer .label{font-size:10px;color:var(--text-dim);margin-bottom:2px}
.season-timer .time{font-size:14px;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums}

/* Game Cards Grid */
.games-grid{padding:8px 16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.game-card{position:relative;border-radius:16px;overflow:hidden;aspect-ratio:3/4;cursor:pointer;
  background:var(--card-bg);border:1px solid rgba(255,255,255,0.06);
  transition:transform 0.2s,box-shadow 0.2s;-webkit-tap-highlight-color:transparent}
.game-card:active{transform:scale(0.96)}
.game-card:hover{box-shadow:0 4px 24px rgba(212,168,75,0.2)}

/* Card Background Image */
.card-bg{position:absolute;inset:0;background-size:cover;background-position:center;
  filter:blur(2px) brightness(0.35);transform:scale(1.05)}

/* Card Content */
.card-content{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:16px 10px;text-align:center}
.card-avatar{width:64px;height:64px;border-radius:50%;border:3px solid var(--gold);
  box-shadow:0 0 16px rgba(212,168,75,0.4);margin-bottom:10px;object-fit:cover;
  background:var(--dark)}
.card-title{font-size:15px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.8);
  margin-bottom:3px;letter-spacing:1px}
.card-genre{font-size:11px;color:var(--gold);opacity:0.9;margin-bottom:10px}
.card-best{font-size:11px;color:var(--text-dim)}
.card-best span{color:var(--gold);font-weight:700;font-size:13px}

/* Full-width card for the 5th game */
.game-card.full-width{grid-column:1/-1;aspect-ratio:2/1}

/* Leaderboard Section */
.section-title{padding:20px 20px 10px;font-size:14px;color:var(--text-dim);letter-spacing:1px;
  text-transform:uppercase;border-top:1px solid rgba(255,255,255,0.05);margin-top:8px}
.leaderboard-preview{margin:0 16px 24px;padding:14px 16px;border-radius:14px;
  background:var(--card-bg);border:1px solid rgba(255,255,255,0.06)}
.lb-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.lb-row:last-child{border-bottom:none}
.lb-rank{width:28px;font-size:14px;font-weight:700;text-align:center}
.lb-rank.top1{color:#FFD700}.lb-rank.top2{color:#C0C0C0}.lb-rank.top3{color:#CD7F32}
.lb-game{flex:1;font-size:13px;margin-left:8px}
.lb-score{font-size:13px;font-weight:700;color:var(--gold)}

/* Footer */
.footer{text-align:center;padding:20px;color:var(--text-dim);font-size:11px;opacity:0.5}

/* Landscape warning */
@media(orientation:landscape)and(max-height:500px){
  body::after{content:'📱 请竖屏使用';position:fixed;inset:0;z-index:99999;
    display:flex;align-items:center;justify-content:center;background:var(--bg);
    color:var(--gold);font-size:20px}
}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.game-card{animation:fadeUp 0.5s ease-out both}
.game-card:nth-child(1){animation-delay:0.05s}
.game-card:nth-child(2){animation-delay:0.1s}
.game-card:nth-child(3){animation-delay:0.15s}
.game-card:nth-child(4){animation-delay:0.2s}
.game-card:nth-child(5){animation-delay:0.25s}

/* Safe area */
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

/* Loading */
.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;transition:opacity 0.4s}
.loading.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:36px;height:36px;border:3px solid rgba(212,168,75,0.2);
  border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:12px;color:var(--text-dim);font-size:13px}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">加载中...</div>
</div>

<div id="app" style="opacity:0;transition:opacity 0.4s">
  <div class="header">
    <h1>王者小游戏</h1>
    <div class="subtitle">轻量玩法合集 · 点开即玩</div>
  </div>

  <div class="season-banner" id="seasonBanner">
    <div class="season-info">
      <div class="season-name" id="seasonName">—</div>
      <div class="season-desc" id="seasonDesc">—</div>
    </div>
    <div class="season-timer">
      <div class="label">赛季剩余</div>
      <div class="time" id="seasonTime">—</div>
    </div>
  </div>

  <div class="games-grid" id="gamesGrid"></div>

  <div class="section-title">个人纪录</div>
  <div class="leaderboard-preview" id="bestScores"></div>

  <div class="footer">王者小游戏 · 碎片时间即时娱乐</div>
</div>

<script type="module">
import { loadHeroList, preloadAvatars, preloadSkin, getAvatarUrl, getSkinUrl, GAME_HEROES } from './shared/heroes.js';
import { getCurrentSeason, getSeasonTimeRemaining } from './shared/season.js';
import { getPersonalBest } from './shared/leaderboard.js';

// ─── Game Definitions ───
const GAMES = [
  {
    id: 'hook',
    title: '钟馗·黄金矿工',
    genre: '经典街机 · 单指操作',
    hero: GAME_HEROES.ZHONGKUI,
    url: 'games/hook/index.html',
    color: '#5BC0EB',
  },
  {
    id: 'slash',
    title: '兰陵王·暗影刺客',
    genre: '水果忍者 · 滑屏切割',
    hero: GAME_HEROES.LANLINGWANG,
    url: 'games/slash/index.html',
    color: '#9B59B6',
  },
  {
    id: 'dodge',
    title: '貂蝉·弹幕舞步',
    genre: '弹幕躲避 · 摇杆操控',
    hero: GAME_HEROES.DIAOCHAN,
    url: 'games/dodge/index.html',
    color: '#E74C8B',
  },
  {
    id: 'shoot',
    title: '马可波罗·枪林弹雨',
    genre: '双摇杆射击 · 生存挑战',
    hero: GAME_HEROES.MARKOPOLO,
    url: 'games/shoot/index.html',
    color: '#E67E22',
  },
  {
    id: 'rhythm',
    title: '李白·青莲剑歌',
    genre: '音乐节奏 · 节拍挑战',
    hero: GAME_HEROES.LIBAI,
    url: 'games/rhythm/index.html',
    color: '#1ABC9C',
    fullWidth: true,
  },
];

// ─── Init ───
async function init() {
  // Load hero data & preload avatars
  await loadHeroList();
  const heroIds = GAMES.map(g => g.hero);
  await preloadAvatars(heroIds);

  // Preload skin images for card backgrounds (non-blocking)
  GAMES.forEach(g => preloadSkin(g.hero, 1));

  // Season
  updateSeason();
  setInterval(updateSeason, 60000);

  // Render game cards
  renderGameCards();

  // Render personal best scores
  renderBestScores();

  // Show app
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').style.opacity = '1';
}

function updateSeason() {
  const season = getCurrentSeason();
  const remaining = getSeasonTimeRemaining();
  document.getElementById('seasonName').textContent = `赛季 · ${season.name}`;
  document.getElementById('seasonDesc').textContent = season.description;
  document.getElementById('seasonTime').textContent =
    `${remaining.days}天 ${remaining.hours}时 ${remaining.minutes}分`;

  // Apply season color to banner border
  const banner = document.getElementById('seasonBanner');
  banner.style.borderColor = season.colorScheme.primary + '40';
  banner.style.background = `linear-gradient(135deg, ${season.colorScheme.primary}18, ${season.colorScheme.primary}08)`;
}

function renderGameCards() {
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = '';

  GAMES.forEach(game => {
    const card = document.createElement('div');
    card.className = 'game-card' + (game.fullWidth ? ' full-width' : '');
    card.onclick = () => { window.location.href = game.url; };

    const skinUrl = getSkinUrl(game.hero, 1);
    const avatarUrl = getAvatarUrl(game.hero);
    const bestEntry = getPersonalBest(game.id);
    const bestText = bestEntry !== null ? `最高分 <span>${formatNum(bestEntry.score)}</span>` : '尚未挑战';

    card.innerHTML = `
      <div class="card-bg" style="background-image:url('${skinUrl}')"></div>
      <div class="card-content">
        <img class="card-avatar" src="${avatarUrl}" alt="${game.title}" onerror="this.style.background='var(--gold)'">
        <div class="card-title">${game.title}</div>
        <div class="card-genre">${game.genre}</div>
        <div class="card-best">${bestText}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function renderBestScores() {
  const container = document.getElementById('bestScores');
  let html = '';

  GAMES.forEach((game, i) => {
    const bestEntry2 = getPersonalBest(game.id);
    const rankClass = i < 3 ? ` top${i + 1}` : '';
    html += `
      <div class="lb-row">
        <div class="lb-rank${rankClass}">${i + 1}</div>
        <div class="lb-game">${game.title}</div>
        <div class="lb-score">${bestEntry2 !== null ? formatNum(bestEntry2.score) : '—'}</div>
      </div>
    `;
  });

  container.innerHTML = html;
}

function formatNum(n) {
  return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

init().catch(err => {
  console.error('Init failed:', err);
  document.getElementById('loading').innerHTML =
    '<div style="color:#E74C3C;font-size:14px;text-align:center;padding:20px">加载失败，请刷新页面</div>';
});
</script>
</body>
</html>
