<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<title>王者小游戏 · 轻量玩法合集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#D4A84B;--dark:#1A1A2E;--red:#E74C3C;--blue:#3498DB;
  --bg:#0a0a1a;--card-bg:rgba(26,26,46,0.92);--text:#f5f5f5;--text-dim:#8a8a9a;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
}
html{height:100%;background:var(--bg)}
body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;
  padding:var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
  overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}

/* Header */
.header{padding:20px 20px 6px;text-align:center;position:relative}
.header h1{font-size:24px;color:var(--gold);text-shadow:0 0 24px rgba(212,168,75,0.35);
  letter-spacing:3px;font-weight:800}
.header .subtitle{font-size:12px;color:var(--text-dim);letter-spacing:1px;margin-top:4px}

/* Mute toggle */
.mute-btn{position:absolute;right:16px;top:20px;width:36px;height:36px;border:none;
  background:rgba(255,255,255,0.08);border-radius:50%;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);
  transition:background 0.15s;-webkit-tap-highlight-color:transparent}
.mute-btn:active{background:rgba(255,255,255,0.16)}

/* Season Pill */
.season-pill{margin:14px 20px;display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-radius:12px;
  background:linear-gradient(135deg,rgba(212,168,75,0.12),rgba(212,168,75,0.04));
  border:1px solid rgba(212,168,75,0.2)}
.season-pill .name{font-size:14px;font-weight:700;color:var(--gold)}
.season-pill .timer{font-size:12px;color:var(--text-dim);font-variant-numeric:tabular-nums}

/* Game List */
.game-list{padding:6px 16px 20px;display:flex;flex-direction:column;gap:14px}

/* Game Card — horizontal layout */
.game-card{display:flex;align-items:center;gap:14px;padding:14px;border-radius:16px;
  background:var(--card-bg);border:1px solid rgba(255,255,255,0.06);
  position:relative;overflow:hidden;cursor:pointer;
  transition:transform 0.15s ease,box-shadow 0.15s ease;
  -webkit-tap-highlight-color:transparent;min-height:88px}
.game-card:active{transform:scale(0.97);box-shadow:0 0 0 2px var(--gold)}

/* Card BG image — subtle */
.game-card .card-bg{position:absolute;inset:0;background-size:cover;background-position:center right;
  opacity:0.15;filter:blur(1px);pointer-events:none}

/* Avatar */
.game-card .avatar{width:56px;height:56px;min-width:56px;border-radius:50%;
  border:2.5px solid var(--gold);box-shadow:0 0 12px rgba(212,168,75,0.3);
  object-fit:cover;background:var(--dark);position:relative;z-index:1}

/* Card Info */
.card-info{flex:1;position:relative;z-index:1;min-width:0}
.card-info .title{font-size:16px;font-weight:700;color:#fff;
  text-shadow:0 1px 6px rgba(0,0,0,0.6);line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-info .genre{font-size:11px;color:var(--gold);margin-top:2px;opacity:0.85}
.card-info .best{font-size:11px;color:var(--text-dim);margin-top:4px}
.card-info .best span{color:var(--gold);font-weight:700}

/* Arrow indicator */
.game-card .arrow{position:relative;z-index:1;color:var(--text-dim);font-size:18px;
  margin-left:auto;padding-left:8px;opacity:0.5}

/* Section divider */
.section-label{padding:18px 20px 8px;font-size:11px;color:var(--text-dim);letter-spacing:2px;
  text-transform:uppercase;font-weight:600}

/* Quick Stats */
.stats-row{display:flex;gap:10px;padding:0 16px 16px}
.stat-card{flex:1;padding:14px 12px;border-radius:12px;text-align:center;
  background:var(--card-bg);border:1px solid rgba(255,255,255,0.05)}
.stat-card .val{font-size:20px;font-weight:800;color:var(--gold)}
.stat-card .label{font-size:10px;color:var(--text-dim);margin-top:2px}

/* Leaderboard Tabs */
.lb-tabs{display:flex;gap:8px;padding:0 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.lb-tabs::-webkit-scrollbar{display:none}
.lb-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  color:var(--text-dim);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;transition:all 0.2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.lb-tab.active{color:var(--gold);background:rgba(212,168,75,0.15);border-color:rgba(212,168,75,0.3)}
.lb-tab:active{transform:scale(0.95)}

/* Leaderboard Content */
.lb-content{padding:0 16px 16px}
.lb-content .lb-table{width:100%;border-collapse:collapse}
.lb-content .lb-row{display:flex;align-items:center;padding:8px 12px;border-radius:8px;margin-bottom:4px}
.lb-content .lb-row:nth-child(odd){background:rgba(255,255,255,0.03)}
.lb-content .lb-row:nth-child(even){background:rgba(255,255,255,0.01)}
.lb-content .lb-rank{width:28px;font-weight:800;font-size:14px;text-align:center;flex-shrink:0}
.lb-content .lb-rank.gold{color:#FFD700}
.lb-content .lb-rank.silver{color:#C0C0C0}
.lb-content .lb-rank.bronze{color:#CD7F32}
.lb-content .lb-rank.normal{color:var(--text-dim)}
.lb-content .lb-name{flex:1;font-size:13px;color:var(--text);margin-left:10px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-content .lb-score{font-size:13px;font-weight:700;color:var(--gold);margin-left:auto;padding-left:8px}
.lb-content .lb-empty{text-align:center;padding:20px;font-size:12px;color:var(--text-dim)}
.lb-content .lb-alltime{margin-top:10px;padding:8px 12px;border-radius:8px;
  background:rgba(212,168,75,0.06);border:1px solid rgba(212,168,75,0.12);
  font-size:12px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center}
.lb-content .lb-alltime .at-label{color:var(--text-dim)}
.lb-content .lb-alltime .at-val{color:var(--gold);font-weight:700}

@media(min-width:500px){
  .lb-tabs{max-width:480px;margin:0 auto}
  .lb-content{max-width:480px;margin:0 auto;padding-bottom:16px}
}

/* Footer */
.footer{text-align:center;padding:16px 20px 24px;color:var(--text-dim);font-size:11px;opacity:0.4}

/* Loading overlay */
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.35s ease}
.loading-overlay.hide{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid rgba(212,168,75,0.15);
  border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay .tip{margin-top:12px;font-size:12px;color:var(--text-dim)}

/* Page transition */
.page-leaving .game-card{opacity:0.5;transform:scale(0.98);transition:all 0.15s}

/* Landscape */
@media(orientation:landscape)and(max-height:500px){
  .game-list{flex-direction:row;flex-wrap:wrap}
  .game-card{flex:1 1 45%;min-width:260px}
}

/* Small phones */
@media(max-width:340px){
  .game-card .avatar{width:48px;height:48px;min-width:48px}
  .card-info .title{font-size:14px}
  .header h1{font-size:20px}
}

/* Tablets / large phones */
@media(min-width:500px){
  .game-list{max-width:480px;margin:0 auto}
  .stats-row{max-width:480px;margin:0 auto;padding-bottom:16px}
  .season-pill{max-width:480px;margin:14px auto}
  .header{padding-top:28px}
}

/* Animation */
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.game-card{animation:slideIn 0.35s ease-out both}
.game-card:nth-child(1){animation-delay:0s}
.game-card:nth-child(2){animation-delay:0.05s}
.game-card:nth-child(3){animation-delay:0.1s}
.game-card:nth-child(4){animation-delay:0.15s}
.game-card:nth-child(5){animation-delay:0.2s}
</style>
</head>
<body>

<!-- Loading (shows briefly while JS modules load) -->
<div class="loading-overlay" id="loader">
  <div class="spinner"></div>
  <div class="tip">加载中</div>
</div>

<!-- App -->
<div id="app" style="opacity:0">
  <div class="header">
    <h1>王者小游戏</h1>
    <div class="subtitle">轻量玩法 · 点开即玩</div>
    <button class="mute-btn" id="muteBtn" aria-label="静音切换">🔊</button>
  </div>

  <div class="season-pill" id="seasonPill">
    <span class="name" id="sName">—</span>
    <span class="timer" id="sTimer">—</span>
  </div>

  <div class="game-list" id="gameList"></div>

  <div class="section-label">数据总览</div>
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="val" id="statPlayed">0</div><div class="label">总游玩次数</div></div>
    <div class="stat-card"><div class="val" id="statBest">—</div><div class="label">最高单局分</div></div>
    <div class="stat-card"><div class="val" id="statGames">5</div><div class="label">可玩游戏</div></div>
  </div>

  <div class="section-label">今日排行</div>
  <div class="lb-tabs" id="lbTabs"></div>
  <div class="lb-content" id="lbContent"></div>

  <div class="footer">碎片时间 · 即时娱乐</div>
</div>

<script type="module">
import { loadHeroList, preloadAvatars, preloadSkin, getAvatarUrl, getSkinUrl, GAME_HEROES } from './shared/heroes.js';
import { getCurrentSeason, getSeasonTimeRemaining } from './shared/season.js';
import { getPersonalBest, getLeaderboard, getAllTimeBest } from './shared/leaderboard.js';
import { initAudio } from './shared/audio.js';

let audio = null;
function ensureAudio() {
  if (!audio) {
    try { audio = initAudio(); } catch(e) { console.warn('Audio init failed', e); }
  }
  return audio;
}

const GAMES = [
  { id:'hook',   title:'钟馗 · 黄金矿工',    genre:'经典街机 · 单指点击', hero:GAME_HEROES.ZHONGKUI,    url:'games/hook/index.html' },
  { id:'slash',  title:'兰陵王 · 暗影刺客',   genre:'水果忍者 · 滑屏切割', hero:GAME_HEROES.LANLINGWANG, url:'games/slash/index.html' },
  { id:'dodge',  title:'貂蝉 · 弹幕舞步',     genre:'弹幕躲避 · 摇杆操控', hero:GAME_HEROES.DIAOCHAN,    url:'games/dodge/index.html' },
  { id:'jump',   title:'廉颇 · 正义蹦蹦',     genre:'跳一跳 · 长按蓄力',   hero:GAME_HEROES.LIANPO,      url:'games/jump/index.html' },
  { id:'rhythm', title:'李白 · 青莲剑歌',      genre:'剑气音游 · 节拍挑战', hero:GAME_HEROES.LIBAI,       url:'games/rhythm/index.html' },
];

function fmt(n){ return n == null ? '—' : n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,','); }

// ── Render immediately with placeholder, then enhance ──
function renderCards(){
  const list = document.getElementById('gameList');
  list.innerHTML = '';
  GAMES.forEach(g => {
    const best = getPersonalBest(g.id);
    const bestVal = best ? fmt(best.score) : null;
    const card = document.createElement('div');
    card.className = 'game-card';
    card.setAttribute('role','button');
    card.setAttribute('aria-label', g.title);
    card.innerHTML = `
      <div class="card-bg" data-hero="${g.hero}"></div>
      <img class="avatar" src="${getAvatarUrl(g.hero)}" alt="" loading="lazy"
           onerror="this.style.background='var(--gold)';this.style.border='none'">
      <div class="card-info">
        <div class="title">${g.title}</div>
        <div class="genre">${g.genre}</div>
        <div class="best">${bestVal ? `最高 <span>${bestVal}</span>` : '尚未挑战'}</div>
      </div>
      <div class="arrow">›</div>
    `;
    card.addEventListener('click', () => {
      if (!audio) {
        ensureAudio();
        if (audio) { audio.playBGM('lobby'); audio.setBGMVolume(0.2); }
      }
      if (audio) audio.playMenuTap();
      navigateTo(g.url);
    });
    list.appendChild(card);
  });
}

function navigateTo(url){
  if (audio) audio.stopBGM(0.3);
  document.body.classList.add('page-leaving');
  setTimeout(() => { window.location.href = url; }, 120);
}

function updateSeason(){
  const s = getCurrentSeason();
  const r = getSeasonTimeRemaining();
  document.getElementById('sName').textContent = `赛季 · ${s.name}`;
  document.getElementById('sTimer').textContent = `${r.days}天${r.hours}时${r.minutes}分`;
  const pill = document.getElementById('seasonPill');
  pill.style.borderColor = s.colorScheme.primary + '30';
}

function updateStats(){
  let totalPlayed = 0, maxScore = 0;
  GAMES.forEach(g => {
    const count = parseInt(localStorage.getItem(`wz_playcount_${g.id}`) || '0');
    totalPlayed += count;
    const best = getPersonalBest(g.id);
    if(best && best.score > maxScore) maxScore = best.score;
  });
  document.getElementById('statPlayed').textContent = totalPlayed || '0';
  document.getElementById('statBest').textContent = maxScore > 0 ? fmt(maxScore) : '—';
}

function loadCardBackgrounds(){
  document.querySelectorAll('.card-bg[data-hero]').forEach(el => {
    const hero = el.dataset.hero;
    const img = new Image();
    img.onload = () => { el.style.backgroundImage = `url('${img.src}')`; };
    img.src = getSkinUrl(parseInt(hero), 1);
  });
}

// ── Lobby Leaderboard ──
let activeTab = 0;

function renderLobbyLeaderboard(gameIndex) {
  activeTab = gameIndex;
  const g = GAMES[gameIndex];

  // Update tabs
  document.querySelectorAll('.lb-tab').forEach((tab, i) => {
    tab.classList.toggle('active', i === gameIndex);
  });

  const container = document.getElementById('lbContent');
  const board = getLeaderboard(g.id);
  const allTime = getAllTimeBest(g.id);
  const best = allTime.length > 0 ? allTime[0] : null;

  let html = '';
  if (board.length === 0) {
    html = '<div class="lb-empty">暂无记录，快去挑战吧!</div>';
  } else {
    for (const entry of board) {
      const rankClass = entry.rank === 1 ? 'gold' : entry.rank === 2 ? 'silver' : entry.rank === 3 ? 'bronze' : 'normal';
      html += `<div class="lb-row">
        <div class="lb-rank ${rankClass}">${entry.rank}</div>
        <div class="lb-name">${entry.name || '无名侠客'}</div>
        <div class="lb-score">${fmt(entry.score)}</div>
      </div>`;
    }
  }

  if (best) {
    html += `<div class="lb-alltime"><span class="at-label">历史最佳</span><span class="at-val">${best.name} — ${fmt(best.score)}</span></div>`;
  }

  container.innerHTML = html;
}

function initLobbyLeaderboard() {
  const tabsEl = document.getElementById('lbTabs');
  const tabNames = ['钟馗', '兰陵王', '貂蝉', '廉颇', '李白'];
  tabsEl.innerHTML = '';
  GAMES.forEach((g, i) => {
    const tab = document.createElement('div');
    tab.className = 'lb-tab' + (i === 0 ? ' active' : '');
    tab.textContent = tabNames[i] || g.title.split('·')[0].trim();
    tab.addEventListener('click', () => renderLobbyLeaderboard(i));
    tabsEl.appendChild(tab);
  });
  renderLobbyLeaderboard(0);
}

async function init(){
  // Phase 1: Render cards immediately (avatars load lazily via <img>)
  renderCards();
  updateSeason();
  updateStats();
  initLobbyLeaderboard();

  // Show app immediately — don't wait for API
  document.getElementById('loader').classList.add('hide');
  document.getElementById('app').style.opacity = '1';

  // Phase 2: Load hero data in background (for future use)
  try { await loadHeroList(); } catch(e){ /* non-blocking */ }

  // Phase 3: Lazy-load skin backgrounds
  loadCardBackgrounds();

  // Refresh season timer every minute
  setInterval(updateSeason, 60000);

  // Mute toggle button
  const muteBtn = document.getElementById('muteBtn');
  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!audio) {
      ensureAudio();
      if (audio) { audio.playBGM('lobby'); audio.setBGMVolume(0.2); }
    }
    if (audio) {
      const muted = audio.toggleMute();
      muteBtn.textContent = muted ? '🔇' : '🔊';
    }
  });

  // Start lobby BGM on first interaction anywhere
  const startBGMOnce = () => {
    if (!audio) {
      ensureAudio();
      if (audio) { audio.playBGM('lobby'); audio.setBGMVolume(0.2); }
    }
    document.removeEventListener('touchstart', startBGMOnce);
    document.removeEventListener('mousedown', startBGMOnce);
  };
  document.addEventListener('touchstart', startBGMOnce, { passive: true });
  document.addEventListener('mousedown', startBGMOnce);
}

init();
</script>
</body>
</html>
