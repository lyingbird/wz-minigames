<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>貂蝉·弹幕舞步</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;touch-action:none;user-select:none;-webkit-user-select:none}
:root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
#game{width:100%;height:100%;position:fixed;inset:0}
</style>
</head>
<body>
<div id="game"></div>
<script type="module">
import{createCanvas,createGameLoop,createJoystick,createTapDetector,createParticleSystem,createFloatingText,createPool,circleCollision,pointInCircle,showOverlay,drawRoundRect,formatScore,COLORS}from'../../shared/engine.js';
import{loadHeroList,preloadAvatars,getAvatarImage,GAME_HEROES}from'../../shared/heroes.js';
import{initAudio}from'../../shared/audio.js';
import{addScore,getLeaderboard,getPersonalBest,isTopScore,getPlayerName}from'../../shared/leaderboard.js';
import{showNicknameInput,renderMiniLeaderboard}from'../../shared/leaderboard-ui.js';
import{getCurrentSeason}from'../../shared/season.js';

const GAME_ID='dodge';

// ── State ──
const State={LOADING:0,TITLE:1,COUNTDOWN:2,PLAYING:3,DYING:4,GAMEOVER:5};
let state=State.LOADING;
let screen,ctx,W,H;

const PLAYER_RADIUS=18;
const PLAYER_SPEED=280;
const DASH_DISTANCE=120;
// Dash dodge detection radius (how close bullets need to be during dash to count)
const DASH_DETECT_RADIUS=PLAYER_RADIUS*3;
const FATE_RADIUS=55;
const MARGIN=15;
const DASH_DURATION=0.3;
const DASH_COOLDOWN=4;
const FATE_INTERVAL=12;
const FATE_DURATION=3;
let audio=null;
let joystick,tapDetector;
let particles,floatingText;

// Player
let px,py,pvx,pvy;
let dashing=false,dashTimer=0,dashCooldown=0,dashDirX=0,dashDirY=0;
let invincible=false,invTimer=0;
let idleTime=0;
let afterimages=[];

// Game
let gameTime=0,score=0;
// Wave & density scoring
let waveNum=0,lastWaveTime=0;
let survivalCombo=0,lastDashTime=0,noDashTimer=0;
let dashDodgeCount=0; // bullets near player during dash
let countdownVal=3,countdownTimer=0;
let dyingTimer=0;
let screenFlash=0;
let edgeFlash=0;
let gameOverReady=false;
let gameOverRank=-1;

// Fate circle
let fateTimer=0,fateActive=false,fateX=0,fateY=0,fateDuration=0,fateCollected=false;

// Bullet pool
const bulletPool=createPool(
  ()=>({x:0,y:0,vx:0,vy:0,radius:7,type:0,active:false,age:0,trail:[],homingAngle:0,_grazed:false}),
  (b)=>{b.active=false;b.age=0;b.trail.length=0;b.type=0;b.homingAngle=0;b._grazed=false;},
  300
);

// Laser pool
let lasers=[];

// Spiral emitters
let spirals=[];

// Spawn timers
let spawnAccum=0;
let fanTimer=0,homingTimer=0,laserTimer=0,spiralTimer=0;

// ── Init ──
async function init(){
  screen=createCanvas(document.getElementById('game'));
  ({ctx,width:W,height:H}=screen);

  // Watch for resize
  const ro=new ResizeObserver(()=>{W=screen.width;H=screen.height;});
  ro.observe(screen.canvas);

  joystick=createJoystick({side:'left',radius:55,deadzone:8});
  joystick.attach(screen.canvas);

  tapDetector=createTapDetector(screen.canvas);
  tapDetector.onTap=(x,y)=>{
    W=screen.width;H=screen.height;
    if(state===State.TITLE){
      if(!audio){ audio=initAudio(); }
      if(audio){ audio.playBGM('dodge'); audio.setBGMVolume(0.2); }
      if(x<W*0.25&&y<H*0.08){
        if(audio) audio.stopBGM(0.3);
        window.location.href='../../index.html';return;
      }
      startGame();
    }else if(state===State.GAMEOVER){
      if(!gameOverReady) return;
      // Check lobby button at bottom of screen (rendered at H*0.93)
      if(y>=H*0.90&&y<=H*0.97&&x>=W*0.2&&x<=W*0.8){
        if(audio) audio.stopBGM(0.3);
        window.location.href='../../index.html';return;
      }
      startGame();
    }else if(state===State.PLAYING){
      // Right-side tap = dash
      if(x>W*0.45){
        triggerDash();
      }
    }
  };

  particles=createParticleSystem(400);
  floatingText=createFloatingText();

  await loadHeroList();
  await preloadAvatars([GAME_HEROES.DIAOCHAN,GAME_HEROES.DAJI,GAME_HEROES.ZHAOYUN,GAME_HEROES.LUBAN,GAME_HEROES.ANQILA]);

  const loop=createGameLoop(update,render);
  loop.start();
  state=State.TITLE;
}

function startGame(){
  if(!audio){
    audio=initAudio();
  }
  if(audio){ audio.playBGM('dodge'); audio.setBGMVolume(0.35); }
  state=State.COUNTDOWN;
  countdownVal=3;
  countdownTimer=0;
  audio.playCountdown();
  resetGame();
}

function resetGame(){
  W=screen.width;H=screen.height;
  px=W/2;py=H/2;pvx=0;pvy=0;
  dashing=false;dashTimer=0;dashCooldown=0;
  invincible=false;invTimer=0;idleTime=0;
  afterimages=[];
  gameTime=0;score=0;waveNum=0;lastWaveTime=0;survivalCombo=0;noDashTimer=0;dashDodgeCount=0;
  screenFlash=0;edgeFlash=0;
  fateTimer=0;fateActive=false;fateCollected=false;
  bulletPool.releaseAll();
  lasers=[];spirals=[];
  spawnAccum=0;fanTimer=0;homingTimer=0;laserTimer=0;spiralTimer=0;
  dyingTimer=0;
  particles.clear();
  floatingText.clear();
}

// ── Dash ──
function triggerDash(){
  if(dashCooldown>0||dashing)return;
  dashing=true;
  dashTimer=DASH_DURATION;
  invincible=true;
  invTimer=DASH_DURATION;
  dashCooldown=DASH_COOLDOWN;

  // Direction
  const jk=joystick.state||joystick;
  if(jk.active&&jk.magnitude>0.1){
    dashDirX=jk.x;dashDirY=jk.y;
  }else{
    dashDirX=0;dashDirY=-1;
  }
  const len=Math.sqrt(dashDirX*dashDirX+dashDirY*dashDirY)||1;
  dashDirX/=len;dashDirY/=len;

  if(audio)audio.playDash();
}

// ── Bullet spawning ──
function spawnLinear(){
  const b=bulletPool.get();
  b.active=true;b.type=0;b.radius=6+Math.random()*2;
  const side=Math.floor(Math.random()*4);
  const speed=120+gameTime*1.2+Math.random()*60;
  if(side===0){b.x=Math.random()*W;b.y=-10;}
  else if(side===1){b.x=Math.random()*W;b.y=H+10;}
  else if(side===2){b.x=-10;b.y=Math.random()*H;}
  else{b.x=W+10;b.y=Math.random()*H;}
  // Aim toward center area with spread
  const tx=W*0.2+Math.random()*W*0.6;
  const ty=H*0.2+Math.random()*H*0.6;
  const ang=Math.atan2(ty-b.y,tx-b.x);
  b.vx=Math.cos(ang)*speed;
  b.vy=Math.sin(ang)*speed;
}

function spawnFan(){
  const side=Math.floor(Math.random()*4);
  let ox,oy,baseAngle;
  if(side===0){ox=Math.random()*W;oy=-5;baseAngle=Math.PI/2;}
  else if(side===1){ox=Math.random()*W;oy=H+5;baseAngle=-Math.PI/2;}
  else if(side===2){ox=-5;oy=Math.random()*H;baseAngle=0;}
  else{ox=W+5;oy=Math.random()*H;baseAngle=Math.PI;}
  const count=5+Math.floor(Math.random()*3);
  const spread=0.8;
  const speed=140+gameTime*0.8;
  for(let i=0;i<count;i++){
    const b=bulletPool.get();
    b.active=true;b.type=1;b.radius=6;
    b.x=ox;b.y=oy;
    const a=baseAngle-spread/2+spread*i/(count-1);
    b.vx=Math.cos(a)*speed;
    b.vy=Math.sin(a)*speed;
  }
}

function spawnHoming(){
  const b=bulletPool.get();
  b.active=true;b.type=2;b.radius=7;
  const side=Math.floor(Math.random()*4);
  if(side===0){b.x=Math.random()*W;b.y=-10;}
  else if(side===1){b.x=Math.random()*W;b.y=H+10;}
  else if(side===2){b.x=-10;b.y=Math.random()*H;}
  else{b.x=W+10;b.y=Math.random()*H;}
  const ang=Math.atan2(py-b.y,px-b.x);
  const speed=80+gameTime*0.5;
  b.vx=Math.cos(ang)*speed;
  b.vy=Math.sin(ang)*speed;
  b.homingAngle=ang;
}

function spawnLaser(){
  const horizontal=Math.random()<0.5;
  let x1,y1,x2,y2;
  if(horizontal){
    const yy=50+Math.random()*(H-100);
    x1=0;y1=yy;x2=W;y2=yy;
  }else{
    const xx=50+Math.random()*(W-100);
    x1=xx;y1=0;x2=xx;y2=H;
  }
  lasers.push({x1,y1,x2,y2,warningTime:1.0,fireTime:0,firing:false,width:0,maxWidth:30,age:0,done:false});
}

function spawnSpiral(){
  const cx=80+Math.random()*(W-160);
  const cy=80+Math.random()*(H-160);
  spirals.push({cx,cy,angle:0,timer:0,interval:0.12,duration:3+Math.random()*2,elapsed:0,speed:130+gameTime*0.6});
}

// ── Update ──
function update(dt){
  W=screen.width;H=screen.height;
  particles.update(dt);
  floatingText.update(dt);

  if(state===State.COUNTDOWN){
    countdownTimer+=dt;
    if(countdownTimer>=1){
      countdownTimer-=1;
      countdownVal--;
      if(countdownVal<=0){
        state=State.PLAYING;
        if(audio)audio.playStart();
      }else{
        if(audio)audio.playCountdown();
      }
    }
    return;
  }

  if(state===State.DYING){
    dyingTimer+=dt;
    if(dyingTimer>=1.0){
      state=State.GAMEOVER;
      gameOverReady=false;
      gameOverRank=-1;
      if(audio) audio.setBGMVolume(0.15);

      async function handleGameOver(){
        const finalScore=Math.floor(score);
        if(isTopScore(GAME_ID,finalScore)){
          const name=await showNicknameInput(screen.canvas,finalScore,'进入今日前5!');
          const result=addScore(GAME_ID,finalScore,name);
          gameOverRank=result.rank;
        }else{
          const result=addScore(GAME_ID,finalScore,getPlayerName());
          gameOverRank=result.rank;
        }
        if(audio&&gameOverRank===1&&finalScore>0) audio.playNewRecord();
        gameOverReady=true;
      }
      handleGameOver();
    }
    return;
  }

  if(state!==State.PLAYING)return;

  gameTime+=dt;

  // ── Density-based scoring: more bullets on screen = higher multiplier ──
  let activeBullets=0;
  bulletPool.forEach(()=>activeBullets++);
  const densityMult=Math.min(3,1+activeBullets/20);

  // Survival combo: builds while not using dash
  noDashTimer+=dt;
  if(noDashTimer>=10){noDashTimer-=10;survivalCombo=Math.min(survivalCombo+1,3);}
  const comboMult=[1,1.2,1.5,2.0][survivalCombo];

  // Time score increases with time survived
  const timeRate=10+Math.floor(gameTime/10);
  score+=timeRate*densityMult*comboMult*dt;

  // Wave bonus every 15 seconds
  if(gameTime-lastWaveTime>=15){
    lastWaveTime=gameTime;
    waveNum++;
    const waveBonus=100*waveNum;
    score+=waveBonus;
    floatingText.add(W/2,H*0.3,`波次 ${waveNum}! +${waveBonus}`,{color:COLORS.GOLD,size:22,duration:1.2});
    if(audio)audio.playScore();
  }

  // Screen flash decay
  if(screenFlash>0)screenFlash=Math.max(0,screenFlash-dt*4);
  if(edgeFlash>0)edgeFlash=Math.max(0,edgeFlash-dt*5);

  // Dash cooldown
  if(dashCooldown>0)dashCooldown=Math.max(0,dashCooldown-dt);

  // Dash movement
  if(dashing){
    dashTimer-=dt;
    const dashSpeed=DASH_DISTANCE/DASH_DURATION;
    px+=dashDirX*dashSpeed*dt;
    py+=dashDirY*dashSpeed*dt;
    // Afterimage
    afterimages.push({x:px,y:py,alpha:0.6,timer:0.25});
    if(dashTimer<=0){
      dashing=false;
      // Reward for dashing through bullets
      if(dashDodgeCount>=3){
        const dashBonus=50*dashDodgeCount;
        score+=dashBonus;
        floatingText.add(px,py-PLAYER_RADIUS-15,`闪避! +${dashBonus}`,{color:'#fff',size:20,duration:0.8});
        screenFlash=0.3;
        if(audio)audio.playGraze();
      }
      dashDodgeCount=0;
      // Using dash resets survival combo
      survivalCombo=0;noDashTimer=0;
    }
  }

  // Invincibility timer
  if(invincible){
    invTimer-=dt;
    if(invTimer<=0)invincible=false;
  }

  // Joystick movement
  const jk=joystick.state||joystick;
  if(!dashing&&jk.active&&jk.magnitude>0.1){
    px+=jk.x*PLAYER_SPEED*jk.magnitude*dt;
    py+=jk.y*PLAYER_SPEED*jk.magnitude*dt;
    idleTime=0;
  }else if(!dashing){
    idleTime+=dt;
  }

  // Clamp to screen
  px=Math.max(MARGIN+PLAYER_RADIUS,Math.min(W-MARGIN-PLAYER_RADIUS,px));
  py=Math.max(MARGIN+PLAYER_RADIUS+40,Math.min(H-MARGIN-PLAYER_RADIUS,py));

  // Afterimage decay
  for(let i=afterimages.length-1;i>=0;i--){
    afterimages[i].timer-=dt;
    afterimages[i].alpha-=dt*2;
    if(afterimages[i].timer<=0)afterimages.splice(i,1);
  }

  // ── Fate Circle ──
  fateTimer+=dt;
  if(!fateActive&&fateTimer>=FATE_INTERVAL){
    fateActive=true;
    fateCollected=false;
    fateDuration=0;
    fateX=FATE_RADIUS+30+Math.random()*(W-FATE_RADIUS*2-60);
    fateY=80+Math.random()*(H-FATE_RADIUS*2-120);
    fateTimer=0;
  }
  if(fateActive){
    fateDuration+=dt;
    if(!fateCollected&&pointInCircle(px,py,fateX,fateY,FATE_RADIUS)){
      fateCollected=true;
      invincible=true;
      invTimer=Math.max(invTimer,1.0);
      score+=200;
      floatingText.add(fateX,fateY-20,'+200',{color:'#FFD700',size:28,duration:1.2});
      particles.emit(fateX,fateY,{count:20,speed:120,color:'#FFD700',size:5,life:0.8});
      if(audio)audio.playPickup();
    }
    if(fateDuration>=FATE_DURATION)fateActive=false;
  }

  // ── Spawn bullets ──
  const spawnMult=1+gameTime*0.02;
  const baseRate=1.5;

  // Linear: always
  spawnAccum+=dt*baseRate*spawnMult;
  while(spawnAccum>=1){spawnAccum--;spawnLinear();}

  // Fan: after 15s
  if(gameTime>15){
    fanTimer+=dt;
    const fanInterval=Math.max(1.5,4-gameTime*0.02);
    if(fanTimer>=fanInterval){fanTimer-=fanInterval;spawnFan();}
  }

  // Homing: after 30s
  if(gameTime>30){
    homingTimer+=dt;
    const homInterval=Math.max(0.8,3-gameTime*0.015);
    if(homingTimer>=homInterval){homingTimer-=homInterval;spawnHoming();}
  }

  // Laser: after 45s
  if(gameTime>45){
    laserTimer+=dt;
    const lasInterval=Math.max(2,6-gameTime*0.02);
    if(laserTimer>=lasInterval){laserTimer-=lasInterval;spawnLaser();}
  }

  // Spiral: after 60s
  if(gameTime>60){
    spiralTimer+=dt;
    const spInterval=Math.max(3,8-gameTime*0.02);
    if(spiralTimer>=spInterval){spiralTimer-=spInterval;spawnSpiral();}
  }

  // ── Update spirals ──
  for(let i=spirals.length-1;i>=0;i--){
    const s=spirals[i];
    s.elapsed+=dt;
    s.timer+=dt;
    s.angle+=dt*2.5;
    if(s.timer>=s.interval){
      s.timer-=s.interval;
      const b=bulletPool.get();
      b.active=true;b.type=4;b.radius=5;
      b.x=s.cx;b.y=s.cy;
      b.vx=Math.cos(s.angle)*s.speed;
      b.vy=Math.sin(s.angle)*s.speed;
    }
    if(s.elapsed>=s.duration)spirals.splice(i,1);
  }

  // ── Update lasers ──
  for(let i=lasers.length-1;i>=0;i--){
    const l=lasers[i];
    l.age+=dt;
    if(!l.firing){
      l.warningTime-=dt;
      if(l.warningTime<=0){
        l.firing=true;l.fireTime=0.5;
        l.width=l.maxWidth;
      }
    }else{
      l.fireTime-=dt;
      l.width=l.maxWidth*(l.fireTime/0.5);
      if(l.fireTime<=0){l.done=true;}
    }
    if(l.done)lasers.splice(i,1);
  }

  // ── Update bullets ──
  bulletPool.forEach((b)=>{
    if(!b.active)return;
    b.age+=dt;

    // Homing adjustment
    if(b.type===2&&b.age<3){
      const desired=Math.atan2(py-b.y,px-b.x);
      let diff=desired-b.homingAngle;
      while(diff>Math.PI)diff-=Math.PI*2;
      while(diff<-Math.PI)diff+=Math.PI*2;
      const turnRate=1.2;
      b.homingAngle+=Math.sign(diff)*Math.min(Math.abs(diff),turnRate*dt);
      const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      b.vx=Math.cos(b.homingAngle)*spd;
      b.vy=Math.sin(b.homingAngle)*spd;
    }

    b.x+=b.vx*dt;
    b.y+=b.vy*dt;

    // Trail
    if(b.trail.length>3)b.trail.shift();
    b.trail.push({x:b.x,y:b.y});

    // Off-screen removal (with generous margin)
    if(b.x<-60||b.x>W+60||b.y<-60||b.y>H+60){
      b.active=false;
      bulletPool.release(b);
      return;
    }

    // Skip collision check if far from player
    const ddx=b.x-px,ddy=b.y-py;
    const distSq=ddx*ddx+ddy*ddy;
    if(distSq>200*200)return;

    const dist=Math.sqrt(distSq);
    const hitDist=PLAYER_RADIUS+b.radius-4;// slightly forgiving
    // Skill dash dodge: count bullets near player during dash (invincible)
    if(dashing&&dist<DASH_DETECT_RADIUS+b.radius&&!b._grazed){
      b._grazed=true;
      dashDodgeCount++;
    }

    // Hit check
    if(!invincible&&dist<hitDist){
      die();
    }
  });

  // ── Laser collision ──
  if(!invincible){
    for(const l of lasers){
      if(!l.firing||l.width<5)continue;
      const hw=l.width/2;
      // Simple AABB-ish check
      const isH=l.y1===l.y2;
      if(isH){
        if(Math.abs(py-l.y1)<hw+PLAYER_RADIUS&&px>Math.min(l.x1,l.x2)-PLAYER_RADIUS&&px<Math.max(l.x1,l.x2)+PLAYER_RADIUS){
          die();break;
        }
      }else{
        if(Math.abs(px-l.x1)<hw+PLAYER_RADIUS&&py>Math.min(l.y1,l.y2)-PLAYER_RADIUS&&py<Math.max(l.y1,l.y2)+PLAYER_RADIUS){
          die();break;
        }
      }
    }
  }
}

function die(){
  state=State.DYING;
  dyingTimer=0;
  if(audio)audio.playDeath();
  particles.emit(px,py,{count:40,speed:200,color:COLORS.GOLD,size:5,life:1});
  particles.emit(px,py,{count:20,speed:100,color:COLORS.RED,size:3,life:0.8});
  screenFlash=1;
}

// ── Render ──
function render(){
  W=screen.width;H=screen.height;
  ctx.clearRect(0,0,W,H);

  // Background
  drawBackground();

  if(state===State.TITLE){drawTitle();return;}
  if(state===State.COUNTDOWN){drawCountdown();return;}
  if(state===State.GAMEOVER){drawGameOver();return;}

  // Playing or Dying
  const slowMo=state===State.DYING?0.3:1;

  // Fate circle
  if(fateActive&&!fateCollected){
    drawFateCircle();
  }

  // Lasers
  drawLasers();

  // Spiral centers
  for(const s of spirals){
    ctx.save();
    ctx.globalAlpha=0.3;
    ctx.beginPath();
    ctx.arc(s.cx,s.cy,12,0,Math.PI*2);
    ctx.fillStyle='#2ecc71';
    ctx.fill();
    ctx.restore();
  }

  // Bullets
  drawBullets();

  // Player
  if(state!==State.DYING||dyingTimer<0.3){
    drawPlayer();
  }

  // Particles & floating text
  particles.render(ctx);
  floatingText.render(ctx);

  // HUD
  drawHUD();

  // Dash button
  drawDashButton();

  // Joystick
  const jkState=joystick.state||joystick;
  if(jkState.active)joystick.render(ctx);

  // Screen flash
  if(screenFlash>0){
    ctx.save();
    ctx.globalAlpha=screenFlash*0.3;
    ctx.fillStyle='#fff';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // Edge flash (graze)
  if(edgeFlash>0){
    ctx.save();
    const grad=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.7);
    grad.addColorStop(0,'transparent');
    grad.addColorStop(1,`rgba(255,255,255,${edgeFlash*0.2})`);
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // Dying overlay
  if(state===State.DYING){
    ctx.save();
    ctx.globalAlpha=Math.min(dyingTimer/1.0,0.6);
    ctx.fillStyle='#0a0a1a';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
}

function drawBackground(){
  // Dark navy fill
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);

  // Concentric circles
  ctx.save();
  ctx.strokeStyle='rgba(100,100,140,0.06)';
  ctx.lineWidth=1;
  const cx=W/2,cy=H/2;
  const maxR=Math.max(W,H)*0.7;
  for(let r=50;r<maxR;r+=60){
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.stroke();
  }
  ctx.restore();

  // Vignette
  ctx.save();
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.75);
  vg.addColorStop(0,'transparent');
  vg.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

function drawPlayer(){
  // Afterimages
  for(const ai of afterimages){
    ctx.save();
    ctx.globalAlpha=Math.max(0,ai.alpha)*0.4;
    ctx.beginPath();
    ctx.arc(ai.x,ai.y,PLAYER_RADIUS,0,Math.PI*2);
    ctx.fillStyle=COLORS.GOLD;
    ctx.fill();
    ctx.restore();
  }

  // Invincibility shield
  if(invincible){
    ctx.save();
    ctx.globalAlpha=0.3+Math.sin(gameTime*15)*0.15;
    ctx.beginPath();
    ctx.arc(px,py,PLAYER_RADIUS+8,0,Math.PI*2);
    ctx.strokeStyle='#FFD700';
    ctx.lineWidth=3;
    ctx.stroke();
    // Inner glow
    const sg=ctx.createRadialGradient(px,py,PLAYER_RADIUS,px,py,PLAYER_RADIUS+12);
    sg.addColorStop(0,'rgba(255,215,0,0.2)');
    sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg;
    ctx.fill();
    ctx.restore();
  }

  // Glow ring
  ctx.save();
  ctx.beginPath();
  ctx.arc(px,py,PLAYER_RADIUS+3,0,Math.PI*2);
  ctx.strokeStyle=COLORS.GOLD;
  ctx.lineWidth=2;
  ctx.globalAlpha=0.5+Math.sin(gameTime*3)*0.15;
  ctx.stroke();

  // Breathing pulse for idle
  const breathScale=1+Math.sin(idleTime*2)*0.03;

  // Avatar clip
  ctx.beginPath();
  ctx.arc(px,py,PLAYER_RADIUS*breathScale,0,Math.PI*2);
  ctx.closePath();
  ctx.clip();

  const avatar=getAvatarImage(GAME_HEROES.DIAOCHAN);
  if(avatar){
    const s=PLAYER_RADIUS*2*breathScale;
    ctx.drawImage(avatar,px-s/2,py-s/2,s,s);
  }else{
    ctx.fillStyle=COLORS.GOLD;
    ctx.fill();
  }
  ctx.restore();

  // Survival combo glow
  if(survivalCombo>0){
    ctx.save();
    ctx.globalAlpha=0.15+survivalCombo*0.08;
    ctx.beginPath();
    ctx.arc(px,py,PLAYER_RADIUS+8+survivalCombo*3,0,Math.PI*2);
    ctx.strokeStyle=COLORS.GOLD;
    ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.restore();
  }
}

function drawBullets(){
  bulletPool.forEach((b)=>{
    if(!b.active)return;
    ctx.save();

    // Trail
    if(b.trail.length>1){
      ctx.globalAlpha=0.2;
      for(let i=0;i<b.trail.length-1;i++){
        const t=b.trail[i];
        const a=(i+1)/b.trail.length*0.3;
        ctx.globalAlpha=a;
        ctx.beginPath();
        ctx.arc(t.x,t.y,b.radius*0.6,0,Math.PI*2);
        ctx.fillStyle=getBulletColor(b.type);
        ctx.fill();
      }
    }

    // Glow
    ctx.globalAlpha=0.25;
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.radius*1.8,0,Math.PI*2);
    ctx.fillStyle=getBulletColor(b.type);
    ctx.fill();

    // Core
    ctx.globalAlpha=0.9;
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
    ctx.fillStyle=getBulletColor(b.type);
    ctx.fill();

    // Inner bright
    ctx.globalAlpha=0.6;
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.radius*0.5,0,Math.PI*2);
    ctx.fillStyle='#fff';
    ctx.fill();

    ctx.restore();
  });
}

function getBulletColor(type){
  switch(type){
    case 0:return'#e74c3c';// linear red
    case 1:return'#9b59b6';// fan purple
    case 2:return'#3498db';// homing blue
    case 3:return'#e74c3c';// laser red
    case 4:return'#2ecc71';// spiral green
    default:return'#e74c3c';
  }
}

function drawLasers(){
  for(const l of lasers){
    ctx.save();
    if(!l.firing){
      // Warning line
      ctx.setLineDash([8,8]);
      ctx.globalAlpha=0.4+Math.sin(l.age*20)*0.2;
      ctx.strokeStyle='#e74c3c';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(l.x1,l.y1);
      ctx.lineTo(l.x2,l.y2);
      ctx.stroke();
      ctx.setLineDash([]);
    }else{
      // Beam
      if(l.width>1){
        // Outer glow
        ctx.globalAlpha=0.3;
        ctx.strokeStyle='#e74c3c';
        ctx.lineWidth=l.width*1.5;
        ctx.beginPath();
        ctx.moveTo(l.x1,l.y1);
        ctx.lineTo(l.x2,l.y2);
        ctx.stroke();

        // Core beam
        ctx.globalAlpha=0.8;
        ctx.strokeStyle='#fff';
        ctx.lineWidth=l.width*0.6;
        ctx.beginPath();
        ctx.moveTo(l.x1,l.y1);
        ctx.lineTo(l.x2,l.y2);
        ctx.stroke();
      }
    }
    ctx.restore();
  }
}

function drawFateCircle(){
  const pulse=Math.sin(fateDuration*4)*0.12;
  ctx.save();
  // Outer ring
  ctx.globalAlpha=0.2+pulse;
  ctx.beginPath();
  ctx.arc(fateX,fateY,FATE_RADIUS,0,Math.PI*2);
  ctx.strokeStyle='#FFD700';
  ctx.lineWidth=3;
  ctx.stroke();

  // Inner glow
  const fg=ctx.createRadialGradient(fateX,fateY,0,fateX,fateY,FATE_RADIUS);
  fg.addColorStop(0,'rgba(255,215,0,0.15)');
  fg.addColorStop(0.7,'rgba(255,215,0,0.05)');
  fg.addColorStop(1,'transparent');
  ctx.fillStyle=fg;
  ctx.beginPath();
  ctx.arc(fateX,fateY,FATE_RADIUS,0,Math.PI*2);
  ctx.fill();

  // Label
  ctx.globalAlpha=0.6;
  ctx.font=`bold ${12}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle='#FFD700';
  ctx.fillText('缘圈',fateX,fateY);
  ctx.restore();
}

function drawHUD(){
  ctx.save();
  ctx.textBaseline='top';

  const hudPad=12;
  const hudTop=screen.safeTop+hudPad;
  // Score (left)
  ctx.textAlign='left';
  ctx.font=`bold ${16}px sans-serif`;
  ctx.fillStyle=COLORS.GOLD;
  ctx.fillText(formatScore(Math.floor(score)),hudPad,hudTop);

  // Time (center)
  ctx.textAlign='center';
  const mins=Math.floor(gameTime/60);
  const secs=Math.floor(gameTime%60);
  ctx.fillStyle='#fff';
  ctx.font=`bold ${18}px sans-serif`;
  ctx.fillText(`${mins}:${secs.toString().padStart(2,'0')}`,W/2,hudTop);

  // Graze (right)
  ctx.textAlign='right';
  ctx.font=`${14}px sans-serif`;
  ctx.fillStyle='#aaa';
  ctx.fillText(`波次 ${waveNum}`,W-hudPad,hudTop);
  if(survivalCombo>0){
    ctx.fillStyle='#fff';
    ctx.font=`bold ${14}px sans-serif`;
    ctx.fillText(`×${[1,1.2,1.5,2.0][survivalCombo]}`,W-hudPad,hudTop+18);
  }
  ctx.restore();
}

function drawDashButton(){
  if(state!==State.PLAYING)return;
  const br=28;
  const bx=W-br*2-W*0.04,by=H-screen.safeBottom-br*2-H*0.05;
  ctx.save();

  // Button circle background
  ctx.globalAlpha=0.3;
  ctx.beginPath();
  ctx.arc(bx,by,br,0,Math.PI*2);
  ctx.fillStyle='#333';
  ctx.fill();

  // Cooldown arc
  if(dashCooldown>0){
    const pct=dashCooldown/DASH_COOLDOWN;
    ctx.globalAlpha=0.5;
    ctx.beginPath();
    ctx.moveTo(bx,by);
    ctx.arc(bx,by,br,-Math.PI/2,-Math.PI/2+Math.PI*2*pct,false);
    ctx.closePath();
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fill();
  }

  // Border
  ctx.globalAlpha=dashCooldown>0?0.3:0.7;
  ctx.beginPath();
  ctx.arc(bx,by,br,0,Math.PI*2);
  ctx.strokeStyle=COLORS.GOLD;
  ctx.lineWidth=2;
  ctx.stroke();

  // Label
  ctx.globalAlpha=dashCooldown>0?0.4:0.9;
  ctx.font=`bold ${13}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle=COLORS.GOLD;
  ctx.fillText('凝露',bx,by);

  ctx.restore();
}

function drawTitle(){
  ctx.save();
  const cy=H*0.3;

  // Back button
  ctx.font=`bold ${16}px sans-serif`;
  ctx.textAlign='left';
  ctx.textBaseline='middle';
  ctx.fillStyle=COLORS.GOLD;
  ctx.fillText('\u2190 \u8FD4\u56DE',W*0.05,screen.safeTop+H*0.04);

  // Avatar
  const avatarR=45;
  const avatar=getAvatarImage(GAME_HEROES.DIAOCHAN);
  if(avatar){
    ctx.beginPath();
    ctx.arc(W/2,cy,avatarR,0,Math.PI*2);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(avatar,W/2-avatarR,cy-avatarR,avatarR*2,avatarR*2);
    ctx.restore();
    ctx.save();
    // Ring
    ctx.beginPath();
    ctx.arc(W/2,cy,avatarR+2,0,Math.PI*2);
    ctx.strokeStyle=COLORS.GOLD;
    ctx.lineWidth=2;
    ctx.stroke();
  }

  // Title
  ctx.font=`bold ${28}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle=COLORS.GOLD;
  ctx.fillText('貂蝉·弹幕舞步',W/2,cy+80);

  ctx.font=`${14}px sans-serif`;
  ctx.fillStyle='#888';
  ctx.fillText('Bullet Dance',W/2,cy+106);

  // Personal best
  const best=getPersonalBest(GAME_ID);
  if(best){
    ctx.font=`${14}px sans-serif`;
    ctx.fillStyle='#aaa';
    ctx.fillText(`最高分: ${formatScore(best.score)}`,W/2,cy+140);
  }

  // Start prompt
  const pulse=0.5+Math.sin(performance.now()/500)*0.3;
  ctx.globalAlpha=pulse;
  ctx.font=`bold ${20}px sans-serif`;
  ctx.fillStyle='#fff';
  ctx.fillText('点击开始',W/2,H*0.72);
  ctx.globalAlpha=1;

  // Instructions
  ctx.font=`${12}px sans-serif`;
  ctx.fillStyle='#555';
  ctx.fillText('左侧滑动移动 · 右侧点击闪避',W/2,H*0.82);
  ctx.fillText('擦弹得分 · 活得更久',W/2,H*0.86);

  ctx.restore();
}

function drawCountdown(){
  // Draw game state underneath faintly
  drawBullets();
  drawPlayer();
  drawHUD();

  ctx.save();
  ctx.globalAlpha=0.6;
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);

  ctx.globalAlpha=1;
  ctx.font=`bold ${72}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle=COLORS.GOLD;
  ctx.fillText(countdownVal,W/2,H/2);
  ctx.restore();
}

function drawGameOver(){
  ctx.save();
  ctx.globalAlpha=0.8;
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;

  if(!gameOverReady){
    ctx.font='bold 20px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText('...',W/2,H/2);
    ctx.restore();
    return;
  }

  const cy=H*0.15;

  const lsp=24; // line spacing
  ctx.font=`bold ${26}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle=COLORS.RED;
  ctx.fillText('游戏结束',W/2,cy);

  // Time survived
  const mins=Math.floor(gameTime/60);
  const secs=Math.floor(gameTime%60);
  ctx.font=`${16}px sans-serif`;
  ctx.fillStyle='#aaa';
  ctx.fillText(`存活时间: ${mins}:${secs.toString().padStart(2,'0')}`,W/2,cy+38);

  ctx.font=`bold ${32}px sans-serif`;
  ctx.fillStyle=COLORS.GOLD;
  ctx.fillText(formatScore(Math.floor(score)),W/2,cy+80);

  ctx.font=`${12}px sans-serif`;
  ctx.fillStyle='#777';
  ctx.fillText(`存活 ${Math.floor(gameTime)}秒 · 波次 ${waveNum} · 最高${[1,1.2,1.5,2.0][survivalCombo]}x连续倍率`,W/2,cy+108);

  // Mini Leaderboard
  const board=getLeaderboard(GAME_ID);
  const top5=board.slice(0,5);
  let lbBottom=cy+130;
  if(top5.length>0){
    const lbW=Math.min(W*0.85,320);
    const lbX=W/2-lbW/2;
    const lbY=cy+130;
    renderMiniLeaderboard(ctx,lbX,lbY,lbW,top5,gameOverRank);
    const lbH=top5.length*Math.round(Math.max(13,Math.round(lbW/20))*2.2)+8;
    lbBottom=lbY+lbH;
  }

  // Retry
  const retryY=Math.min(lbBottom+30,H*0.85);
  const pulse=0.5+Math.sin(performance.now()/500)*0.3;
  ctx.globalAlpha=pulse;
  ctx.font=`bold ${20}px sans-serif`;
  ctx.textAlign='center';
  ctx.fillStyle='#fff';
  ctx.fillText('再来一局',W/2,retryY);
  ctx.globalAlpha=1;

  // Lobby button
  ctx.font=`bold ${14}px sans-serif`;
  ctx.fillStyle='rgba(212,168,75,0.7)';
  ctx.fillText('\u8FD4\u56DE\u5927\u5385',W/2,H*0.93);

  ctx.restore();
}

// ── Go ──
init().catch(e=>console.error('Init failed:',e));
</script>
