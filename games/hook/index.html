<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>钟馗·黄金矿工</title>
<link rel="stylesheet" href="../../shared/styles.css">
<style>
:root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;touch-action:none;user-select:none;-webkit-user-select:none}
#game{width:100%;height:100%;position:fixed;inset:0}
</style>
</head>
<body>
<div id="game"></div>
<script type="module">
import{createCanvas,createGameLoop,createTapDetector,createParticleSystem,createFloatingText,circleCollision,lineCircleCollision,showOverlay,drawRoundRect,formatScore,COLORS}from'../../shared/engine.js';
import{loadHeroList,getHeroById,getRandomHeroes,preloadAvatars,getAvatarImage,GAME_HEROES,HERO_TYPES,TARGET_COLORS,HERO_ABILITIES}from'../../shared/heroes.js';
import{initAudio}from'../../shared/audio.js';
import{addScore,getLeaderboard,getPersonalBest}from'../../shared/leaderboard.js';
import{getCurrentSeason}from'../../shared/season.js';

// ═══════════════════════════════════════════════════════════
// Constants
// ═══════════════════════════════════════════════════════════
const GAME_ID = 'hook';
const TOTAL_ROUNDS = 3;
const ROUND_TIME = 30;
const COUNTDOWN_TIME = 3;

// Hook physics
const SWING_SPEED = 1.8;        // radians/sec (angular, no scale)
const SWING_ARC = Math.PI * 0.35; // ~63 degrees each side
const HOOK_EXTEND_SPEED_BASE = 450; // px/sec
const HOOK_RETRACT_EMPTY = 500;
const HOOK_TIP_RADIUS = 8;

// Target types
const T_MINION = 0;
const T_MARKSMAN = 1;
const T_MAGE = 2;
const T_WARRIOR = 3;
const T_ASSASSIN = 4;
const T_TANK = 5;
const T_TREASURE = 6;
const T_BOMB = 7;

const TARGET_DEFS = {
  [T_MINION]:   { radius: 14, score: 10,  weight: 0.2, retractMul: 1.0,  label: '小兵' },
  [T_MARKSMAN]: { radius: 26, score: 30,  weight: 0.5, retractMul: 0.75, label: '射手' },
  [T_MAGE]:     { radius: 26, score: 30,  weight: 0.5, retractMul: 0.75, label: '法师' },
  [T_WARRIOR]:  { radius: 28, score: 50,  weight: 0.7, retractMul: 0.5,  label: '战士' },
  [T_ASSASSIN]: { radius: 26, score: 50,  weight: 0.6, retractMul: 0.55, label: '刺客' },
  [T_TANK]:     { radius: 34, score: 100, weight: 1.0, retractMul: 0.25, label: '坦克' },
  [T_TREASURE]: { radius: 20, score: 0,   weight: 0.3, retractMul: 0.9,  label: '宝箱' },
  [T_BOMB]:     { radius: 22, score:-200, weight: 0.3, retractMul: 0.8,  label: '炸弹' },
};

// Hero type to target type mapping
const HERO_TYPE_MAP = { 5: T_MARKSMAN, 2: T_MAGE, 1: T_WARRIOR, 4: T_ASSASSIN, 3: T_TANK, 6: T_WARRIOR };

// Colors
const COL_GOLD = '#D4A84B';
const COL_LIGHT_GOLD = '#F0D78C';
const COL_DARK = '#1A1A2E';
const COL_RED = '#E74C3C';
const COL_BG_TOP = '#0a0a1a';
const COL_BG_BOT = '#141428';

// ═══════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════
const Phase = { LOADING: 0, TITLE: 1, COUNTDOWN: 2, PLAYING: 3, ROUND_END: 4, GAMEOVER: 5 };
let phase = Phase.LOADING;

let screen, ctx, W, H;
let safeTop = 0, safeBottom = 0;
let audio = null;
let tapDetector;
let particles, floatingText;
let season;

// Hook state
let hookPivotX, hookPivotY;
let hookAngle = 0;        // current swing angle (0 = straight down)
let hookSwingDir = 1;      // 1 = swinging right, -1 = left
let hookState = 'swing';   // 'swing' | 'extending' | 'retracting'
let hookLength = 0;
let hookMaxLength = 0;
let hookExtendAngle = 0;   // angle locked when launched
let hookTipX = 0, hookTipY = 0;
let hookRetractSpeed = 0;
let hookedTarget = null;

// Game state
let score = 0;
let currentRound = 1;
let roundTimer = ROUND_TIME;
let countdownTimer = 0;
let countdownVal = 3;
let roundEndTimer = 0;
let bonusTimeAdded = 0;

// Targets
let targets = [];

// Preloaded hero data
let heroPool = [];
let tankHeroes = [];
let otherHeroes = [];

// Title screen
let titlePulse = 0;
let bestScore = null;

// Game over
let finalScore = 0;
let isNewRecord = false;
let leaderboard = [];

// Zhong Kui avatar
let zhongkuiImg = null;

// ── Soul System (灵魂收集) ──
let soulCount = 0;
const SOUL_MAX = 5;
let soulOrbitAngle = 0;      // animated orbit
let ultAvailable = false;
let ultActive = false;
let ultTimer = 0;
const ULT_DURATION = 2.0;     // seconds targets are pulled
let ultUsedThisRound = false;

// ── Fear Aura (恐惧光环) ──
// Targets that got "near-missed" receive a fear debuff
// { target, timer }
let fearedTargets = [];

// ── Hero ability state on targets ──
// Extra fields added to target objects:
//   shieldHP: number (for 亚瑟 shield)
//   isClone: boolean (for 孙悟空 clone - gives 0 pts)
//   immuneUsed: boolean (for 庄周 - first hook passes through)
//   dashTimer: number (for 韩信 - direction change timer)
//   blinkUsed: boolean (for 公孙离 - teleport once)
//   fireTrails: [{x,y,timer}] (for 安琪拉 fire trail)
let fireTrails = [];   // global fire trails from 安琪拉

// List of ability hero enames that can appear per round
const ABILITY_ENAMES_R2 = [109, 107, 112]; // 妲己, 赵云, 鲁班 (easy abilities)
const ABILITY_ENAMES_R3 = [109, 107, 112, 150, 166, 142, 167, 113, 105, 199]; // all

// ═══════════════════════════════════════════════════════════
// Initialization
// ═══════════════════════════════════════════════════════════
async function init() {
  screen = createCanvas(document.getElementById('game'));
  ({ ctx, width: W, height: H } = screen);
  safeTop = screen.safeTop;
  safeBottom = screen.safeBottom;

  const ro = new ResizeObserver(() => {
    W = screen.width; H = screen.height;
    safeTop = screen.safeTop;
    safeBottom = screen.safeBottom;
  });
  ro.observe(screen.canvas);

  particles = createParticleSystem(300);
  floatingText = createFloatingText();

  tapDetector = createTapDetector(screen.canvas);
  tapDetector.onTap = (x, y) => {
    window._lastTouchTime = Date.now();
    handleTap(x, y);
  };

  // Also support mouse click for desktop testing (with double-tap guard)
  screen.canvas.addEventListener('mousedown', (e) => {
    if (window._lastTouchTime && Date.now() - window._lastTouchTime < 500) return;
    if (e.button === 0) {
      const rect = screen.canvas.getBoundingClientRect();
      handleTap(e.clientX - rect.left, e.clientY - rect.top);
    }
  });

  // Load data
  season = getCurrentSeason();
  await loadHeroList();

  // Build hero pools for targets
  const allTargetIds = [
    GAME_HEROES.DAJI, GAME_HEROES.ZHAOYUN, GAME_HEROES.LUBAN,
    GAME_HEROES.HANXIN, GAME_HEROES.YASE, GAME_HEROES.ANQILA,
    GAME_HEROES.SUNWUKONG, GAME_HEROES.ZHUANGZHOU, GAME_HEROES.LIANPO,
    GAME_HEROES.GONGSUNLI
  ];

  // Preload all needed avatars
  await preloadAvatars([GAME_HEROES.ZHONGKUI, ...allTargetIds]);
  zhongkuiImg = getAvatarImage(GAME_HEROES.ZHONGKUI);

  // Categorize heroes by type for spawning
  for (const eid of allTargetIds) {
    const hero = await getHeroById(eid);
    if (!hero) continue;
    const ttype = HERO_TYPE_MAP[hero.hero_type] || T_WARRIOR;
    const entry = { ename: eid, cname: hero.cname, ttype };
    if (ttype === T_TANK) tankHeroes.push(entry);
    else otherHeroes.push(entry);
    heroPool.push(entry);
  }

  bestScore = getPersonalBest(GAME_ID);

  // Start
  phase = Phase.TITLE;
  // BGM will start on first user interaction (initAudioOnce → startGame flow)
  const loop = createGameLoop(update, render);
  loop.start();
}

// ═══════════════════════════════════════════════════════════
// Input
// ═══════════════════════════════════════════════════════════
function handleTap(x, y) {
  W = screen.width; H = screen.height;

  if (phase === Phase.TITLE) {
    initAudioOnce();
    if (audio) { audio.playBGM('hook'); audio.setBGMVolume(0.2); }
    if (x < W * 0.25 && y < H * 0.08) {
      if (audio) audio.stopBGM(0.3);
      window.location.href = '../../index.html';
      return;
    }
    startGame();
    return;
  }
  if (phase === Phase.GAMEOVER) {
    // Check lobby button (rendered at H*0.93)
    if (y >= H * 0.90 && y <= H * 0.97 && x >= W / 2 - 80 && x <= W / 2 + 80) {
      if (audio) audio.stopBGM(0.3);
      window.location.href = '../../index.html';
      return;
    }
    startGame();
    return;
  }
  if (phase === Phase.PLAYING) {
    // Check ult button tap (bottom center)
    const ultBtnY = H - safeBottom - 55;
    const ultBtnW = 100, ultBtnH = 40;
    const ultBtnX = W / 2 - ultBtnW / 2;
    if (ultAvailable && !ultUsedThisRound &&
        x >= ultBtnX && x <= ultBtnX + ultBtnW &&
        y >= ultBtnY && y <= ultBtnY + ultBtnH) {
      activateUlt();
      return;
    }
    if (hookState === 'swing') {
      launchHook();
    }
  }
}

function initAudioOnce() {
  if (!audio) {
    try { audio = initAudio(); } catch(e) { console.warn('Audio init failed', e); }
  }
}

// ═══════════════════════════════════════════════════════════
// Game flow
// ═══════════════════════════════════════════════════════════
function startGame() {
  initAudioOnce();
  if (audio) { audio.playBGM('hook'); audio.setBGMVolume(0.35); }
  if (audio) audio.playStart();

  score = 0;
  currentRound = 1;
  soulCount = 0;
  ultAvailable = false;
  ultActive = false;
  ultTimer = 0;
  fearedTargets = [];
  fireTrails = [];
  phase = Phase.COUNTDOWN;
  countdownVal = 3;
  countdownTimer = 0;
  targets = [];
  resetHook();
  prepareRound();
}

function prepareRound() {
  targets = [];
  roundTimer = ROUND_TIME;
  bonusTimeAdded = 0;
  ultUsedThisRound = false;
  fearedTargets = [];
  fireTrails = [];
  resetHook();
  spawnTargetsForRound(currentRound);
}

function resetHook() {
  hookPivotX = W / 2;
  hookPivotY = H * 0.22;
  hookAngle = 0;
  hookSwingDir = 1;
  hookState = 'swing';
  hookLength = 0;
  hookMaxLength = H * 0.75;
  hookedTarget = null;
}

function launchHook() {
  if (hookState !== 'swing') return;
  hookState = 'extending';
  hookExtendAngle = hookAngle;
  hookLength = 0;
  hookedTarget = null;
  if (audio) audio.playHook();
}

function activateUlt() {
  ultActive = true;
  ultTimer = ULT_DURATION;
  ultAvailable = false;
  ultUsedThisRound = true;
  soulCount = 0;
  if (audio) { if (audio.playUlt) audio.playUlt(); else audio.playScore(); }
  floatingText.add(W / 2, H * 0.35, '魂引!', { color: '#AA88FF', size: 36, duration: 1.5 });
  particles.emit(W / 2, H * 0.15, { count: 25, speed: 180, color: '#AA88FF', size: 5, life: 1.0 });
}

function startNextRound() {
  currentRound++;
  if (currentRound > TOTAL_ROUNDS) {
    endGame();
    return;
  }
  phase = Phase.COUNTDOWN;
  countdownVal = 3;
  countdownTimer = 0;
  prepareRound();
}

function endGame() {
  phase = Phase.GAMEOVER;
  finalScore = score;
  const result = addScore(GAME_ID, finalScore, GAME_HEROES.ZHONGKUI, '玩家');
  isNewRecord = result.rank === 1;
  leaderboard = getLeaderboard(GAME_ID).slice(0, 5);
  bestScore = getPersonalBest(GAME_ID);
  if (audio) {
    audio.setBGMVolume(0.15);
    if (isNewRecord) { audio.playNewRecord(); } else { audio.playDeath(); }
  }
}

// ═══════════════════════════════════════════════════════════
// Target Spawning
// ═══════════════════════════════════════════════════════════
function spawnTargetsForRound(round) {
  const speedMod = season.modifiers?.speedMultiplier || 1;
  const lanes = [
    { y: H * 0.38, speedBase: 40 * speedMod },
    { y: H * 0.52, speedBase: 55 * speedMod },
    { y: H * 0.66, speedBase: 35 * speedMod },
    { y: H * 0.80, speedBase: 25 * speedMod },
  ];

  // Round difficulty scaling
  let minionCount, heroCount, bombCount, treasureCount, tankCount;
  if (round === 1) {
    minionCount = 8; heroCount = 4; bombCount = 0; treasureCount = 1; tankCount = 0;
  } else if (round === 2) {
    minionCount = 6; heroCount = 6; bombCount = 2; treasureCount = 1; tankCount = 1;
  } else {
    minionCount = 4; heroCount = 7; bombCount = 3; treasureCount = 2; tankCount = 2;
  }

  const roundSpeedScale = 1 + (round - 1) * 0.25;

  // Spawn minions
  for (let i = 0; i < minionCount; i++) {
    const lane = lanes[Math.floor(Math.random() * lanes.length)];
    targets.push(createMinion(lane, roundSpeedScale));
  }

  // Spawn heroes
  const shuffledHeroes = [...otherHeroes].sort(() => Math.random() - 0.5);
  for (let i = 0; i < heroCount; i++) {
    const hero = shuffledHeroes[i % shuffledHeroes.length];
    const lane = lanes[Math.floor(Math.random() * lanes.length)];
    targets.push(createHeroTarget(hero, lane, roundSpeedScale));
  }

  // Spawn tanks
  const shuffledTanks = [...tankHeroes].sort(() => Math.random() - 0.5);
  for (let i = 0; i < tankCount; i++) {
    const hero = shuffledTanks[i % Math.max(1, shuffledTanks.length)];
    const deepLane = lanes[2 + Math.floor(Math.random() * 2)]; // deeper lanes
    targets.push(createHeroTarget(hero || shuffledHeroes[0], deepLane, roundSpeedScale, true));
  }

  // Spawn bombs
  for (let i = 0; i < bombCount; i++) {
    const lane = lanes[Math.floor(Math.random() * lanes.length)];
    targets.push(createBomb(lane, roundSpeedScale));
  }

  // Spawn treasure
  for (let i = 0; i < treasureCount; i++) {
    const lane = lanes[1 + Math.floor(Math.random() * 2)];
    targets.push(createTreasure(lane, roundSpeedScale));
  }
}

function createMinion(lane, speedScale) {
  const dir = Math.random() < 0.5 ? 1 : -1;
  const vx = dir * (lane.speedBase + Math.random() * 30) * speedScale;
  return {
    type: T_MINION,
    x: dir > 0 ? -20 + Math.random() * W * 0.8 : W + 20 - Math.random() * W * 0.8,
    y: lane.y + (Math.random() - 0.5) * 30,
    vx,
    radius: TARGET_DEFS[T_MINION].radius,
    ename: null,
    color: randomMinionColor(),
    alive: true,
    pulse: Math.random() * Math.PI * 2,
    ability: null, fearTimer: 0, fearTint: 0, origSpeed: vx,
    shieldHP: 0, isClone: false, immuneUsed: false, immuneCooldown: 0,
    dashTimer: 0, blinkUsed: false,
  };
}

function createHeroTarget(hero, lane, speedScale, forceTank = false) {
  const ttype = forceTank ? T_TANK : hero.ttype;
  const def = TARGET_DEFS[ttype];
  const dir = Math.random() < 0.5 ? 1 : -1;
  let vx = dir * (lane.speedBase * (ttype === T_TANK ? 0.5 : 0.7) + Math.random() * 20) * speedScale;
  let radius = def.radius;

  const t = {
    type: ttype,
    x: dir > 0 ? -30 + Math.random() * W * 0.7 : W + 30 - Math.random() * W * 0.7,
    y: lane.y + (Math.random() - 0.5) * 25,
    vx,
    radius,
    ename: hero.ename,
    cname: hero.cname,
    color: null,
    alive: true,
    pulse: Math.random() * Math.PI * 2,
    // Ability fields
    ability: null,
    shieldHP: 0,
    isClone: false,
    immuneUsed: false,
    immuneCooldown: 0,
    dashTimer: 2 + Math.random(),
    blinkUsed: false,
    fearTimer: 0,
    fearTint: 0,
    origSpeed: vx,
  };

  // Apply hero ability based on round
  const abilityData = HERO_ABILITIES[hero.ename];
  const activeAbilities = currentRound === 1 ? [] : currentRound === 2 ? ABILITY_ENAMES_R2 : ABILITY_ENAMES_R3;
  if (abilityData && activeAbilities.includes(hero.ename)) {
    t.ability = abilityData.passive;
    switch (abilityData.passive) {
      case 'charge': // 赵云: 1.5x speed, occasional burst
        t.vx *= 1.5;
        t.origSpeed = t.vx;
        break;
      case 'tiny': // 鲁班: 70% size, 1.3x speed
        t.radius = Math.round(radius * 0.7);
        t.vx *= 1.3;
        t.origSpeed = t.vx;
        break;
      case 'shield': // 亚瑟: needs 2 hooks
        t.shieldHP = 1;
        break;
      case 'heavy': // 廉颇: very slow retract, 150 pts
        // We override score in processCapture
        break;
      case 'clone': // 孙悟空: 30% chance to spawn clone
        if (Math.random() < 0.3) {
          t.isClone = true;
        }
        break;
      case 'immune': // 庄周: first hook passes through
        t.immuneUsed = false;
        break;
      case 'blink': // 公孙离: teleports when hook is near
        t.blinkUsed = false;
        break;
      // charm, dash, fire handled in update logic
    }
  }
  return t;
}

function createBomb(lane, speedScale) {
  const dir = Math.random() < 0.5 ? 1 : -1;
  const vxB = dir * (lane.speedBase * 0.8 + Math.random() * 25) * speedScale;
  return {
    type: T_BOMB,
    x: dir > 0 ? Math.random() * W * 0.6 : W - Math.random() * W * 0.6,
    y: lane.y + (Math.random() - 0.5) * 20,
    vx: vxB,
    radius: TARGET_DEFS[T_BOMB].radius,
    ename: null,
    color: TARGET_COLORS.DANGER,
    alive: true,
    pulse: Math.random() * Math.PI * 2,
    ability: null, fearTimer: 0, fearTint: 0, origSpeed: vxB,
    shieldHP: 0, isClone: false, immuneUsed: false, immuneCooldown: 0, dashTimer: 0, blinkUsed: false,
  };
}

function createTreasure(lane, speedScale) {
  const dir = Math.random() < 0.5 ? 1 : -1;
  const vxT = dir * (lane.speedBase * 0.6 + Math.random() * 15) * speedScale;
  return {
    type: T_TREASURE,
    x: dir > 0 ? Math.random() * W * 0.5 : W * 0.5 + Math.random() * W * 0.5,
    y: lane.y + (Math.random() - 0.5) * 20,
    vx: vxT,
    radius: TARGET_DEFS[T_TREASURE].radius,
    ename: null,
    color: TARGET_COLORS.SPECIAL,
    alive: true,
    pulse: Math.random() * Math.PI * 2,
    ability: null, fearTimer: 0, fearTint: 0, origSpeed: vxT,
    shieldHP: 0, isClone: false, immuneUsed: false, immuneCooldown: 0, dashTimer: 0, blinkUsed: false,
  };
}

function randomMinionColor() {
  const colors = ['#7B68EE', '#5BC0EB', '#9ACD32', '#DDA0DD', '#87CEEB', '#F0E68C'];
  return colors[Math.floor(Math.random() * colors.length)];
}

// ═══════════════════════════════════════════════════════════
// Update
// ═══════════════════════════════════════════════════════════
function update(dt) {
  W = screen.width; H = screen.height;
  hookPivotX = W / 2;
  hookPivotY = H * 0.22;
  hookMaxLength = H * 0.75;

  particles.update(dt);
  floatingText.update(dt);

  switch (phase) {
    case Phase.TITLE:
      titlePulse += dt * 2;
      updateHookSwing(dt);
      break;

    case Phase.COUNTDOWN:
      countdownTimer += dt;
      if (countdownTimer >= 1) {
        countdownTimer -= 1;
        countdownVal--;
        if (audio) audio.playCountdown();
        if (countdownVal <= 0) {
          phase = Phase.PLAYING;
          if (audio) audio.playStart();
        }
      }
      updateHookSwing(dt);
      break;

    case Phase.PLAYING:
      updatePlaying(dt);
      break;

    case Phase.ROUND_END:
      roundEndTimer += dt;
      if (roundEndTimer >= 2.5) {
        startNextRound();
      }
      break;

    case Phase.GAMEOVER:
      titlePulse += dt * 2;
      break;
  }
}

function updatePlaying(dt) {
  // Timer
  roundTimer -= dt;
  if (roundTimer <= 0) {
    roundTimer = 0;
    phase = Phase.ROUND_END;
    roundEndTimer = 0;
    resetHook();
    return;
  }

  // Soul orbit animation
  soulOrbitAngle += dt * 2.5;

  // Ult pull logic
  if (ultActive) {
    ultTimer -= dt;
    const centerX = W / 2, centerY = H * 0.55;
    for (const t of targets) {
      if (!t.alive || t === hookedTarget) continue;
      const dx = centerX - t.x, dy = centerY - t.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 5) {
        const pullSpeed = 200;
        t.x += (dx / dist) * pullSpeed * dt;
        t.y += (dy / dist) * pullSpeed * dt;
      }
    }
    if (ultTimer <= 0) {
      ultActive = false;
    }
  }

  // Update fear timers
  for (let i = fearedTargets.length - 1; i >= 0; i--) {
    fearedTargets[i].timer -= dt;
    if (fearedTargets[i].timer <= 0) {
      const ft = fearedTargets[i].target;
      if (ft.alive) { ft.vx = ft.origSpeed || ft.vx; ft.fearTint = 0; }
      fearedTargets.splice(i, 1);
    }
  }

  // Update fire trails (安琪拉)
  for (let i = fireTrails.length - 1; i >= 0; i--) {
    fireTrails[i].timer -= dt;
    if (fireTrails[i].timer <= 0) fireTrails.splice(i, 1);
  }

  // Update targets
  for (const t of targets) {
    if (!t.alive) continue;
    if (t === hookedTarget) continue;

    // Hero ability: 韩信 dash — change direction randomly
    if (t.ability === 'dash') {
      t.dashTimer -= dt;
      if (t.dashTimer <= 0) {
        t.dashTimer = 2 + Math.random();
        t.vx = -t.vx * (0.8 + Math.random() * 0.4);
        t.origSpeed = t.vx;
      }
    }

    // Hero ability: 赵云 charge — occasional burst
    if (t.ability === 'charge' && Math.random() < 0.005) {
      t.vx = t.origSpeed * (1.8 + Math.random() * 0.5) * Math.sign(t.vx);
      setTimeout(() => { if (t.alive) t.vx = t.origSpeed; }, 400);
    }

    // Hero ability: 安琪拉 fire — leave trail
    if (t.ability === 'fire') {
      if (!t._lastTrailX || Math.abs(t.x - t._lastTrailX) > 20) {
        fireTrails.push({ x: t.x, y: t.y, timer: 3.0 });
        t._lastTrailX = t.x;
      }
    }

    // Hero ability: 庄周 immune cooldown
    if (t.ability === 'immune' && t.immuneCooldown > 0) {
      t.immuneCooldown -= dt;
    }

    // Apply fear slow
    if (t.fearTimer > 0) {
      t.x += t.vx * 0.5 * dt; // 0.5x speed
      t.fearTimer -= dt;
      t.fearTint = Math.max(0, t.fearTimer);
    } else {
      t.x += t.vx * dt;
    }
    t.pulse += dt * 3;

    // Wrap/bounce
    if (t.x < -t.radius * 2) t.x = W + t.radius;
    else if (t.x > W + t.radius * 2) t.x = -t.radius;
  }

  // Update hook
  switch (hookState) {
    case 'swing':
      updateHookSwing(dt);
      break;

    case 'extending':
      hookLength += HOOK_EXTEND_SPEED_BASE * dt;
      updateHookTip();

      // Check fire trail collision (安琪拉 penalty)
      for (const ft of fireTrails) {
        const dx = hookTipX - ft.x, dy = hookTipY - ft.y;
        if (dx * dx + dy * dy < 20 * 20) {
          score = Math.max(0, score - 50);
          floatingText.add(hookTipX, hookTipY, '-50', { color: '#FF4400', size: 22, duration: 0.8 });
          particles.emit(hookTipX, hookTipY, { count: 8, speed: 80, color: '#FF4400', size: 3, life: 0.5 });
          ft.timer = 0; // consume trail
          break;
        }
      }

      // Check collision with targets
      let hooked = false;
      for (const t of targets) {
        if (!t.alive) continue;
        const dist = Math.sqrt((hookTipX - t.x) ** 2 + (hookTipY - t.y) ** 2);

        // Hero ability: 公孙离 blink
        if (t.ability === 'blink' && !t.blinkUsed && dist < 40 + t.radius) {
          t.blinkUsed = true;
          t.x = Math.random() * (W * 0.6) + W * 0.2;
          t.y = t.y + (Math.random() - 0.5) * 60;
          particles.emit(t.x, t.y, { count: 8, speed: 100, color: '#00FFFF', size: 3, life: 0.4 });
          continue;
        }

        if (circleCollision(hookTipX, hookTipY, HOOK_TIP_RADIUS, t.x, t.y, t.radius)) {
          // Hero ability: 庄周 immune — first hook passes through
          if (t.ability === 'immune' && !t.immuneUsed && t.immuneCooldown <= 0) {
            t.immuneUsed = true;
            t.immuneCooldown = 2.0;
            floatingText.add(t.x, t.y, '免疫!', { color: '#44DDFF', size: 18, duration: 0.6 });
            continue;
          }
          // After cooldown, 庄周 can be hooked normally (immuneUsed is true)

          // Hero ability: 亚瑟 shield — bounces first hit
          if (t.ability === 'shield' && t.shieldHP > 0) {
            t.shieldHP--;
            floatingText.add(t.x, t.y, '护盾!', { color: '#3498DB', size: 18, duration: 0.6 });
            particles.emit(t.x, t.y, { count: 8, speed: 80, color: '#3498DB', size: 3, life: 0.4 });
            if (audio) audio.playHit();
            // Bounce hook back
            hookState = 'retracting';
            hookRetractSpeed = HOOK_RETRACT_EMPTY;
            hookedTarget = null;
            hooked = true;
            break;
          }

          // Normal hook
          hookedTarget = t;
          hookState = 'retracting';
          const def = TARGET_DEFS[t.type];
          let retractMul = def.retractMul;
          // 廉颇 heavy: 0.2x retract
          if (t.ability === 'heavy') retractMul = 0.2;
          hookRetractSpeed = HOOK_RETRACT_EMPTY * retractMul;
          if (audio) audio.playHit();
          hooked = true;
          break;
        }

        // Fear aura: near-miss detection (within 1.5x target radius but not touching)
        if (dist < t.radius * 1.5 + HOOK_TIP_RADIUS && dist > t.radius + HOOK_TIP_RADIUS) {
          if (!fearedTargets.find(f => f.target === t) && t.fearTimer <= 0) {
            t.fearTimer = 1.0;
            t.fearTint = 1.0;
            fearedTargets.push({ target: t, timer: 1.0 });
          }
        }
      }

      // Max length or off screen
      if (!hooked && (hookLength >= hookMaxLength || hookTipY > H + 10 || hookTipX < -20 || hookTipX > W + 20)) {
        hookState = 'retracting';
        hookRetractSpeed = HOOK_RETRACT_EMPTY;
        hookedTarget = null;
      }
      break;

    case 'retracting':
      const retractAmount = (hookedTarget ? hookRetractSpeed : HOOK_RETRACT_EMPTY) * dt;
      hookLength -= retractAmount;

      if (hookedTarget) {
        updateHookTip();
        hookedTarget.x = hookTipX;
        hookedTarget.y = hookTipY;
      }

      if (hookLength <= 0) {
        hookLength = 0;
        hookState = 'swing';

        if (hookedTarget) {
          processCapture(hookedTarget);
          hookedTarget = null;
        }
      }
      break;
  }
}

function updateHookSwing(dt) {
  hookAngle += hookSwingDir * SWING_SPEED * dt;
  if (hookAngle > SWING_ARC) { hookAngle = SWING_ARC; hookSwingDir = -1; }
  if (hookAngle < -SWING_ARC) { hookAngle = -SWING_ARC; hookSwingDir = 1; }
}

function updateHookTip() {
  // Angle: 0 = straight down, positive = right
  const angle = hookExtendAngle + Math.PI / 2; // convert so 0 = down
  hookTipX = hookPivotX + Math.cos(angle) * hookLength;
  hookTipY = hookPivotY + Math.sin(angle) * hookLength;
}

function processCapture(target) {
  const def = TARGET_DEFS[target.type];
  const scoreMod = season.modifiers?.scoreMultiplier || 1;

  if (target.type === T_BOMB) {
    const pts = Math.round(def.score * scoreMod);
    score = Math.max(0, score + pts);
    floatingText.add(target.x, target.y, `${pts}`, { color: TARGET_COLORS.DANGER, size: 28, duration: 1.2 });
    particles.emit(target.x, target.y, { count: 15, speed: 150, color: TARGET_COLORS.DANGER, size: 5, life: 0.6 });
    if (audio) { audio.playExplosion(); audio.playDeath(); }
  } else if (target.type === T_TREASURE) {
    const bonus = 5;
    roundTimer += bonus;
    bonusTimeAdded += bonus;
    floatingText.add(target.x, target.y, `+${bonus}秒!`, { color: '#00FF88', size: 28, duration: 1.5 });
    particles.emit(target.x, target.y, { count: 20, speed: 120, color: TARGET_COLORS.SPECIAL, size: 4, life: 0.8 });
    if (audio) audio.playPickup();
  } else {
    // Clone check (孙悟空)
    if (target.isClone) {
      floatingText.add(target.x, target.y, '分身!', { color: '#888', size: 20, duration: 0.8 });
      target.alive = false;
      return;
    }

    // 廉颇 heavy: override score to 150
    let pts;
    if (target.ability === 'heavy') {
      pts = Math.round(150 * scoreMod);
    } else {
      pts = Math.round(def.score * scoreMod);
    }
    score += pts;
    floatingText.add(target.x, target.y, `+${pts}`, { color: COL_GOLD, size: 26, duration: 1 });
    particles.emit(target.x, target.y, { count: 12, speed: 100, color: COL_GOLD, size: 4, life: 0.7 });
    if (audio) audio.playScore();

    // Soul absorption
    if (soulCount < SOUL_MAX && !ultUsedThisRound) {
      soulCount++;
      particles.emit(hookPivotX, hookPivotY - 20, { count: 5, speed: 50, color: '#AADDFF', size: 3, life: 0.6 });
      if (soulCount >= SOUL_MAX) {
        ultAvailable = true;
        floatingText.add(W / 2, H * 0.3, '魂引就绪!', { color: '#AA88FF', size: 24, duration: 1.5 });
      }
    }

    // Hero ability: 妲己 charm — nearby targets freeze 0.5s
    if (target.ability === 'charm') {
      for (const ot of targets) {
        if (!ot.alive || ot === target) continue;
        const dx = ot.x - target.x, dy = ot.y - target.y;
        if (dx * dx + dy * dy < 80 * 80) {
          ot.fearTimer = Math.max(ot.fearTimer, 0.5);
          ot.fearTint = 0.5;
          particles.emit(ot.x, ot.y, { count: 3, speed: 40, color: '#FF69B4', size: 2, life: 0.3 });
        }
      }
    }
  }

  target.alive = false;
}

// ═══════════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════════
function render() {
  W = screen.width; H = screen.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  drawBackground();

  switch (phase) {
    case Phase.LOADING:
      drawLoadingScreen();
      break;
    case Phase.TITLE:
      drawTargetsPreview();
      drawHook();
      drawZhongKui();
      drawTitleScreen();
      break;
    case Phase.COUNTDOWN:
      drawTargets();
      drawHook();
      drawZhongKui();
      drawHUD();
      drawCountdown();
      break;
    case Phase.PLAYING:
      drawFireTrails();
      drawTargets();
      drawHook();
      drawZhongKui();
      drawSoulOrbs();
      drawHUD();
      drawUltButton();
      if (ultActive) drawUltOverlay();
      break;
    case Phase.ROUND_END:
      drawTargets();
      drawZhongKui();
      drawHUD();
      drawRoundEnd();
      break;
    case Phase.GAMEOVER:
      drawZhongKui();
      drawGameOver();
      break;
  }

  particles.render(ctx);
  floatingText.render(ctx);
}

// ── Background ──
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, COL_BG_TOP);
  grad.addColorStop(0.3, '#0e0e22');
  grad.addColorStop(1, COL_BG_BOT);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Depth grid lines
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = COL_GOLD;
  ctx.lineWidth = 1;
  const gridSpacing = 50;
  for (let y = H * 0.3; y < H * 0.95; y += gridSpacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  for (let x = 0; x < W; x += gridSpacing) {
    ctx.beginPath();
    ctx.moveTo(x, H * 0.3);
    ctx.lineTo(x, H * 0.95);
    ctx.stroke();
  }
  ctx.restore();

  // Lane depth fog - subtle gradient bands
  ctx.save();
  ctx.globalAlpha = 0.03;
  for (let i = 0; i < 4; i++) {
    const ly = H * (0.35 + i * 0.15);
    const bandGrad = ctx.createLinearGradient(0, ly - 20, 0, ly + 20);
    bandGrad.addColorStop(0, 'transparent');
    bandGrad.addColorStop(0.5, COL_GOLD);
    bandGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = bandGrad;
    ctx.fillRect(0, ly - 20, W, 40);
  }
  ctx.restore();
}

// ── Zhong Kui ──
function drawZhongKui() {
  const cx = W / 2;
  const cy = H * 0.15;
  const r = Math.min(W * 0.1, 40);

  // Glow
  ctx.save();
  const glowGrad = ctx.createRadialGradient(cx, cy, r * 0.5, cx, cy, r * 2.5);
  glowGrad.addColorStop(0, 'rgba(212, 168, 75, 0.25)');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(cx - r * 3, cy - r * 3, r * 6, r * 6);
  ctx.restore();

  // Avatar circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();
  if (zhongkuiImg) {
    ctx.drawImage(zhongkuiImg, cx - r, cy - r, r * 2, r * 2);
  } else {
    ctx.fillStyle = '#6B3FA0';
    ctx.fill();
  }
  ctx.restore();

  // Border ring
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r + 2, 0, Math.PI * 2);
  ctx.strokeStyle = COL_GOLD;
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();

  // Name label below
  ctx.save();
  ctx.font = `bold ${Math.round(r * 0.4)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = COL_GOLD;
  ctx.globalAlpha = 0.8;
  ctx.fillText('钟馗', cx, cy + r + Math.round(r * 0.5));
  ctx.restore();
}

// ── Hook ──
function drawHook() {
  let tipX, tipY, angle;

  if (hookState === 'swing') {
    // Show short dangling hook line
    angle = hookAngle + Math.PI / 2;
    const dangLen = 30;
    tipX = hookPivotX + Math.cos(angle) * dangLen;
    tipY = hookPivotY + Math.sin(angle) * dangLen;
    drawChainLine(hookPivotX, hookPivotY, tipX, tipY);
    drawHookClaw(tipX, tipY);
  } else {
    updateHookTip();
    drawChainLine(hookPivotX, hookPivotY, hookTipX, hookTipY);
    drawHookClaw(hookTipX, hookTipY);

    // Draw hooked target being dragged
    if (hookedTarget && hookState === 'retracting') {
      drawSingleTarget(hookedTarget);
    }
  }
}

function drawChainLine(x1, y1, x2, y2) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 1) return;

  const segLen = 8;
  const segments = Math.max(1, Math.floor(len / segLen));
  const nx = dx / len;
  const ny = dy / len;

  ctx.save();

  // Main chain line
  ctx.strokeStyle = COL_GOLD;
  ctx.lineWidth = 2.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Chain links (small circles at intervals)
  ctx.fillStyle = COL_LIGHT_GOLD;
  const linkSpacing = 12;
  const linkCount = Math.floor(len / linkSpacing);
  for (let i = 1; i <= linkCount; i++) {
    const t = i / (linkCount + 1);
    const lx = x1 + dx * t;
    const ly = y1 + dy * t;
    ctx.beginPath();
    ctx.arc(lx, ly, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawHookClaw(x, y) {
  ctx.save();

  // Claw body
  ctx.beginPath();
  ctx.arc(x, y, HOOK_TIP_RADIUS, 0, Math.PI * 2);
  const clawGrad = ctx.createRadialGradient(x - 2, y - 2, 1, x, y, HOOK_TIP_RADIUS);
  clawGrad.addColorStop(0, '#FFE4A0');
  clawGrad.addColorStop(1, COL_GOLD);
  ctx.fillStyle = clawGrad;
  ctx.fill();
  ctx.strokeStyle = '#A88430';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Claw prongs
  const prongs = 3;
  const prongLen = 6;
  // Point downward by default
  let baseAngle;
  if (hookState === 'swing') {
    baseAngle = hookAngle + Math.PI / 2;
  } else {
    baseAngle = hookExtendAngle + Math.PI / 2;
  }

  ctx.strokeStyle = COL_GOLD;
  ctx.lineWidth = 2;
  for (let i = 0; i < prongs; i++) {
    const a = baseAngle + (i - 1) * 0.4;
    const px = x + Math.cos(a) * (HOOK_TIP_RADIUS + prongLen);
    const py = y + Math.sin(a) * (HOOK_TIP_RADIUS + prongLen);
    ctx.beginPath();
    ctx.moveTo(x + Math.cos(a) * HOOK_TIP_RADIUS, y + Math.sin(a) * HOOK_TIP_RADIUS);
    ctx.lineTo(px, py);
    ctx.stroke();
  }

  ctx.restore();
}

// ── Targets ──
function drawTargets() {
  for (const t of targets) {
    if (!t.alive) continue;
    if (t === hookedTarget && hookState === 'retracting') continue; // drawn by hook
    drawSingleTarget(t);
  }
}

function drawTargetsPreview() {
  // Draw some dummy targets for the title screen
  const time = titlePulse;
  ctx.save();
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < 5; i++) {
    const x = (W * 0.2 + i * W * 0.15 + Math.sin(time + i) * 20) % W;
    const y = H * 0.45 + i * 40;
    ctx.beginPath();
    ctx.arc(x, y, 15, 0, Math.PI * 2);
    ctx.fillStyle = ['#7B68EE', '#5BC0EB', COL_GOLD, '#9ACD32', '#DDA0DD'][i];
    ctx.fill();
  }
  ctx.restore();
}

function drawSingleTarget(t) {
  const def = TARGET_DEFS[t.type];
  const pulseScale = 1 + Math.sin(t.pulse) * 0.05;
  const r = t.radius * pulseScale;

  ctx.save();

  switch (t.type) {
    case T_MINION:
      // Simple colored circle with a face
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      ctx.fillStyle = t.color;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(t.x - r * 0.25, t.y - r * 0.15, r * 0.2, 0, Math.PI * 2);
      ctx.arc(t.x + r * 0.25, t.y - r * 0.15, r * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(t.x - r * 0.25, t.y - r * 0.12, r * 0.1, 0, Math.PI * 2);
      ctx.arc(t.x + r * 0.25, t.y - r * 0.12, r * 0.1, 0, Math.PI * 2);
      ctx.fill();
      // Score label
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = `bold ${Math.round(r * 0.65)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(def.score, t.x, t.y + r * 0.45);
      break;

    case T_MARKSMAN:
    case T_MAGE:
    case T_WARRIOR:
    case T_ASSASSIN:
    case T_TANK: {
      const img = t.ename ? getAvatarImage(t.ename) : null;

      // Semantic border: high-value (50+ pts) = VALUE gold, else DEFAULT
      const isHighValue = def.score >= 50;
      const borderCol = isHighValue ? TARGET_COLORS.VALUE : TARGET_COLORS.DEFAULT;

      // Glow for high-value targets
      if (isHighValue) {
        ctx.save();
        ctx.shadowColor = TARGET_COLORS.VALUE;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(t.x, t.y, r + 4, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.5)';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();
      }

      // Fear tint (purple overlay for near-missed targets)
      if (t.fearTint > 0) {
        ctx.save();
        ctx.globalAlpha = t.fearTint * 0.4;
        ctx.beginPath();
        ctx.arc(t.x, t.y, r + 8, 0, Math.PI * 2);
        ctx.fillStyle = '#8B00FF';
        ctx.fill();
        ctx.restore();
      }

      // Clone transparency (孙悟空)
      if (t.isClone) {
        ctx.save();
        ctx.globalAlpha = 0.45;
      }

      // Clip avatar
      ctx.save();
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      if (img) {
        ctx.drawImage(img, t.x - r, t.y - r, r * 2, r * 2);
      } else {
        ctx.fillStyle = '#555';
        ctx.fill();
      }
      ctx.restore();

      if (t.isClone) ctx.restore(); // end clone transparency

      // Border
      ctx.beginPath();
      ctx.arc(t.x, t.y, r + 1.5, 0, Math.PI * 2);
      ctx.strokeStyle = borderCol;
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // Shield indicator (亚瑟)
      if (t.ability === 'shield' && t.shieldHP > 0) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(t.x, t.y, r + 6, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(52,152,219,0.6)';
        ctx.lineWidth = 3;
        ctx.setLineDash([4, 3]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      // Score badge
      const displayScore = t.ability === 'heavy' ? 150 : def.score;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      const badgeW = r * 1.2;
      const badgeH = r * 0.5;
      drawRoundRect(ctx, t.x - badgeW / 2, t.y + r + 2, badgeW, badgeH, 4);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.round(r * 0.35)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(displayScore, t.x, t.y + r + 2 + badgeH / 2);
      break;
    }

    case T_TREASURE:
      // Cyan sparkle circle (SPECIAL)
      ctx.save();
      ctx.shadowColor = TARGET_COLORS.SPECIAL;
      ctx.shadowBlur = 12 + Math.sin(t.pulse * 2) * 6;
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      const treasGrad = ctx.createRadialGradient(t.x - r * 0.3, t.y - r * 0.3, 1, t.x, t.y, r);
      treasGrad.addColorStop(0, '#E0FFFF');
      treasGrad.addColorStop(0.6, TARGET_COLORS.SPECIAL);
      treasGrad.addColorStop(1, '#0E8C7C');
      ctx.fillStyle = treasGrad;
      ctx.fill();
      ctx.restore();
      // Star/sparkle symbol
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.round(r * 0.9)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('+5s', t.x, t.y);
      // Sparkle particles
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.sin(t.pulse * 3) * 0.3;
      for (let i = 0; i < 4; i++) {
        const a = t.pulse + i * Math.PI / 2;
        const sx = t.x + Math.cos(a) * (r + 5);
        const sy = t.y + Math.sin(a) * (r + 5);
        ctx.fillStyle = TARGET_COLORS.SPECIAL;
        ctx.beginPath();
        ctx.arc(sx, sy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      break;

    case T_BOMB:
      // Red pulsing circle (DANGER)
      ctx.save();
      const bombPulse = 0.8 + Math.sin(t.pulse * 4) * 0.2;
      ctx.shadowColor = TARGET_COLORS.DANGER;
      ctx.shadowBlur = 10 * bombPulse;
      ctx.beginPath();
      ctx.arc(t.x, t.y, r * bombPulse, 0, Math.PI * 2);
      const bombGrad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, r);
      bombGrad.addColorStop(0, '#FF6B6B');
      bombGrad.addColorStop(0.7, COL_RED);
      bombGrad.addColorStop(1, '#8B0000');
      ctx.fillStyle = bombGrad;
      ctx.fill();
      ctx.restore();
      // Lightning symbol
      ctx.fillStyle = '#FFD700';
      ctx.font = `bold ${Math.round(r * 1.1)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u26A1', t.x, t.y);
      // Penalty label
      ctx.fillStyle = COL_RED;
      ctx.font = `bold ${Math.round(r * 0.45)}px sans-serif`;
      ctx.fillText('-200', t.x, t.y + r + 10);
      break;
  }

  ctx.restore();
}

// ── Soul Orbs (orbiting Zhong Kui) ──
function drawSoulOrbs() {
  if (soulCount <= 0) return;
  const cx = W / 2, cy = H * 0.15;
  const orbitR = Math.min(W * 0.1, 40) + 20;
  ctx.save();
  for (let i = 0; i < soulCount; i++) {
    const angle = soulOrbitAngle + (i / SOUL_MAX) * Math.PI * 2;
    const sx = cx + Math.cos(angle) * orbitR;
    const sy = cy + Math.sin(angle) * orbitR * 0.6;
    const grad = ctx.createRadialGradient(sx, sy, 1, sx, sy, 7);
    grad.addColorStop(0, 'rgba(200,220,255,0.9)');
    grad.addColorStop(0.5, 'rgba(150,180,255,0.5)');
    grad.addColorStop(1, 'rgba(100,140,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, 7, 0, Math.PI * 2);
    ctx.fill();
    // tiny bright core
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(sx, sy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ── Ult Button ──
function drawUltButton() {
  if (ultUsedThisRound) return;
  const btnY = H - safeBottom - 55;
  const btnW = 100, btnH = 40;
  const btnX = W / 2 - btnW / 2;

  ctx.save();
  if (ultAvailable) {
    const pulse = 0.7 + Math.sin(soulOrbitAngle * 3) * 0.3;
    ctx.shadowColor = '#AA88FF';
    ctx.shadowBlur = 15 * pulse;
    drawRoundRect(ctx, btnX, btnY, btnW, btnH, 10);
    const grad = ctx.createLinearGradient(btnX, btnY, btnX + btnW, btnY + btnH);
    grad.addColorStop(0, '#7744CC');
    grad.addColorStop(1, '#AA88FF');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.font = 'bold 16px sans-serif';
    ctx.fillStyle = '#FFF';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('魂引', W / 2, btnY + btnH / 2);
  } else {
    drawRoundRect(ctx, btnX, btnY, btnW, btnH, 10);
    ctx.fillStyle = 'rgba(60,40,80,0.4)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(120,100,150,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.font = '12px sans-serif';
    ctx.fillStyle = 'rgba(170,136,255,0.4)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`灵魂 ${soulCount}/${SOUL_MAX}`, W / 2, btnY + btnH / 2);
  }
  ctx.restore();
}

// ── Ult overlay (pull effect) ──
function drawUltOverlay() {
  ctx.save();
  const alpha = 0.15 * (ultTimer / ULT_DURATION);
  ctx.globalAlpha = alpha;
  const grad = ctx.createRadialGradient(W / 2, H * 0.55, 10, W / 2, H * 0.55, H * 0.5);
  grad.addColorStop(0, '#AA88FF');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

// ── Fire Trails (安琪拉) ──
function drawFireTrails() {
  if (fireTrails.length === 0) return;
  ctx.save();
  for (const ft of fireTrails) {
    const alpha = Math.min(1, ft.timer / 1.5) * 0.5;
    ctx.globalAlpha = alpha;
    const grad = ctx.createRadialGradient(ft.x, ft.y, 2, ft.x, ft.y, 12);
    grad.addColorStop(0, 'rgba(255,80,0,0.8)');
    grad.addColorStop(0.6, 'rgba(255,40,0,0.3)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ft.x, ft.y, 12, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ── HUD ──
function drawHUD() {
  ctx.save();

  const st = safeTop + 10;
  const pad = 15;

  // Score - top left
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = 'rgba(212,168,75,0.7)';
  ctx.textAlign = 'left';
  ctx.fillText('得分', pad, st + 14);
  ctx.font = 'bold 28px sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'left';
  ctx.shadowColor = 'rgba(255,215,0,0.4)';
  ctx.shadowBlur = 8;
  ctx.fillText(formatScore(score), pad, st + 42);
  ctx.shadowBlur = 0;

  // Timer - top right
  const timeLeft = Math.ceil(roundTimer);
  const timerColor = timeLeft <= 5 ? COL_RED : COL_GOLD;
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = 'rgba(212,168,75,0.7)';
  ctx.textAlign = 'right';
  ctx.fillText('时间', W - pad, st + 14);
  ctx.font = 'bold 32px sans-serif';
  ctx.fillStyle = timerColor;
  ctx.textAlign = 'right';
  if (timeLeft <= 5) {
    ctx.shadowColor = 'rgba(231,76,60,0.6)';
    ctx.shadowBlur = 10;
  }
  ctx.fillText(timeLeft + 's', W - pad, st + 44);
  ctx.shadowBlur = 0;

  // Round indicator - top center
  ctx.font = 'bold 16px sans-serif';
  ctx.fillStyle = COL_LIGHT_GOLD;
  ctx.textAlign = 'center';
  ctx.fillText(`第 ${currentRound} / ${TOTAL_ROUNDS} 关`, W / 2, st + 14);

  // Soul counter - below round
  if (phase === Phase.PLAYING && !ultUsedThisRound) {
    ctx.font = '12px sans-serif';
    ctx.fillStyle = soulCount >= SOUL_MAX ? '#AA88FF' : 'rgba(170,136,255,0.6)';
    const soulIcons = '\u25CF'.repeat(soulCount) + '\u25CB'.repeat(SOUL_MAX - soulCount);
    ctx.fillText(`\u9B42 ${soulIcons}`, W / 2, st + 30);
  }

  ctx.restore();
}

// ── Screens ──
function drawLoadingScreen() {
  ctx.save();
  ctx.font = 'bold 20px sans-serif';
  ctx.fillStyle = COL_GOLD;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('加载中...', W / 2, H / 2);
  ctx.restore();
}

function drawTitleScreen() {
  ctx.save();

  // Semi-transparent overlay
  ctx.globalAlpha = 0.75;
  ctx.fillStyle = COL_DARK;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // Back button
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = COL_GOLD;
  ctx.fillText('\u2190 \u8FD4\u56DE', 20, safeTop + 40);

  const centerY = H * 0.42;

  // Title
  ctx.font = `bold ${Math.round(Math.min(W * 0.09, 36))}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(255,215,0,0.6)';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#FFD700';
  ctx.fillText('钟馗 \u00B7 黄金矿工', W / 2, centerY - 40);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.font = `${Math.round(Math.min(W * 0.04, 16))}px sans-serif`;
  ctx.fillStyle = 'rgba(212,168,75,0.7)';
  ctx.fillText('王者荣耀 Mini-Game Collection', W / 2, centerY);

  // Season name
  ctx.font = `bold ${Math.round(Math.min(W * 0.035, 14))}px sans-serif`;
  ctx.fillStyle = season.colorScheme?.primary || COL_GOLD;
  ctx.fillText(`\u2014 ${season.name} \u2014`, W / 2, centerY + 25);

  // Personal best
  if (bestScore) {
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(`最高纪录: ${formatScore(bestScore.score)}`, W / 2, centerY + 60);
  }

  // Play button
  const btnY = centerY + 100;
  const btnW = 180;
  const btnH = 50;
  const pulse = 1 + Math.sin(titlePulse * 2) * 0.03;

  ctx.save();
  ctx.translate(W / 2, btnY);
  ctx.scale(pulse, pulse);
  drawRoundRect(ctx, -btnW / 2, -btnH / 2, btnW, btnH, 12);
  const btnGrad = ctx.createLinearGradient(-btnW / 2, 0, btnW / 2, 0);
  btnGrad.addColorStop(0, COL_GOLD);
  btnGrad.addColorStop(1, '#c49a3a');
  ctx.fillStyle = btnGrad;
  ctx.fill();
  ctx.font = 'bold 20px sans-serif';
  ctx.fillStyle = COL_DARK;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('点击开始', 0, 0);
  ctx.restore();

  // Instructions
  ctx.font = '12px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.textAlign = 'center';
  ctx.fillText('点击屏幕发射钩子 \u00B7 抓取英雄得分', W / 2, H * 0.86);
  ctx.fillText('收集灵魂发动魂引 \u00B7 小心炸弹和火焰', W / 2, H * 0.89);
  ctx.fillText('英雄各有特殊能力 \u00B7 宝箱加时', W / 2, H * 0.92);

  ctx.restore();
}

function drawCountdown() {
  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // Round text
  ctx.font = `bold ${Math.min(W * 0.06, 24)}px sans-serif`;
  ctx.fillStyle = COL_LIGHT_GOLD;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`第 ${currentRound} 关`, W / 2, H * 0.38);

  // Countdown number
  const scale = 1 + (1 - countdownTimer) * 0.5;
  const alpha = Math.min(1, (1 - countdownTimer) * 2);
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(scale, scale);
  ctx.globalAlpha = alpha;
  ctx.font = 'bold 80px sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = 'rgba(255,215,0,0.6)';
  ctx.shadowBlur = 30;
  ctx.fillText(countdownVal > 0 ? countdownVal : 'GO!', 0, 0);
  ctx.restore();

  ctx.restore();
}

function drawRoundEnd() {
  ctx.save();

  ctx.globalAlpha = 0.7;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (currentRound < TOTAL_ROUNDS) {
    ctx.font = `bold ${Math.round(Math.min(W * 0.07, 28))}px sans-serif`;
    ctx.fillStyle = COL_GOLD;
    ctx.fillText(`第 ${currentRound} 关完成!`, W / 2, H * 0.4);
    ctx.font = 'bold 22px sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.fillText(`当前得分: ${formatScore(score)}`, W / 2, H * 0.48);
    ctx.font = '16px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('准备下一关...', W / 2, H * 0.55);
  } else {
    ctx.font = `bold ${Math.round(Math.min(W * 0.07, 28))}px sans-serif`;
    ctx.fillStyle = COL_GOLD;
    ctx.fillText('最终关卡完成!', W / 2, H * 0.45);
    ctx.font = '16px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('计算总分...', W / 2, H * 0.52);
  }

  ctx.restore();
}

function drawGameOver() {
  ctx.save();

  // Dark overlay
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = COL_DARK;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  const cx = W / 2;
  const panelW = Math.min(W * 0.88, 340);
  const panelH = Math.min(H * 0.72, 520);
  const panelX = cx - panelW / 2;
  const panelY = (H - panelH) / 2;

  // Panel background
  ctx.save();
  drawRoundRect(ctx, panelX, panelY, panelW, panelH, 16);
  ctx.fillStyle = 'rgba(26, 26, 46, 0.95)';
  ctx.fill();
  ctx.strokeStyle = COL_GOLD;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  let yOff = panelY + 30;

  // Title
  ctx.font = 'bold 24px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = 'rgba(255,215,0,0.4)';
  ctx.shadowBlur = 12;
  ctx.fillText('游戏结束', cx, yOff);
  ctx.shadowBlur = 0;
  yOff += 20;

  // New record
  if (isNewRecord) {
    ctx.font = 'bold 16px sans-serif';
    ctx.fillStyle = COL_RED;
    ctx.fillText('\u2B50 新纪录! \u2B50', cx, yOff + 10);
    yOff += 25;
  }

  yOff += 15;

  // Score
  ctx.font = 'bold 44px sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = 'rgba(255,215,0,0.4)';
  ctx.shadowBlur = 15;
  ctx.fillText(formatScore(finalScore), cx, yOff);
  ctx.shadowBlur = 0;
  yOff += 15;

  ctx.font = '13px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText('总分', cx, yOff);
  yOff += 30;

  // Leaderboard
  if (leaderboard.length > 0) {
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = COL_GOLD;
    ctx.fillText('\u2014 排行榜 TOP 5 \u2014', cx, yOff);
    yOff += 20;

    const colRank = panelX + 30;
    const colName = panelX + 60;
    const colScore = panelX + panelW - 30;
    const entrySpacing = 24;

    ctx.font = '12px sans-serif';
    for (let i = 0; i < leaderboard.length; i++) {
      const entry = leaderboard[i];
      const ey = yOff + i * entrySpacing;
      const rankColors = ['#FFD700', '#C0C0C0', '#CD7F32'];

      ctx.textAlign = 'center';
      ctx.fillStyle = i < 3 ? rankColors[i] : 'rgba(255,255,255,0.5)';
      ctx.font = 'bold 13px sans-serif';
      ctx.fillText(`#${entry.rank}`, colRank, ey);

      ctx.textAlign = 'left';
      ctx.fillStyle = i < 3 ? '#fff' : 'rgba(255,255,255,0.6)';
      ctx.font = '13px sans-serif';
      ctx.fillText(entry.name || '玩家', colName, ey);

      ctx.textAlign = 'right';
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 13px sans-serif';
      ctx.fillText(formatScore(entry.score), colScore, ey);
    }

    yOff += leaderboard.length * entrySpacing + 15;
  }

  // Play again button
  yOff = Math.max(yOff + 10, panelY + panelH - 65);
  const btnW = 160;
  const btnH = 44;
  const pulse = 1 + Math.sin(titlePulse * 2.5) * 0.02;

  ctx.save();
  ctx.translate(cx, yOff);
  ctx.scale(pulse, pulse);
  drawRoundRect(ctx, -btnW / 2, -btnH / 2, btnW, btnH, 10);
  const btnGrad = ctx.createLinearGradient(-btnW / 2, 0, btnW / 2, 0);
  btnGrad.addColorStop(0, COL_GOLD);
  btnGrad.addColorStop(1, '#c49a3a');
  ctx.fillStyle = btnGrad;
  ctx.fill();
  ctx.font = 'bold 18px sans-serif';
  ctx.fillStyle = COL_DARK;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('再来一局', 0, 0);
  ctx.restore();

  // Lobby button
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(212,168,75,0.7)';
  ctx.fillText('\u8FD4\u56DE\u5927\u5385', cx, H * 0.93);

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════════════
init().catch(err => {
  console.error('Game init failed:', err);
});
</script>
</body>
</html>
