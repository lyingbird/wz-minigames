// Note types
const N_TAP = 0, N_HOLD = 1;

// Judgment thresholds (seconds)
const J_PERFECT = 0.06, J_GREAT = 0.11, J_GOOD = 0.16;

// Lane colors (hex + rgb components for easy alpha manipulation)
const LANE_COLORS = ['#3498DB', '#2ECC71', '#F1C40F', '#E74C3C'];
const LANE_RGB = ['52,152,219', '46,204,113', '241,196,15', '231,76,60'];
const LANE_LABELS = ['普攻', '一技能', '二技能', '大招'];
const LANE_GLOW = ['rgba(52,152,219,0.6)', 'rgba(46,204,113,0.6)', 'rgba(241,196,15,0.6)', 'rgba(231,76,60,0.6)'];

// Judgment line position (fraction of screen height)
const JUDGE_Y_FRAC = 0.78;

// Scroll speed: how many seconds of notes are visible on screen
const SCROLL_WINDOW = 1.8; // seconds of lookahead

// Combo multiplier thresholds

// Grading thresholds

// ══════════════════════════════════════════════════════════════════════════════
// SONG DATA GENERATION
// ══════════════════════════════════════════════════════════════════════════════

// Pentatonic scale notes (C pentatonic in various octaves)
const PENTA = [261.63, 293.66, 329.63, 392.00, 440.00]; // C4 D4 E4 G4 A4
const PENTA_LOW = PENTA.map(f => f / 2);
const PENTA_HIGH = PENTA.map(f => f * 2);

function generateSong1() {
  // "剑气纵横" - Easy, BPM 100, 60s, ~60 notes
  const bpm = 100, duration = 60;
  const beatLen = 60 / bpm;
  const notes = [];
  // Simple quarter-note patterns, one lane at a time
  // 4-bar phrases, each bar = 4 beats
  const patterns = [
    // phrase 1: single lane streams
    [0, null, 1, null, 2, null, 3, null],
    [0, 0, null, 1, 1, null, 2, 2],
    [3, null, 2, null, 1, null, 0, null],
    [null, 0, null, 1, null, 2, null, 3],
    // phrase 2: alternating
    [0, 2, 0, 2, 1, 3, 1, 3],
    [0, null, null, 1, null, null, 2, null],
    [3, 3, null, null, 2, 2, null, null],
    [0, 1, 2, 3, null, null, null, null],
    // phrase 3: slightly more dense
    [0, null, 2, null, 0, null, 2, null],
    [1, null, 3, null, 1, null, 3, null],
    [0, 1, null, 2, 3, null, 0, null],
    [null, null, 1, null, null, 3, null, null],
    // phrase 4: closing
    [0, 0, 1, 1, 2, 2, 3, 3],
    [3, 2, 1, 0, null, null, null, null],
    [0, null, null, null, 2, null, null, null],
  ];
  let beat = 2; // start after 2 beats
  for (const pattern of patterns) {
    for (const lane of pattern) {
      if (lane !== null && beat * beatLen < duration - 2) {
        notes.push({ time: beat * beatLen, lane, type: N_TAP });
      }
      beat++;
    }
  }
  return {
    id: 'song1', name: '剑气纵横', difficulty: 1, diffLabel: '简单',
    bpm, duration, notes,
    bassPattern: [0, 2, 4, 2], // indices into PENTA_LOW
    bassRhythm: [0, 2], // beats within bar that bass plays
  };
}

function generateSong2() {
  // "青莲剑仙" - Normal, BPM 120, 75s, ~120 notes
  const bpm = 120, duration = 75;
  const beatLen = 60 / bpm;
  const notes = [];
  let t = 1.5; // start time in seconds

  // Helper to add notes
  function tap(lane, time) { if (time < duration - 2) notes.push({ time, lane, type: N_TAP }); }
  function hold(lane, time, dur) { if (time < duration - 2) notes.push({ time, lane, type: N_HOLD, holdDuration: dur }); }
  function doub(l1, l2, time) { tap(l1, time); tap(l2, time); }

  // Section A: quarter note streams (bars 1-8)
  for (let bar = 0; bar < 8; bar++) {
    const base = t + bar * 4 * beatLen;
    const seq = [
      [0, 1, 2, 3],
      [3, 2, 1, 0],
      [0, 2, 1, 3],
      [1, 3, 0, 2],
      [0, 0, 2, 2],
      [1, 1, 3, 3],
      [0, 2, 0, 2],
      [3, 1, 3, 1],
    ][bar];
    for (let i = 0; i < 4; i++) {
      tap(seq[i], base + i * beatLen);
    }
  }

  // Section B: eighth notes + holds (bars 9-16)
  t += 8 * 4 * beatLen;
  for (let bar = 0; bar < 8; bar++) {
    const base = t + bar * 4 * beatLen;
    if (bar % 4 === 0) {
      // hold note
      hold(0, base, beatLen * 2);
      tap(2, base + beatLen * 2);
      tap(3, base + beatLen * 3);
    } else if (bar % 4 === 1) {
      // eighth note burst
      for (let i = 0; i < 4; i++) {
        tap(i % 4, base + i * beatLen * 0.5);
      }
      tap(2, base + beatLen * 3);
    } else if (bar % 4 === 2) {
      // doubles
      doub(0, 3, base);
      tap(1, base + beatLen);
      tap(2, base + beatLen * 2);
      doub(1, 2, base + beatLen * 3);
    } else {
      tap(3, base);
      hold(1, base + beatLen, beatLen * 1.5);
      tap(0, base + beatLen * 3);
    }
  }

  // Section C: climax (bars 17-24)
  t += 8 * 4 * beatLen;
  for (let bar = 0; bar < 8; bar++) {
    const base = t + bar * 4 * beatLen;
    // faster patterns
    for (let i = 0; i < 6; i++) {
      const lane = [0, 1, 2, 3, 2, 1][i];
      tap(lane, base + i * beatLen * 0.5);
    }
    if (bar % 2 === 0) {
      doub(0, 3, base + beatLen * 3.5);
    }
  }

  return {
    id: 'song2', name: '青莲剑仙', difficulty: 2, diffLabel: '普通',
    bpm, duration, notes,
    bassPattern: [0, 4, 2, 3],
    bassRhythm: [0, 1, 2, 3],
  };
}

function generateSong3() {
  // "将进酒" - Hard, BPM 140, 90s, ~200 notes
  const bpm = 140, duration = 90;
  const beatLen = 60 / bpm;
  const notes = [];

  function tap(lane, time) { if (time < duration - 2) notes.push({ time, lane, type: N_TAP }); }
  function hold(lane, time, dur) { if (time < duration - 2) notes.push({ time, lane, type: N_HOLD, holdDuration: dur }); }
  function doub(l1, l2, time) { tap(l1, time); tap(l2, time); }

  let t = 1.0;

  // Section A: warm-up (8 bars) - quarter + eighth
  for (let bar = 0; bar < 8; bar++) {
    const base = t + bar * 4 * beatLen;
    const lanes = [0, 1, 2, 3];
    for (let i = 0; i < 4; i++) {
      tap(lanes[(bar + i) % 4], base + i * beatLen);
    }
    // add eighth note pickups
    if (bar >= 4) {
      tap((bar + 1) % 4, base + 3.5 * beatLen);
    }
  }

  // Section B: eighth note streams (8 bars)
  t += 8 * 4 * beatLen;
  for (let bar = 0; bar < 8; bar++) {
    const base = t + bar * 4 * beatLen;
    for (let i = 0; i < 8; i++) {
      const patterns = [
        [0, 1, 2, 3, 2, 1, 0, 1],
        [3, 2, 1, 0, 1, 2, 3, 2],
        [0, 2, 1, 3, 0, 2, 1, 3],
        [1, 0, 3, 2, 1, 0, 3, 2],
        [0, 3, 1, 2, 0, 3, 1, 2],
        [2, 1, 0, 3, 2, 1, 0, 3],
        [0, 1, 0, 2, 0, 3, 0, 2],
        [3, 1, 3, 2, 3, 0, 3, 1],
      ];
      tap(patterns[bar % 8][i], base + i * beatLen * 0.5);
    }
  }

  // Section C: holds + doubles (8 bars)
  t += 8 * 4 * beatLen;
  for (let bar = 0; bar < 8; bar++) {
    const base = t + bar * 4 * beatLen;
    if (bar % 3 === 0) {
      hold(0, base, beatLen * 2);
      tap(2, base + beatLen);
      tap(3, base + beatLen * 1.5);
      doub(1, 3, base + beatLen * 2.5);
      tap(2, base + beatLen * 3);
      tap(0, base + beatLen * 3.5);
    } else if (bar % 3 === 1) {
      doub(0, 3, base);
      doub(1, 2, base + beatLen);
      hold(3, base + beatLen * 2, beatLen * 1.5);
      tap(0, base + beatLen * 2.5);
      tap(1, base + beatLen * 3.5);
    } else {
      for (let i = 0; i < 6; i++) {
        tap([0, 2, 3, 1, 0, 3][i], base + i * beatLen * 0.5);
      }
      doub(0, 3, base + beatLen * 3.5);
    }
  }

  // Section D: Grand finale (8 bars) - everything
  t += 8 * 4 * beatLen;
  for (let bar = 0; bar < 8 && t + bar * 4 * beatLen < duration - 3; bar++) {
    const base = t + bar * 4 * beatLen;
    // Rapid-fire with doubles and syncopation
    for (let i = 0; i < 8; i++) {
      const lane = [0, 3, 1, 2, 3, 0, 2, 1][i];
      tap(lane, base + i * beatLen * 0.5);
    }
    if (bar % 2 === 0) {
      doub(0, 2, base + beatLen * 0.25);
      doub(1, 3, base + beatLen * 2.25);
    }
    if (bar === 7) {
      // Final chord
      doub(0, 3, base + beatLen * 3.75);
      doub(1, 2, base + beatLen * 3.75);
    }
  }

  return {
    id: 'song3', name: '将进酒', difficulty: 3, diffLabel: '困难',
    bpm, duration, notes,
    bassPattern: [0, 3, 4, 2, 1, 4, 3, 0],
    bassRhythm: [0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5],
  };
}

const SONGS = [generateSong1(), generateSong2(), generateSong3()];

let countdownNum = 3;

// ══════════════════════════════════════════════════════════════════════════════
// MUSIC SYNTHESIS ENGINE
// ══════════════════════════════════════════════════════════════════════════════

function createMusicEngine(actx, song) {
  const masterGain = actx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(actx.destination);

  const bpm = song.bpm;
  const beatLen = 60 / bpm;
  let schedulerInterval = null;
  let nextBeatTime = 0;
  let currentBeat = 0;
  let isPlaying = false;

  // Kick drum: low sine burst
  function scheduleKick(time) {
    const osc = actx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(30, time + 0.12);
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.7, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
    osc.connect(gain).connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.15);
  }

  // Hi-hat: noise burst
  function scheduleHihat(time) {
    const bufLen = Math.floor(actx.sampleRate * 0.05);
    const buf = actx.createBuffer(1, bufLen, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const src = actx.createBufferSource();
    src.buffer = buf;
    const hp = actx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 7000;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.25, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
    src.connect(hp).connect(gain).connect(masterGain);
    src.start(time);
    src.stop(time + 0.05);
  }

  // Snare
  function scheduleSnare(time) {
    // Noise part
    const bufLen = Math.floor(actx.sampleRate * 0.1);
    const buf = actx.createBuffer(1, bufLen, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const src = actx.createBufferSource();
    src.buffer = buf;
    const bp = actx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 3000;
    bp.Q.value = 1;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.35, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    src.connect(bp).connect(gain).connect(masterGain);
    src.start(time);
    src.stop(time + 0.1);

    // Tonal part
    const osc = actx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, time);
    osc.frequency.exponentialRampToValueAtTime(80, time + 0.06);
    const g2 = actx.createGain();
    g2.gain.setValueAtTime(0.3, time);
    g2.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
    osc.connect(g2).connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.08);
  }

  // Bass note
  function scheduleBass(time, noteIndex) {
    const freq = PENTA_LOW[noteIndex % PENTA_LOW.length];
    const osc = actx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.35, time);
    gain.gain.setValueAtTime(0.35, time + beatLen * 0.8);
    gain.gain.exponentialRampToValueAtTime(0.001, time + beatLen * 0.95);
    osc.connect(gain).connect(masterGain);
    osc.start(time);
    osc.stop(time + beatLen);
  }

  // Melody - simple arpeggiated pentatonic
  function scheduleMelody(time, beat) {
    const melodyPatterns = [
      [0, 2, 4, 2],
      [1, 3, 4, 3],
      [2, 4, 3, 1],
      [4, 2, 0, 2],
    ];
    const bar = Math.floor(beat / 4) % melodyPatterns.length;
    const pos = beat % 4;
    const noteIdx = melodyPatterns[bar][pos];
    const freq = PENTA_HIGH[noteIdx];

    const osc = actx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(0.12, time + 0.02);
    gain.gain.setValueAtTime(0.12, time + beatLen * 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, time + beatLen * 0.7);
    osc.connect(gain).connect(masterGain);
    osc.start(time);
    osc.stop(time + beatLen * 0.75);
  }

  function scheduleBeats() {
    // Schedule ahead by 0.2 seconds
    while (nextBeatTime < actx.currentTime + 0.2) {
      const beatInBar = currentBeat % 4;

      // Kick on beats 0, 2
      if (beatInBar === 0 || beatInBar === 2) {
        scheduleKick(nextBeatTime);
      }

      // Snare on beats 1, 3
      if (beatInBar === 1 || beatInBar === 3) {
        scheduleSnare(nextBeatTime);
      }

      // Hi-hat on every beat
      scheduleHihat(nextBeatTime);
      // Hi-hat on off-beats too for faster songs
      if (bpm >= 120) {
        scheduleHihat(nextBeatTime + beatLen * 0.5);
      }

      // Bass line
      if (song.bassRhythm.includes(beatInBar)) {
        const bassIdx = song.bassPattern[currentBeat % song.bassPattern.length];
        scheduleBass(nextBeatTime, bassIdx);
      }

      // Melody (plays every beat on normal/hard)
      if (song.difficulty >= 1) {
        scheduleMelody(nextBeatTime, currentBeat);
      }

      // Track beat pulse for visual
      const songT = nextBeatTime - songStartRealTime;
      if (songT >= 0) {
        beatPulse = 1;
      }

      nextBeatTime += beatLen;
      currentBeat++;
    }
  }

  return {
    start(startTime) {
      isPlaying = true;
      songStartRealTime = startTime;
      nextBeatTime = startTime;
      currentBeat = 0;
      schedulerInterval = setInterval(scheduleBeats, 50);
      scheduleBeats();
    },
    stop() {
      isPlaying = false;
      if (schedulerInterval) {
        clearInterval(schedulerInterval);
        schedulerInterval = null;
      }
    },
    get isPlaying() { return isPlaying; },
    masterGain,
  };
}

// ══════════════════════════════════════════════════════════════════════════════
// TOUCH HANDLING
// ══════════════════════════════════════════════════════════════════════════════

function setupTouchHandlers() {
  const activeTouches = new Map(); // touchId -> lane

  function getLane(x) {
    const laneWidth = W / 4;
    const lane = Math.floor(x / laneWidth);
    return Math.max(0, Math.min(3, lane));
  }

  function getCanvasPos(touch) {
    const rect = canvas.getBoundingClientRect();
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    // Init audio on first touch
    if (!audio) { try { audio = initAudio(); } catch(e2) { console.warn('Audio init failed:', e2); } }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audio && audio.context && audio.context.state === 'suspended') audio.context.resume();

    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const pos = getCanvasPos(touch);
      const lane = getLane(pos.x);

      activeTouches.set(touch.identifier, lane);

      if (state === S_PLAYING) {
        laneTouched[lane] = true;
        laneFlash[lane] = 0.15;
        handleLanePress(lane, touch.identifier);
      } else if (state === S_TITLE) {
        handleTitleTap(pos.x, pos.y);
      } else if (state === S_RESULTS) {
        handleResultsTap(pos.x, pos.y);
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const pos = getCanvasPos(touch);
      const newLane = getLane(pos.x);
      const oldLane = activeTouches.get(touch.identifier);
      if (oldLane !== undefined && oldLane !== newLane) {
        // Finger moved to a different lane
        laneTouched[oldLane] = false;
        if (laneHolds[oldLane] && laneHolds[oldLane].touchId === touch.identifier) {
          endHoldNote(oldLane);
        }
        activeTouches.set(touch.identifier, newLane);
        laneTouched[newLane] = true;
        laneFlash[newLane] = 0.15;
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const lane = activeTouches.get(touch.identifier);
      activeTouches.delete(touch.identifier);
      if (lane !== undefined) {
        laneTouched[lane] = false;
        if (laneHolds[lane] && laneHolds[lane].touchId === touch.identifier) {
          endHoldNote(lane);
        }
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchcancel', (e) => {
    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const lane = activeTouches.get(touch.identifier);
      activeTouches.delete(touch.identifier);
      if (lane !== undefined) {
        laneTouched[lane] = false;
        if (laneHolds[lane]) endHoldNote(lane);
      }
    }
  }, { passive: false });

  // Mouse fallback for desktop testing
  let mouseDown = false;
  let mouseLane = -1;
  canvas.addEventListener('mousedown', (e) => {
    if (!audio) { try { audio = initAudio(); } catch(e2) { console.warn('Audio init failed:', e2); } }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audio && audio.context && audio.context.state === 'suspended') audio.context.resume();
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const lane = getLane(x);
    mouseDown = true;
    mouseLane = lane;

    if (state === S_PLAYING) {
      laneTouched[lane] = true;
      laneFlash[lane] = 0.15;
      handleLanePress(lane);
    } else if (state === S_TITLE) {
      handleTitleTap(x, y);
    } else if (state === S_RESULTS) {
      handleResultsTap(x, y);
    }
  });
  canvas.addEventListener('mouseup', () => {
    mouseDown = false;
    if (mouseLane >= 0) {
      laneTouched[mouseLane] = false;
      if (laneHolds[mouseLane]) endHoldNote(mouseLane);
      mouseLane = -1;
    }
  });
  canvas.addEventListener('mousemove', (e) => {
    if (!mouseDown) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const newLane = getLane(x);
    if (newLane !== mouseLane) {
      if (mouseLane >= 0) {
        laneTouched[mouseLane] = false;
        if (laneHolds[mouseLane]) endHoldNote(mouseLane);
      }
      mouseLane = newLane;
      laneTouched[newLane] = true;
      laneFlash[newLane] = 0.15;
    }
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// GAMEPLAY LOGIC
// ══════════════════════════════════════════════════════════════════════════════

function handleLanePress(lane, touchId) {
  if (state !== S_PLAYING) return;

  // Find the closest unhit note in this lane within judgment window
  let bestNote = null;
  let bestDiff = Infinity;

  for (const note of activeNotes) {
    if (note.lane !== lane || note.hit || note.missed) continue;
    const diff = Math.abs(note.time - songTime);
    if (diff < J_GOOD + 0.02 && diff < bestDiff) {
      bestDiff = diff;
      bestNote = note;
    }
  }

  if (!bestNote) return;

  const diff = Math.abs(bestNote.time - songTime);
  let judgment, scoreVal, color;

  if (diff <= J_PERFECT) {
    judgment = 'PERFECT';
    scoreVal = 100;
    color = '#FFD700';
    audio && audio.playBeat(true);
    screenShake = 0.03;
  } else if (diff <= J_GREAT) {
    judgment = 'GREAT';
    scoreVal = 75;
    color = '#3498DB';
    audio && audio.playBeat(false);
  } else if (diff <= J_GOOD) {
    judgment = 'GOOD';
    scoreVal = 50;
    color = '#2ECC71';
    audio && audio.playBeat(false);
  } else {
    return; // too far
  }

  bestNote.hit = true;
  bestNote.hitTime = songTime;
  bestNote.judgment = judgment;

  // Combo
  combo++;
  if (combo > maxCombo) maxCombo = combo;
  comboScale = 1.4;

  // Combo multiplier
  let mult = 1;
  for (const [threshold, m] of COMBO_MULT) {
    if (combo >= threshold) { mult = m; break; }
  }

  const finalScore = Math.round(scoreVal * mult);
  score += finalScore;
  judgments[judgment.toLowerCase()]++;

  // Judgment display
  const laneX = (lane + 0.5) * (W / 4);
  const judgeY = H * JUDGE_Y_FRAC;
  judgmentDisplay = { text: judgment, color, timer: 0.6, x: laneX };

  // Particle effects
  const particleCount = judgment === 'PERFECT' ? 20 : judgment === 'GREAT' ? 12 : 6;
  particles.emit(laneX, judgeY, {
    count: particleCount,
    color: LANE_COLORS[lane],
    speed: 150,
    life: 0.5,
    size: 4,
    gravity: 200,
  });

  // Floating score
  floatText.add(laneX, judgeY - 30, `+${finalScore}`, { color, size: 18, duration: 0.8 });

  // Combo milestones
  if (combo === 50) {
    swordFlashTimer = 1.5;
    audio && audio.playCombo(5);
  } else if (combo % 25 === 0 && combo > 0) {
    audio && audio.playCombo(Math.min(10, Math.floor(combo / 25)));
  }

  // Hold note: start tracking
  if (bestNote.type === N_HOLD) {
    laneHolds[lane] = {
      noteIndex: activeNotes.indexOf(bestNote),
      startTime: songTime,
      touchId: touchId ?? null,
      baseScore: finalScore,
    };
  }
}

function endHoldNote(lane) {
  const hold = laneHolds[lane];
  if (!hold) return;
  laneHolds[lane] = null;

  const note = activeNotes[hold.noteIndex];
  if (!note || note.type !== N_HOLD) return;

  // Calculate hold bonus based on how long they held
  const holdEnd = note.time + (note.holdDuration || 0);
  const heldRatio = Math.min(1, (songTime - hold.startTime) / ((note.holdDuration || 0.5)));
  const holdBonus = Math.round(50 * heldRatio);

  if (heldRatio > 0.6) {
    score += holdBonus;
    const laneX = (lane + 0.5) * (W / 4);
    floatText.add(laneX, H * JUDGE_Y_FRAC - 50, `+${holdBonus}`, {
      color: '#FFD700', size: 16, duration: 0.6,
    });
  }

  note.holdComplete = true;
}

function processAutoMiss(dt) {
  // Check for notes that have passed the judgment window
  for (const note of activeNotes) {
    if (note.hit || note.missed) continue;
    if (songTime - note.time > J_GOOD + 0.02) {
      note.missed = true;
      note.missTime = songTime;
      combo = 0;
      judgments.miss++;

      const laneX = (note.lane + 0.5) * (W / 4);
      judgmentDisplay = { text: 'MISS', color: '#E74C3C', timer: 0.5, x: laneX };
    }
  }

  // Check hold notes being held
  for (let lane = 0; lane < 4; lane++) {
    if (laneHolds[lane]) {
      const note = activeNotes[laneHolds[lane].noteIndex];
      if (note) {
        const holdEnd = note.time + (note.holdDuration || 0);
        if (songTime >= holdEnd + 0.05) {
          // Hold completed naturally
          endHoldNote(lane);
        }
      }
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// TITLE SCREEN
// ══════════════════════════════════════════════════════════════════════════════

function handleTitleTap(x, y) {
  // Back button
  if (x < W * 0.25 && y < H * 0.08) {
    window.location.href = '../../index.html';
    return;
  }
  // Song selection buttons
  const btnWidth = W * 0.7;
  const btnHeight = H * 0.09;
  const btnX = (W - btnWidth) / 2;
  const startY = H * 0.42;
  const gap = btnHeight + H * 0.025;

  for (let i = 0; i < SONGS.length; i++) {
    const btnY = startY + i * gap;
    if (x >= btnX && x <= btnX + btnWidth && y >= btnY && y <= btnY + btnHeight) {
      titleSelectedSong = i;
    }
  }

  // Start button
  const startBtnY = startY + 3 * gap + H * 0.01;
  const startBtnH = H * 0.07;
  if (x >= btnX && x <= btnX + btnWidth && y >= startBtnY && y <= startBtnY + startBtnH) {
    startGame(titleSelectedSong);
  }
}

function startGame(songIndex) {
  selectedSong = songIndex;
  currentSong = SONGS[songIndex];

  // Reset state
  score = 0;
  combo = 0;
  maxCombo = 0;
  judgments = { perfect: 0, great: 0, good: 0, miss: 0 };
  swordFlashTimer = 0;
  beatPulse = 0;
  screenShake = 0;
  laneHolds = [null, null, null, null];

  // Clone notes with gameplay state
  activeNotes = currentSong.notes.map(n => ({
    ...n,
    hit: false,
    missed: false,
    hitTime: 0,
    missTime: 0,
    holdComplete: false,
    judgment: '',
  }));

  // Calculate max possible score
  let simCombo = 0;
  maxPossibleScore = 0;
  for (const note of activeNotes) {
    simCombo++;
    let mult = 1;
    for (const [threshold, m] of COMBO_MULT) {
      if (simCombo >= threshold) { mult = m; break; }
    }
    maxPossibleScore += Math.round(100 * mult);
    if (note.type === N_HOLD) maxPossibleScore += 50;
  }

  // Start countdown
  state = S_COUNTDOWN;
  countdownTimer = 0;
  countdownNum = 3;

  audio && audio.playCountdown();
}

function startPlaying() {
  state = S_PLAYING;
  songTime = -0.5; // small lead-in

  // Create audio context for music if needed
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // Start music
  if (musicNodes) musicNodes.stop();
  musicNodes = createMusicEngine(audioCtx, currentSong);
  songStartRealTime = audioCtx.currentTime + 0.5; // 0.5s lead-in
  musicNodes.start(songStartRealTime);

  audio && audio.playStart();
}

// ══════════════════════════════════════════════════════════════════════════════
// RESULTS SCREEN
// ══════════════════════════════════════════════════════════════════════════════

function showResults() {
  state = S_RESULTS;
  if (musicNodes) { musicNodes.stop(); musicNodes = null; }

  // Calculate grade
  const scoreRatio = maxPossibleScore > 0 ? score / maxPossibleScore : 0;

  // Save to leaderboard
  addScore(GAME_ID, score, LIBAI, '李白');

  audio && audio.playScore();
}

function handleResultsTap(x, y) {
  const btnW = W * 0.35;
  const btnH = H * 0.06;
  const gap = W * 0.05;
  const baseY = H * 0.78;

  // Retry button
  const retryX = W / 2 - btnW - gap / 2;
  if (x >= retryX && x <= retryX + btnW && y >= baseY && y <= baseY + btnH) {
    startGame(selectedSong);
    return;
  }

  // Back button
  const backX = W / 2 + gap / 2;
  if (x >= backX && x <= backX + btnW && y >= baseY && y <= baseY + btnH) {
    state = S_TITLE;
    return;
  }

  // Lobby button
  const lobbyY = baseY + btnH + H * 0.02;
  if (y >= lobbyY && y <= lobbyY + H * 0.05 && x >= W * 0.2 && x <= W * 0.8) {
    window.location.href = '../../index.html';
    return;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// UPDATE
// ══════════════════════════════════════════════════════════════════════════════

function update(dt) {
  W = screen.width;
  H = screen.height;
  safeTop = screen.safeTop;
  safeBottom = screen.safeBottom;

  particles.update(dt);
  floatText.update(dt);

  // Decay timers
  for (let i = 0; i < 4; i++) {
    if (laneFlash[i] > 0) laneFlash[i] = Math.max(0, laneFlash[i] - dt);
  }
  if (judgmentDisplay.timer > 0) judgmentDisplay.timer -= dt;
  if (comboScale > 1) comboScale = Math.max(1, comboScale - dt * 3);
  if (swordFlashTimer > 0) swordFlashTimer -= dt;
  if (beatPulse > 0) beatPulse = Math.max(0, beatPulse - dt * 4);
  if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 2);

  if (state === S_LOADING) {
    // Nothing — loading handled in init
  } else if (state === S_TITLE) {
    titleTime += dt;
  } else if (state === S_COUNTDOWN) {
    countdownTimer += dt;
    if (countdownTimer >= 1 && countdownNum === 3) {
      countdownNum = 2;
      audio && audio.playCountdown();
    } else if (countdownTimer >= 2 && countdownNum === 2) {
      countdownNum = 1;
      audio && audio.playCountdown();
    } else if (countdownTimer >= 3) {
      startPlaying();
    }
  } else if (state === S_PLAYING) {
    // Update song time from AudioContext for precision
    if (audioCtx) {
      songTime = audioCtx.currentTime - songStartRealTime;
    } else {
      songTime += dt;
    }

    processAutoMiss(dt);

    // Check song end
    if (songTime >= currentSong.duration) {
      showResults();
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════════

function render() {
  ctx.save();

  // Screen shake
  if (screenShake > 0) {
    const shakeX = (Math.random() - 0.5) * screenShake * 20;
    const shakeY = (Math.random() - 0.5) * screenShake * 20;
    ctx.translate(shakeX, shakeY);
  }

  // Background
  renderBackground();

  if (state === S_TITLE) {
    renderTitle();
  } else if (state === S_COUNTDOWN) {
    renderPlayfield();
    renderCountdown();
  } else if (state === S_PLAYING) {
    renderPlayfield();
    renderNotes();
    renderJudgmentLine();
    renderLaneButtons();
    renderHUD();
    renderEffects();
  } else if (state === S_RESULTS) {
    renderResults();
  } else if (state === S_LOADING) {
    renderLoading();
  }

  particles.render(ctx);
  floatText.render(ctx);
  ctx.restore();
}

function renderBackground() {
  // Dark gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(0.5, '#0f0f2a');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle vertical light rays
  ctx.save();
  ctx.globalAlpha = 0.03 + beatPulse * 0.02;
  for (let i = 0; i < 5; i++) {
    const x = W * (0.1 + i * 0.2);
    const grad2 = ctx.createLinearGradient(x - 30, 0, x + 30, 0);
    grad2.addColorStop(0, 'transparent');
    grad2.addColorStop(0.5, '#D4A84B');
    grad2.addColorStop(1, 'transparent');
    ctx.fillStyle = grad2;
    ctx.fillRect(x - 40, 0, 80, H);
  }
  ctx.restore();

  // Li Bai watermark in center (very faint)
  if (state === S_PLAYING || state === S_COUNTDOWN) {
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.font = `bold ${H * 0.15}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#D4A84B';
    ctx.fillText('李白', W / 2, H * 0.4);
    ctx.restore();
  }
}

function renderLoading() {
  ctx.fillStyle = '#D4A84B';
  ctx.font = `bold ${W * 0.06}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('加载中...', W / 2, H / 2);
}

function renderTitle() {
  const cx = W / 2;

  // Back button
  ctx.save();
  ctx.font = `bold ${Math.max(14, W * 0.04)}px sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#D4A84B';
  ctx.fillText('\u2190 \u8FD4\u56DE', W * 0.05, safeTop + H * 0.04);
  ctx.restore();

  // Avatar
  const avatar = getAvatarImage(LIBAI);
  if (avatar) {
    const avatarSize = W * 0.2;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, H * 0.15, avatarSize / 2, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(avatar, cx - avatarSize / 2, H * 0.15 - avatarSize / 2, avatarSize, avatarSize);
    ctx.restore();

    // Avatar border
    ctx.strokeStyle = '#D4A84B';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, H * 0.15, avatarSize / 2 + 2, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Title
  ctx.fillStyle = '#D4A84B';
  ctx.font = `bold ${W * 0.08}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('李白·青莲剑歌', cx, H * 0.28);

  // Subtitle
  ctx.fillStyle = 'rgba(212,168,75,0.6)';
  ctx.font = `${W * 0.035}px sans-serif`;
  ctx.fillText('节奏挑战 · 王者荣耀', cx, H * 0.33);

  // Season info
  if (season) {
    ctx.fillStyle = season.colorScheme.primary;
    ctx.font = `${W * 0.03}px sans-serif`;
    ctx.fillText(`当前赛季: ${season.name}`, cx, H * 0.37);
  }

  // Song selection buttons
  const btnWidth = W * 0.7;
  const btnHeight = H * 0.09;
  const btnX = (W - btnWidth) / 2;
  const startY = H * 0.42;
  const gap = btnHeight + H * 0.025;

  for (let i = 0; i < SONGS.length; i++) {
    const song = SONGS[i];
    const btnY = startY + i * gap;
    const isSelected = i === titleSelectedSong;

    // Button background
    ctx.save();
    drawRoundRect(ctx, btnX, btnY, btnWidth, btnHeight, 12);
    ctx.fillStyle = isSelected ? 'rgba(212,168,75,0.2)' : 'rgba(255,255,255,0.05)';
    ctx.fill();
    ctx.strokeStyle = isSelected ? '#D4A84B' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.stroke();
    ctx.restore();

    // Song name
    ctx.fillStyle = isSelected ? '#D4A84B' : '#ccc';
    ctx.font = `bold ${W * 0.045}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(song.name, btnX + btnWidth * 0.08, btnY + btnHeight * 0.42);

    // Difficulty label
    ctx.fillStyle = isSelected ? '#fff' : '#999';
    ctx.font = `${W * 0.03}px sans-serif`;
    ctx.fillText(song.diffLabel, btnX + btnWidth * 0.08, btnY + btnHeight * 0.75);

    // Difficulty stars
    ctx.fillStyle = '#FFD700';
    ctx.font = `${W * 0.035}px sans-serif`;
    ctx.textAlign = 'right';
    const stars = '\u2605'.repeat(song.difficulty) + '\u2606'.repeat(3 - song.difficulty);
    ctx.fillText(stars, btnX + btnWidth - btnWidth * 0.08, btnY + btnHeight * 0.55);

    // Note count and BPM info
    ctx.fillStyle = '#888';
    ctx.font = `${W * 0.025}px sans-serif`;
    ctx.fillText(`${song.notes.length}音符 · BPM ${song.bpm}`, btnX + btnWidth - btnWidth * 0.08, btnY + btnHeight * 0.8);
  }

  // Start button
  const startBtnY = startY + 3 * gap + H * 0.01;
  const startBtnH = H * 0.07;

  ctx.save();
  drawRoundRect(ctx, btnX, startBtnY, btnWidth, startBtnH, 12);
  const startGrad = ctx.createLinearGradient(btnX, startBtnY, btnX + btnWidth, startBtnY);
  startGrad.addColorStop(0, '#D4A84B');
  startGrad.addColorStop(1, '#B8860B');
  ctx.fillStyle = startGrad;
  ctx.fill();
  ctx.restore();

  ctx.fillStyle = '#1A1A2E';
  ctx.font = `bold ${W * 0.05}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('开始游戏', cx, startBtnY + startBtnH * 0.55);

  // Personal best
  const pb = getPersonalBest(GAME_ID);
  if (pb) {
    ctx.fillStyle = '#888';
    ctx.font = `${W * 0.03}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`最高分: ${formatScore(pb.score)}`, cx, startBtnY + startBtnH + H * 0.035);
  }

  // Tap hint
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = `${W * 0.028}px sans-serif`;
  ctx.textAlign = 'center';
  const hintAlpha = 0.3 + Math.sin(titleTime * 3) * 0.15;
  ctx.globalAlpha = hintAlpha;
  ctx.fillText('选择曲目，点击开始游戏', cx, H * 0.96);
  ctx.globalAlpha = 1;
}

function renderPlayfield() {
  const laneW = W / 4;
  const judgeY = H * JUDGE_Y_FRAC;

  // Lane separators
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(i * laneW, 0);
    ctx.lineTo(i * laneW, judgeY);
    ctx.stroke();
  }

  // Lane tint (subtle color at bottom near judgment line)
  for (let i = 0; i < 4; i++) {
    const grad = ctx.createLinearGradient(0, judgeY - H * 0.15, 0, judgeY);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(1, `rgba(${LANE_RGB[i]},0.05)`);
    ctx.fillStyle = grad;
    ctx.fillRect(i * laneW, judgeY - H * 0.15, laneW, H * 0.15);
  }

  ctx.restore();
}

function renderJudgmentLine() {
  const judgeY = H * JUDGE_Y_FRAC;

  // Main line
  ctx.save();
  const glow = 0.6 + beatPulse * 0.4;
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 10 + beatPulse * 10;
  ctx.strokeStyle = `rgba(255, 215, 0, ${glow})`;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, judgeY);
  ctx.lineTo(W, judgeY);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Lane flash effects
  const laneW = W / 4;
  for (let i = 0; i < 4; i++) {
    if (laneFlash[i] > 0) {
      ctx.save();
      const alpha = laneFlash[i] / 0.15;
      const grad = ctx.createRadialGradient(
        (i + 0.5) * laneW, judgeY, 0,
        (i + 0.5) * laneW, judgeY, laneW * 0.6
      );
      grad.addColorStop(0, `rgba(${LANE_RGB[i]},${alpha * 0.5})`);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(i * laneW, judgeY - laneW * 0.6, laneW, laneW * 1.2);
      ctx.restore();
    }
  }
}

function renderNotes() {
  const laneW = W / 4;
  const judgeY = H * JUDGE_Y_FRAC;
  const topY = H * 0.05;
  const scrollRange = judgeY - topY;

  // Note rendering: position based on time difference
  for (const note of activeNotes) {
    const timeDiff = note.time - songTime;

    // Skip notes too far in the future or already processed
    if (timeDiff > SCROLL_WINDOW + 0.5) continue;
    if (timeDiff < -1) continue;

    const laneX = note.lane * laneW;
    const laneCX = laneX + laneW / 2;
    const noteW = laneW * 0.65;
    const noteH = laneW * 0.22;

    // Y position: timeDiff=0 means at judgment line, timeDiff=SCROLL_WINDOW means at top
    const progress = 1 - (timeDiff / SCROLL_WINDOW);
    const noteY = topY + progress * scrollRange;

    // Approaching brightness
    const brightness = Math.min(1, 0.4 + progress * 0.8);

    if (note.hit) {
      // Hit animation: note shrinks and fades
      const elapsed = songTime - note.hitTime;
      if (elapsed > 0.3) continue;
      const fade = 1 - elapsed / 0.3;
      const scale = 1 + elapsed * 3;
      ctx.save();
      ctx.globalAlpha = fade * 0.5;
      ctx.translate(laneCX, judgeY);
      ctx.scale(scale, scale);
      drawNoteShape(ctx, -noteW / 2, -noteH / 2, noteW, noteH, note, brightness);
      ctx.restore();
      continue;
    }

    if (note.missed) {
      // Miss animation: note turns red and falls
      const elapsed = songTime - note.missTime;
      if (elapsed > 0.5) continue;
      const fade = 1 - elapsed / 0.5;
      const fallY = noteY + elapsed * 200;
      const rot = elapsed * 2;
      ctx.save();
      ctx.globalAlpha = fade;
      ctx.translate(laneCX, fallY);
      ctx.rotate(rot);
      ctx.fillStyle = '#E74C3C';
      drawRoundRect(ctx, -noteW / 2, -noteH / 2, noteW, noteH, 8);
      ctx.fill();
      ctx.restore();
      continue;
    }

    // Only render notes in visible area
    if (noteY < topY - 30 || noteY > judgeY + 30) continue;

    ctx.save();

    if (note.type === N_HOLD) {
      // Draw hold body first
      const holdEndTime = note.time + (note.holdDuration || 0);
      const holdEndDiff = holdEndTime - songTime;
      const holdEndProgress = 1 - (holdEndDiff / SCROLL_WINDOW);
      const holdEndY = Math.max(topY, topY + holdEndProgress * scrollRange);
      const holdBodyTop = Math.max(topY, Math.min(noteY, judgeY));
      const holdStartY = Math.max(topY, holdEndY);

      // Hold body
      const isHeld = laneHolds[note.lane] !== null;
      ctx.fillStyle = LANE_COLORS[note.lane];
      ctx.globalAlpha = (isHeld ? 0.5 : 0.25) * brightness;
      drawRoundRect(ctx, laneCX - noteW * 0.35, holdStartY, noteW * 0.7,
        holdBodyTop - holdStartY, 6);
      ctx.fill();

      // Pulsing glow on held notes
      if (isHeld) {
        ctx.globalAlpha = 0.15 + Math.sin(songTime * 8) * 0.1;
        ctx.fillStyle = LANE_COLORS[note.lane];
        drawRoundRect(ctx, laneCX - noteW * 0.45, holdStartY - 2, noteW * 0.9,
          holdBodyTop - holdStartY + 4, 8);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // Note head
    const color = LANE_COLORS[note.lane];
    ctx.globalAlpha = brightness;

    // Outer glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 8 + (1 - Math.abs(timeDiff)) * 8;

    // Note body
    ctx.fillStyle = color;
    drawRoundRect(ctx, laneCX - noteW / 2, noteY - noteH / 2, noteW, noteH, 8);
    ctx.fill();

    // Inner highlight
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    drawRoundRect(ctx, laneCX - noteW / 2 + 3, noteY - noteH / 2 + 3,
      noteW - 6, noteH * 0.4, 5);
    ctx.fill();

    // Hold indicator
    if (note.type === N_HOLD) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = `bold ${noteH * 0.55}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('HOLD', laneCX, noteY);
    }

    ctx.restore();
  }
}

function drawNoteShape(ctx, x, y, w, h, note, brightness) {
  ctx.fillStyle = LANE_COLORS[note.lane];
  drawRoundRect(ctx, x, y, w, h, 8);
  ctx.fill();
}

function renderLaneButtons() {
  const laneW = W / 4;
  const judgeY = H * JUDGE_Y_FRAC;
  const btnY = judgeY + 2;
  const btnH = H - btnY;

  for (let i = 0; i < 4; i++) {
    const x = i * laneW;
    const isPressed = laneTouched[i];

    ctx.save();

    // Button background
    const grad = ctx.createLinearGradient(0, btnY, 0, btnY + btnH);
    if (isPressed) {
      grad.addColorStop(0, `rgba(${LANE_RGB[i]},0.4)`);
      grad.addColorStop(1, `rgba(${LANE_RGB[i]},0.15)`);
    } else {
      grad.addColorStop(0, 'rgba(255,255,255,0.06)');
      grad.addColorStop(1, 'rgba(255,255,255,0.02)');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(x, btnY, laneW, btnH);

    // Border
    ctx.strokeStyle = isPressed ? LANE_COLORS[i] : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = isPressed ? 2 : 1;
    ctx.strokeRect(x, btnY, laneW, btnH);

    // Press animation
    const scale = isPressed ? 0.92 : 1;

    // Label
    ctx.fillStyle = isPressed ? LANE_COLORS[i] : 'rgba(255,255,255,0.35)';
    ctx.font = `bold ${W * 0.035 * scale}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(LANE_LABELS[i], x + laneW / 2, btnY + btnH * 0.5);

    // Active hold indicator
    if (laneHolds[i]) {
      ctx.fillStyle = LANE_COLORS[i];
      ctx.globalAlpha = 0.3 + Math.sin(songTime * 10) * 0.15;
      ctx.fillRect(x, btnY, laneW, btnH);
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }
}

function renderHUD() {
  const cx = W / 2;

  // Score (top right)
  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${W * 0.05}px sans-serif`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText(formatScore(score), W - W * 0.03, safeTop + H * 0.015);
  ctx.restore();

  // Combo (top center)
  if (combo > 0) {
    ctx.save();
    const scale = comboScale;
    ctx.translate(cx, H * 0.06);
    ctx.scale(scale, scale);

    // Combo glow for high combos
    if (combo >= 50) {
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 15;
    } else if (combo >= 30) {
      ctx.shadowColor = '#D4A84B';
      ctx.shadowBlur = 8;
    }

    ctx.fillStyle = combo >= 50 ? '#FFD700' : combo >= 30 ? '#D4A84B' : '#fff';
    ctx.font = `bold ${W * 0.1}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(combo.toString(), 0, 0);

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${W * 0.03}px sans-serif`;
    ctx.fillText('COMBO', 0, W * 0.06);

    ctx.restore();
  }

  // Song progress bar (top)
  if (currentSong) {
    const progress = Math.max(0, Math.min(1, songTime / currentSong.duration));
    ctx.save();
    const barH = Math.max(2, H * 0.004);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(0, 0, W, barH);
    ctx.fillStyle = '#D4A84B';
    ctx.fillRect(0, 0, W * progress, barH);
    ctx.restore();
  }

  // Judgment display
  if (judgmentDisplay.timer > 0) {
    ctx.save();
    const alpha = Math.min(1, judgmentDisplay.timer / 0.3);
    const scale = 1 + (0.6 - Math.min(0.6, judgmentDisplay.timer)) * 0.5;
    ctx.globalAlpha = alpha;
    ctx.translate(judgmentDisplay.x, H * JUDGE_Y_FRAC - 50);
    ctx.scale(scale, scale);
    ctx.fillStyle = judgmentDisplay.color;
    ctx.font = `bold ${W * 0.06}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.strokeText(judgmentDisplay.text, 0, 0);
    ctx.fillText(judgmentDisplay.text, 0, 0);
    ctx.restore();
  }

  // Song name (top left)
  if (currentSong) {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `${W * 0.03}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(currentSong.name, W * 0.025, safeTop + H * 0.01);
    ctx.restore();
  }
}

function renderEffects() {
  // Sword flash at 50+ combo
  if (swordFlashTimer > 0) {
    ctx.save();
    const progress = 1 - swordFlashTimer / 1.5;
    const alpha = swordFlashTimer > 1 ? (1.5 - swordFlashTimer) * 2 : swordFlashTimer / 1;

    // Sword slash line across screen
    ctx.globalAlpha = alpha * 0.8;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 20;

    const slashY = H * 0.3 + progress * H * 0.2;
    ctx.beginPath();
    ctx.moveTo(-20, slashY + 30);
    ctx.lineTo(W + 20, slashY - 30);
    ctx.stroke();

    // "青莲剑歌" text
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${W * 0.12}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = alpha;
    ctx.fillText('青莲剑歌', W / 2, H * 0.35);

    ctx.restore();
  }
}

function renderCountdown() {
  ctx.save();
  const num = countdownNum;
  const frac = countdownTimer % 1;
  const scale = 1 + (1 - frac) * 0.5;
  const alpha = frac < 0.7 ? 1 : 1 - (frac - 0.7) / 0.3;

  ctx.globalAlpha = alpha * 0.9;
  ctx.translate(W / 2, H * 0.4);
  ctx.scale(scale, scale);
  ctx.fillStyle = '#D4A84B';
  ctx.font = `bold ${W * 0.25}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(num.toString(), 0, 0);
  ctx.restore();

  // "GET READY"
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${W * 0.04}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('准备!', W / 2, H * 0.55);
  ctx.restore();
}

function renderResults() {
  // Dark overlay
  ctx.save();
  ctx.fillStyle = 'rgba(10,10,26,0.92)';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  const cx = W / 2;
  const scoreRatio = maxPossibleScore > 0 ? score / maxPossibleScore : 0;

  // Grade
  let grade = 'C';
  for (const [g, threshold] of GRADES) {
    if (scoreRatio >= threshold) { grade = g; break; }
  }

  const gradeColors = { S: '#FFD700', A: '#3498DB', B: '#2ECC71', C: '#999' };

  // Title
  ctx.fillStyle = '#D4A84B';
  ctx.font = `bold ${W * 0.06}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('演奏完成!', cx, H * 0.08);

  // Song name
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = `${W * 0.035}px sans-serif`;
  ctx.fillText(currentSong.name, cx, H * 0.13);

  // Grade circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, H * 0.24, W * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fill();
  ctx.strokeStyle = gradeColors[grade];
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = gradeColors[grade];
  ctx.font = `bold ${W * 0.12}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(grade, cx, H * 0.24);
  ctx.restore();

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${W * 0.08}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(formatScore(score), cx, H * 0.37);

  ctx.fillStyle = '#888';
  ctx.font = `${W * 0.03}px sans-serif`;
  ctx.fillText(`满分 ${formatScore(maxPossibleScore)} · ${Math.round(scoreRatio * 100)}%`, cx, H * 0.42);

  // Judgment breakdown
  const breakdownY = H * 0.48;
  const lineH = H * 0.045;
  const labels = [
    ['PERFECT', judgments.perfect, '#FFD700'],
    ['GREAT', judgments.great, '#3498DB'],
    ['GOOD', judgments.good, '#2ECC71'],
    ['MISS', judgments.miss, '#E74C3C'],
  ];

  for (let i = 0; i < labels.length; i++) {
    const [label, count, color] = labels[i];
    const y = breakdownY + i * lineH;

    ctx.textAlign = 'left';
    ctx.fillStyle = color;
    ctx.font = `bold ${W * 0.035}px sans-serif`;
    ctx.fillText(label, W * 0.2, y);

    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = `${W * 0.035}px sans-serif`;
    ctx.fillText(count.toString(), W * 0.8, y);
  }

  // Max combo
  ctx.textAlign = 'left';
  ctx.fillStyle = '#D4A84B';
  ctx.font = `bold ${W * 0.035}px sans-serif`;
  ctx.fillText('最大连击', W * 0.2, breakdownY + 4 * lineH + lineH * 0.5);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff';
  ctx.fillText(maxCombo.toString(), W * 0.8, breakdownY + 4 * lineH + lineH * 0.5);

  // Leaderboard
  const lb = getLeaderboard(GAME_ID);
  if (lb.length > 0) {
    const lbY = H * 0.68;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${W * 0.03}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('排行榜', cx, lbY);

    const topEntries = lb.slice(0, 3);
    for (let i = 0; i < topEntries.length; i++) {
      const entry = topEntries[i];
      const y = lbY + (i + 1) * lineH;
      ctx.textAlign = 'left';
      ctx.fillStyle = i === 0 ? '#FFD700' : i === 1 ? '#C0C0C0' : '#CD7F32';
      ctx.font = `${W * 0.03}px sans-serif`;
      ctx.fillText(`#${entry.rank} ${entry.name}`, W * 0.2, y);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#fff';
      ctx.fillText(formatScore(entry.score), W * 0.8, y);
    }
  }

  // Buttons
  const btnW = W * 0.35;
  const btnH = H * 0.06;
  const gap = W * 0.05;
  const btnY = H * 0.78;

  // Retry
  const retryX = cx - btnW - gap / 2;
  ctx.save();
  drawRoundRect(ctx, retryX, btnY, btnW, btnH, 10);
  ctx.fillStyle = '#D4A84B';
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#1A1A2E';
  ctx.font = `bold ${W * 0.035}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('再来一次', retryX + btnW / 2, btnY + btnH * 0.55);

  // Back
  const backX = cx + gap / 2;
  ctx.save();
  drawRoundRect(ctx, backX, btnY, btnW, btnH, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${W * 0.035}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('返回', backX + btnW / 2, btnY + btnH * 0.55);

  // Lobby button
  ctx.font = `bold ${W * 0.03}px sans-serif`;
  ctx.fillStyle = 'rgba(212,168,75,0.7)';
  ctx.textAlign = 'center';
  ctx.fillText('\u8FD4\u56DE\u5927\u5385', cx, btnY + btnH + H * 0.04);
}

// ══════════════════════════════════════════════════════════════════════════════
// INITIALIZATION
// ══════════════════════════════════════════════════════════════════════════════

async function init() {
  state = S_LOADING;

  // Load shared modules in parallel
  const [heroList] = await Promise.all([
    loadHeroList(),
    preloadAvatars([LIBAI]),
  ]);

  season = getCurrentSeason();

  // Audio init deferred to first user interaction (touch/click)

  // Start game loop
  const loop = createGameLoop(update, render);
  loop.start();

  // Setup touch
  setupTouchHandlers();

  // Go to title
  state = S_TITLE;
}

init().catch(console.error);

</script>
