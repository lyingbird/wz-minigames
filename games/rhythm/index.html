function generateEasyChart(bpm, duration) {
  // ~60 notes, 3 lanes, simple patterns, ~4-5 ult opportunities
  const beatLen = 60 / bpm;
  const notes = [];
  let simEnergy = 0; // simulate energy buildup for ult placement

  const phrases = [
    // Ascending steps across 3 lanes
    { lanes: [0, 1, 2, 1], spacing: 1 },
    // Rest
    { lanes: [], spacing: 0, rest: 2 },
    // Descending
    { lanes: [2, 1, 0, 1], spacing: 1 },
    // Rest
    { lanes: [], spacing: 0, rest: 2 },
    // Alternating pairs
    { lanes: [0, 2, 0, 2], spacing: 1 },
    // Rest
    { lanes: [], spacing: 0, rest: 2 },
    // Center focus
    { lanes: [1, 0, 1, 2], spacing: 1 },
    // Rest
    { lanes: [], spacing: 0, rest: 2 },
    // Call and response
    { lanes: [0, null, 1, null], spacing: 1 },
    { lanes: [2, null, 1, null], spacing: 1 },
    // Rest
    { lanes: [], spacing: 0, rest: 2 },
    // Steady quarter notes
    { lanes: [0, 1, 2, 1, 0, 1, 2, 1], spacing: 1 },
    // Rest
    { lanes: [], spacing: 0, rest: 3 },
    // Build-up
    { lanes: [0, 1, 2, 0, 1, 2, 0, 1], spacing: 1 },
    // Rest
    { lanes: [], spacing: 0, rest: 2 },
    // Final phrase
    { lanes: [2, 1, 0, 2, 1, 0], spacing: 1 },
    { lanes: [0, 0, 1, 1], spacing: 1 },
  ];

  let beat = 4;
  for (const phrase of phrases) {
    if (phrase.lanes.length === 0) {
      beat += (phrase.rest || 2);
      continue;
    }
    for (const lane of phrase.lanes) {
      if (lane !== null && beat * beatLen < duration - 3) {
        notes.push({ time: beat * beatLen, lane, type: N_TAP });
        simEnergy = Math.min(MAX_ENERGY, simEnergy + 1);
        // Insert ult note when energy is full
        if (simEnergy === MAX_ENERGY) {
          beat += 2; // breathing room
          if (beat * beatLen < duration - 3) {
            notes.push({ time: beat * beatLen, lane: -1, type: N_ULT });
            simEnergy = 0;
            beat += 2; // rest after ult
          }
        }
      }
      beat += phrase.spacing;
    }
  }

  // Fill if needed
  while (notes.length < 55 && beat * beatLen < duration - 3) {
    const pattern = [0, 1, 2];
    for (const lane of pattern) {
      if (beat * beatLen < duration - 3) {
        notes.push({ time: beat * beatLen, lane, type: N_TAP });
        simEnergy = Math.min(MAX_ENERGY, simEnergy + 1);
        if (simEnergy === MAX_ENERGY) {
          beat += 2;
          if (beat * beatLen < duration - 3) {
            notes.push({ time: beat * beatLen, lane: -1, type: N_ULT });
            simEnergy = 0;
            beat += 2;
          }
        }
      }
      beat += 1;
    }
    beat += 3;
  }

  return notes;
}

function generateNormalChart(bpm, duration) {
  // ~130 notes, 3 lanes, doubles, syncopation, 6-8 ult opportunities
  const beatLen = 60 / bpm;
  const notes = [];
  let simEnergy = 0;

  function tap(lane, time) {
    if (time < duration - 2) {
      notes.push({ time, lane, type: N_TAP });
      simEnergy = Math.min(MAX_ENERGY, simEnergy + 1);
    }
  }
  function hold(lane, time, dur) {
    if (time < duration - 2) {
      notes.push({ time, lane, type: N_HOLD, holdDuration: dur });
      simEnergy = Math.min(MAX_ENERGY, simEnergy + 1);
    }
  }
  function doub(l1, l2, time) { tap(l1, time); tap(l2, time); }
  function tryUlt(t) {
    if (simEnergy >= MAX_ENERGY && t < duration - 2) {
      notes.push({ time: t, lane: -1, type: N_ULT });
      simEnergy = 0;
      return true;
    }
    return false;
  }

  let t = 2.0;

  // Section A: quarter note streams (bars 1-8)
  for (let bar = 0; bar < 8; bar++) {
    const base = t + bar * 4 * beatLen;
    const seq = [
      [0, 1, 2, 1],
      [2, 1, 0, 1],
      [0, 2, 1, 0],
      [1, 0, 2, 1],
      [0, 0, 2, 2],
      [1, 1, 0, 0],
      [0, 2, 0, 2],
      [2, 1, 2, 1],
    ][bar];
    for (let i = 0; i < 4; i++) {
      tap(seq[i], base + i * beatLen);
    }
    // Check ult opportunity after every 2 bars
    if (bar % 2 === 1) {
      const ultTime = base + 4 * beatLen + beatLen;
      tryUlt(ultTime);
    }
  }

  // 2 bar rest
  t += 8 * 4 * beatLen + 2 * 4 * beatLen;

  // Section B: eighth notes + holds (bars 11-18)
  for (let bar = 0; bar < 8; bar++) {
    const base = t + bar * 4 * beatLen;
    if (bar % 4 === 0) {
      hold(0, base, beatLen * 2);
      tap(2, base + beatLen * 2);
      tap(1, base + beatLen * 3);
    } else if (bar % 4 === 1) {
      for (let i = 0; i < 4; i++) {
        tap(i % 3, base + i * beatLen * 0.5);
      }
      tap(2, base + beatLen * 3);
    } else if (bar % 4 === 2) {
      doub(0, 2, base);
      tap(1, base + beatLen);
      tap(2, base + beatLen * 2);
      doub(0, 1, base + beatLen * 3);
    } else {
      tap(2, base);
      hold(1, base + beatLen, beatLen * 1.5);
      tap(0, base + beatLen * 3);
    }
    if (bar % 3 === 2) {
      const ultTime = base + 4 * beatLen + beatLen * 0.5;
      tryUlt(ultTime);
    }
  }

  // 1 bar rest
  t += 8 * 4 * beatLen + 1 * 4 * beatLen;

  // Section C: climax (bars 20-27)
  for (let bar = 0; bar < 8; bar++) {
    const base = t + bar * 4 * beatLen;
    for (let i = 0; i < 6; i++) {
      const lane = [0, 1, 2, 1, 0, 2][i];
      tap(lane, base + i * beatLen * 0.5);
    }
    if (bar % 2 === 0) {
      doub(0, 2, base + beatLen * 3.5);
    }
    if (bar % 4 === 3) {
      const ultTime = base + 4 * beatLen + beatLen;
      tryUlt(ultTime);
    }
  }

  return notes;
}

function generateHardChart(bpm, duration) {
  // ~200 notes, dense 3-lane patterns, holds, triples, 10+ ult opportunities
  const beatLen = 60 / bpm;
  const notes = [];
  let simEnergy = 0;

  function tap(lane, time) {
    if (time < duration - 2) {
      notes.push({ time, lane, type: N_TAP });
      simEnergy = Math.min(MAX_ENERGY, simEnergy + 1);
    }
  }
  function hold(lane, time, dur) {
    if (time < duration - 2) {
      notes.push({ time, lane, type: N_HOLD, holdDuration: dur });
      simEnergy = Math.min(MAX_ENERGY, simEnergy + 1);
    }
  }
  function doub(l1, l2, time) { tap(l1, time); tap(l2, time); }
  function triple(time) { tap(0, time); tap(1, time); tap(2, time); }
  function tryUlt(t) {
    if (simEnergy >= MAX_ENERGY && t < duration - 2) {
      notes.push({ time: t, lane: -1, type: N_ULT });
      simEnergy = 0;
      return true;
    }
    return false;
  }

  let t = 1.0;

  // Section A: warm-up (8 bars)
  for (let bar = 0; bar < 8; bar++) {
    const base = t + bar * 4 * beatLen;
    const lanes = [0, 1, 2];
    for (let i = 0; i < 4; i++) {
      tap(lanes[(bar + i) % 3], base + i * beatLen);
    }
    if (bar >= 4) {
      tap((bar + 1) % 3, base + 3.5 * beatLen);
    }
    if (bar === 3 || bar === 7) {
      const ultTime = base + 4 * beatLen + beatLen * 0.5;
      tryUlt(ultTime);
    }
  }

  // Section B: eighth note streams (8 bars)
  t += 8 * 4 * beatLen;
  for (let bar = 0; bar < 8; bar++) {
    const base = t + bar * 4 * beatLen;
    for (let i = 0; i < 8; i++) {
      const patterns = [
        [0, 1, 2, 1, 0, 1, 2, 1],
        [2, 1, 0, 1, 2, 1, 0, 1],
        [0, 2, 1, 0, 2, 1, 0, 2],
        [1, 0, 2, 1, 0, 2, 1, 0],
        [0, 2, 0, 1, 0, 2, 0, 1],
        [2, 1, 2, 0, 2, 1, 2, 0],
        [0, 1, 0, 2, 0, 1, 0, 2],
        [2, 0, 2, 1, 2, 0, 2, 1],
      ];
      tap(patterns[bar % 8][i], base + i * beatLen * 0.5);
    }
    if (bar % 2 === 1) {
      const ultTime = base + 4 * beatLen + beatLen * 0.5;
      tryUlt(ultTime);
    }
  }

  // Section C: holds + doubles (8 bars)
  t += 8 * 4 * beatLen;
  for (let bar = 0; bar < 8; bar++) {
    const base = t + bar * 4 * beatLen;
    if (bar % 3 === 0) {
      hold(0, base, beatLen * 2);
      tap(2, base + beatLen);
      tap(1, base + beatLen * 1.5);
      doub(1, 2, base + beatLen * 2.5);
      tap(0, base + beatLen * 3);
      tap(2, base + beatLen * 3.5);
    } else if (bar % 3 === 1) {
      doub(0, 2, base);
      doub(0, 1, base + beatLen);
      hold(2, base + beatLen * 2, beatLen * 1.5);
      tap(0, base + beatLen * 2.5);
      tap(1, base + beatLen * 3.5);
    } else {
      for (let i = 0; i < 6; i++) {
        tap([0, 2, 1, 0, 2, 1][i], base + i * beatLen * 0.5);
      }
      doub(0, 2, base + beatLen * 3.5);
    }
    if (bar % 3 === 2) {
      const ultTime = base + 4 * beatLen + beatLen * 0.5;
      tryUlt(ultTime);
    }
  }

  // Section D: Grand finale (8 bars)
  t += 8 * 4 * beatLen;
  for (let bar = 0; bar < 8 && t + bar * 4 * beatLen < duration - 3; bar++) {
    const base = t + bar * 4 * beatLen;
    for (let i = 0; i < 8; i++) {
      const lane = [0, 2, 1, 0, 2, 0, 1, 2][i];
      tap(lane, base + i * beatLen * 0.5);
    }
    if (bar % 2 === 0) {
      doub(0, 1, base + beatLen * 0.25);
      doub(1, 2, base + beatLen * 2.25);
    }
    if (bar === 3 || bar === 7) {
      triple(base + beatLen * 3.75);
      const ultTime = base + 4 * beatLen + beatLen * 0.5;
      tryUlt(ultTime);
    }
  }

  return notes;
}

// ══════════════════════════════════════════════════════════════════════════════
// AUDIO SYSTEM: MP3 Loading + Synth Fallback
// ══════════════════════════════════════════════════════════════════════════════

// Cached decoded AudioBuffers per song id
const audioBufferCache = {};
// Track which songs have MP3 available
const songMp3Status = {}; // 'loading' | 'loaded' | 'missing' | 'error'
// Loading progress per song (0..1)
const songLoadProgress = {};

// The AudioContext for music playback
let musicCtx = null;
// Current playing source node
let musicSourceNode = null;
let musicGainNode = null;
let musicStartCtxTime = 0;
let musicPauseOffset = 0;
let usingSynth = false;

// Synthesized music engine (fallback)
const PENTA = [261.63, 293.66, 329.63, 392.00, 440.00];
const PENTA_LOW = PENTA.map(f => f / 2);
const PENTA_HIGH = PENTA.map(f => f * 2);

function getMusicContext() {
  if (!musicCtx) {
    musicCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return musicCtx;
}

async function loadSongAudio(song) {
  if (audioBufferCache[song.id]) {
    songMp3Status[song.id] = 'loaded';
    return audioBufferCache[song.id];
  }
  if (songMp3Status[song.id] === 'loading') return null;

  songMp3Status[song.id] = 'loading';
  songLoadProgress[song.id] = 0;

  try {
    const response = await fetch(song.file);
    if (!response.ok) {
      songMp3Status[song.id] = 'missing';
      return null;
    }

    const contentLength = response.headers.get('Content-Length');
    const total = contentLength ? parseInt(contentLength, 10) : 0;
    const reader = response.body.getReader();
    const chunks = [];
    let received = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      songLoadProgress[song.id] = total > 0 ? received / total : 0.5;
    }

    // Combine chunks
    const allBytes = new Uint8Array(received);
    let offset = 0;
    for (const chunk of chunks) {
      allBytes.set(chunk, offset);
      offset += chunk.length;
    }

    songLoadProgress[song.id] = 0.9;

    // Decode
    const ctx = getMusicContext();
    const audioBuffer = await ctx.decodeAudioData(allBytes.buffer);
    audioBufferCache[song.id] = audioBuffer;
    songMp3Status[song.id] = 'loaded';
    songLoadProgress[song.id] = 1;

    // Update song duration to match actual audio length
    song.duration = audioBuffer.duration;

    return audioBuffer;
  } catch (err) {
    console.warn(`Failed to load ${song.file}:`, err);
    songMp3Status[song.id] = 'error';
    return null;
  }
}

function stopMusic() {
  if (musicSourceNode) {
    try { musicSourceNode.onended = null; musicSourceNode.stop(); } catch(_) {}
    musicSourceNode = null;
  }
  if (synthEngine) {
    synthEngine.stop();
    synthEngine = null;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// SYNTHESIZED MUSIC FALLBACK ENGINE
// ══════════════════════════════════════════════════════════════════════════════

let synthEngine = null;

function createSynthEngine(actx, song) {
  const masterGain = actx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(actx.destination);

  const bpm = song.bpm;
  const beatLen = 60 / bpm;
  let schedulerInterval = null;
  let nextBeatTime = 0;
  let currentBeat = 0;
  let isPlaying = false;

  function scheduleKick(time) {
    const osc = actx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(30, time + 0.12);
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.7, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
    osc.connect(gain).connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.15);
  }

  function scheduleHihat(time) {
    const bufLen = Math.floor(actx.sampleRate * 0.05);
    const buf = actx.createBuffer(1, bufLen, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const src = actx.createBufferSource();
    src.buffer = buf;
    const hp = actx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 7000;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.25, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
    src.connect(hp).connect(gain).connect(masterGain);
    src.start(time);
    src.stop(time + 0.05);
  }

  function scheduleSnare(time) {
    const bufLen = Math.floor(actx.sampleRate * 0.1);
    const buf = actx.createBuffer(1, bufLen, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const src = actx.createBufferSource();
    src.buffer = buf;
    const bp = actx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 3000;
    bp.Q.value = 1;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.35, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    src.connect(bp).connect(gain).connect(masterGain);
    src.start(time);
    src.stop(time + 0.1);

    const osc = actx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, time);
    osc.frequency.exponentialRampToValueAtTime(80, time + 0.06);
    const g2 = actx.createGain();
    g2.gain.setValueAtTime(0.3, time);
    g2.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
    osc.connect(g2).connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.08);
  }

  function scheduleBass(time, noteIndex) {
    const freq = PENTA_LOW[noteIndex % PENTA_LOW.length];
    const osc = actx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.35, time);
    gain.gain.setValueAtTime(0.35, time + beatLen * 0.8);
    gain.gain.exponentialRampToValueAtTime(0.001, time + beatLen * 0.95);
    osc.connect(gain).connect(masterGain);
    osc.start(time);
    osc.stop(time + beatLen);
  }

  function scheduleMelody(time, beat) {
    const melodyPatterns = [
      [0, 2, 4, 2],
      [1, 3, 4, 3],
      [2, 4, 3, 1],
      [4, 2, 0, 2],
    ];
    const bar = Math.floor(beat / 4) % melodyPatterns.length;
    const pos = beat % 4;
    const noteIdx = melodyPatterns[bar][pos];
    const freq = PENTA_HIGH[noteIdx];

    const osc = actx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(0.12, time + 0.02);
    gain.gain.setValueAtTime(0.12, time + beatLen * 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, time + beatLen * 0.7);
    osc.connect(gain).connect(masterGain);
    osc.start(time);
    osc.stop(time + beatLen * 0.75);
  }

  // Bass/melody patterns per difficulty
  const bassPattern = song.difficulty === 3 ? [0, 3, 4, 2, 1, 4, 3, 0]
    : song.difficulty === 2 ? [0, 4, 2, 3] : [0, 2, 4, 2];
  const bassRhythm = song.difficulty === 3 ? [0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5]
    : song.difficulty === 2 ? [0, 1, 2, 3] : [0, 2];

  function scheduleBeats() {
    while (nextBeatTime < actx.currentTime + 0.2) {
      const beatInBar = currentBeat % 4;

      if (beatInBar === 0 || beatInBar === 2) scheduleKick(nextBeatTime);
      if (beatInBar === 1 || beatInBar === 3) scheduleSnare(nextBeatTime);

      scheduleHihat(nextBeatTime);
      if (bpm >= 120) scheduleHihat(nextBeatTime + beatLen * 0.5);

      if (bassRhythm.includes(beatInBar)) {
        scheduleBass(nextBeatTime, bassPattern[currentBeat % bassPattern.length]);
      }

      if (song.difficulty >= 1) scheduleMelody(nextBeatTime, currentBeat);

      // Beat pulse visual
      const songT = nextBeatTime - musicStartCtxTime;
      if (songT >= 0) beatPulse = 1;

      nextBeatTime += beatLen;
      currentBeat++;

      // Stop if we've exceeded song duration
      if ((nextBeatTime - musicStartCtxTime) > song.duration + 2) {
        stop();
        return;
      }
    }
  }

  function stop() {
    isPlaying = false;
    if (schedulerInterval) {
      clearInterval(schedulerInterval);
      schedulerInterval = null;
    }
  }

  return {
    start(startTime) {
      isPlaying = true;
      musicStartCtxTime = startTime;
      nextBeatTime = startTime;
      currentBeat = 0;
      schedulerInterval = setInterval(scheduleBeats, 50);
      scheduleBeats();
    },
    stop,
    get isPlaying() { return isPlaying; },
    masterGain,
  };
}

// ══════════════════════════════════════════════════════════════════════════════
// TOUCH HANDLING (3 lanes + ultimate button)
// ══════════════════════════════════════════════════════════════════════════════

function setupTouchHandlers() {
  const activeTouches = new Map();

  function getLane(x, y) {
    const judgeY = H * JUDGE_Y_FRAC;
    const laneW = W / NUM_LANES;
    // Check if tapping the ult button area (above the 3 lanes)
    if (swordEnergy >= MAX_ENERGY) {
      const ultBtnY = judgeY + 2;
      const ultBtnH = (H - judgeY) * 0.35;
      const ultBtnW = W * 0.5;
      const ultBtnX = (W - ultBtnW) / 2;
      if (y >= ultBtnY && y <= ultBtnY + ultBtnH && x >= ultBtnX && x <= ultBtnX + ultBtnW) {
        return 'ult';
      }
    }
    // Normal lane detection in bottom area
    const lane = Math.floor(x / laneW);
    return Math.max(0, Math.min(NUM_LANES - 1, lane));
  }

  function getCanvasPos(touch) {
    const rect = canvas.getBoundingClientRect();
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (!audio) { try { audio = initAudio(); } catch(e2) { console.warn('Audio init failed:', e2); } }
    const mctx = getMusicContext();
    if (mctx.state === 'suspended') mctx.resume();
    if (audio && audio.context && audio.context.state === 'suspended') audio.context.resume();

    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const pos = getCanvasPos(touch);
      const lane = getLane(pos.x, pos.y);

      activeTouches.set(touch.identifier, lane);

      if (state === S_PLAYING) {
        if (lane === 'ult') {
          ultTouched = true;
          ultFlash = 0.15;
          handleUltPress(touch.identifier);
        } else {
          laneTouched[lane] = true;
          laneFlash[lane] = 0.15;
          handleLanePress(lane, touch.identifier);
        }
      } else if (state === S_TITLE) {
        handleTitleTap(pos.x, pos.y);
      } else if (state === S_RESULTS) {
        handleResultsTap(pos.x, pos.y);
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const pos = getCanvasPos(touch);
      const newLane = getLane(pos.x, pos.y);
      const oldLane = activeTouches.get(touch.identifier);
      if (oldLane !== undefined && oldLane !== newLane) {
        if (oldLane === 'ult') {
          ultTouched = false;
        } else {
          laneTouched[oldLane] = false;
          if (laneHolds[oldLane] && laneHolds[oldLane].touchId === touch.identifier) {
            endHoldNote(oldLane);
          }
        }
        activeTouches.set(touch.identifier, newLane);
        if (newLane === 'ult') {
          ultTouched = true;
          ultFlash = 0.15;
        } else {
          laneTouched[newLane] = true;
          laneFlash[newLane] = 0.15;
        }
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const lane = activeTouches.get(touch.identifier);
      activeTouches.delete(touch.identifier);
      if (lane !== undefined) {
        if (lane === 'ult') {
          ultTouched = false;
        } else {
          laneTouched[lane] = false;
          if (laneHolds[lane] && laneHolds[lane].touchId === touch.identifier) {
            endHoldNote(lane);
          }
        }
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchcancel', (e) => {
    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const lane = activeTouches.get(touch.identifier);
      activeTouches.delete(touch.identifier);
      if (lane !== undefined) {
        if (lane === 'ult') {
          ultTouched = false;
        } else {
          laneTouched[lane] = false;
          if (laneHolds[lane]) endHoldNote(lane);
        }
      }
    }
  }, { passive: false });

  // Mouse fallback for desktop testing
  let mouseDown = false;
  let mouseLane = -1;
  canvas.addEventListener('mousedown', (e) => {
    if (!audio) { try { audio = initAudio(); } catch(e2) { console.warn('Audio init failed:', e2); } }
    const mctx = getMusicContext();
    if (mctx.state === 'suspended') mctx.resume();
    if (audio && audio.context && audio.context.state === 'suspended') audio.context.resume();
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const lane = getLane(x, y);
    mouseDown = true;
    mouseLane = lane;

    if (state === S_PLAYING) {
      if (lane === 'ult') {
        ultTouched = true;
        ultFlash = 0.15;
        handleUltPress();
      } else {
        laneTouched[lane] = true;
        laneFlash[lane] = 0.15;
        handleLanePress(lane);
      }
    } else if (state === S_TITLE) {
      handleTitleTap(x, y);
    } else if (state === S_RESULTS) {
      handleResultsTap(x, y);
    }
  });
  canvas.addEventListener('mouseup', () => {
    mouseDown = false;
    if (mouseLane === 'ult') {
      ultTouched = false;
    } else if (mouseLane >= 0) {
      laneTouched[mouseLane] = false;
      if (laneHolds[mouseLane]) endHoldNote(mouseLane);
    }
    mouseLane = -1;
  });
  canvas.addEventListener('mousemove', (e) => {
    if (!mouseDown) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const newLane = getLane(x, y);
    if (newLane !== mouseLane) {
      if (mouseLane === 'ult') {
        ultTouched = false;
      } else if (mouseLane >= 0) {
        laneTouched[mouseLane] = false;
        if (laneHolds[mouseLane]) endHoldNote(mouseLane);
      }
      mouseLane = newLane;
      if (newLane === 'ult') {
        ultTouched = true;
        ultFlash = 0.15;
      } else {
        laneTouched[newLane] = true;
        laneFlash[newLane] = 0.15;
      }
    }
  });

  // Keyboard support for desktop
  const keyLaneMap = { 'd': 0, 'f': 1, 'j': 2, 'D': 0, 'F': 1, 'J': 2 };
  const keyUlt = [' ', 'k', 'K'];
  document.addEventListener('keydown', (e) => {
    if (state !== S_PLAYING) return;
    if (e.repeat) return;
    if (keyUlt.includes(e.key)) {
      ultTouched = true;
      ultFlash = 0.15;
      handleUltPress();
    } else if (keyLaneMap[e.key] !== undefined) {
      const lane = keyLaneMap[e.key];
      laneTouched[lane] = true;
      laneFlash[lane] = 0.15;
      handleLanePress(lane);
    }
  });
  document.addEventListener('keyup', (e) => {
    if (keyUlt.includes(e.key)) {
      ultTouched = false;
    } else if (keyLaneMap[e.key] !== undefined) {
      const lane = keyLaneMap[e.key];
      laneTouched[lane] = false;
      if (laneHolds[lane]) endHoldNote(lane);
    }
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// GAMEPLAY LOGIC (with 剑气 System)
// ══════════════════════════════════════════════════════════════════════════════

function getComboMult() {
  let mult = 1;
  for (const [threshold, m] of COMBO_MULT) {
    if (combo >= threshold) { mult = m; break; }
  }
  return mult;
}

function handleLanePress(lane, touchId) {
  if (state !== S_PLAYING || ultActive) return;

  let bestNote = null;
  let bestDiff = Infinity;

  for (const note of activeNotes) {
    if (note.type === N_ULT) continue; // ult notes handled separately
    if (note.lane !== lane || note.hit || note.missed) continue;
    const diff = Math.abs(note.time - songTime);
    if (diff < J_GOOD + 0.02 && diff < bestDiff) {
      bestDiff = diff;
      bestNote = note;
    }
  }

  if (!bestNote) return;

  const diff = Math.abs(bestNote.time - songTime);
  let judgment, scoreVal, color;

  if (diff <= J_PERFECT) {
    judgment = 'PERFECT';
    scoreVal = 100;
    color = '#FFD700';
    audio && audio.playBeat(true);
    screenShake = 0.03;
    // Perfect: +1 energy AND brief slow-mo effect
    swordEnergy = Math.min(MAX_ENERGY, swordEnergy + 1);
    slowMoTimer = 0.15;
    addEnergyGainAnim();
  } else if (diff <= J_GREAT) {
    judgment = 'GREAT';
    scoreVal = 75;
    color = '#3498DB';
    audio && audio.playBeat(false);
    // Regular hit: +1 energy
    swordEnergy = Math.min(MAX_ENERGY, swordEnergy + 1);
    addEnergyGainAnim();
  } else if (diff <= J_GOOD) {
    judgment = 'GOOD';
    scoreVal = 50;
    color = '#2ECC71';
    audio && audio.playBeat(false);
    // Regular hit: +1 energy
    swordEnergy = Math.min(MAX_ENERGY, swordEnergy + 1);
    addEnergyGainAnim();
  } else {
    return;
  }

  bestNote.hit = true;
  bestNote.hitTime = songTime;
  bestNote.judgment = judgment;

  combo++;
  if (combo > maxCombo) maxCombo = combo;
  comboScale = 1.4;

  const mult = getComboMult();
  const finalScore = Math.round(scoreVal * mult);
  score += finalScore;
  judgments[judgment.toLowerCase()]++;

  const laneW = W / NUM_LANES;
  const laneX = (lane + 0.5) * laneW;
  const judgeY = H * JUDGE_Y_FRAC;
  judgmentDisplay = { text: judgment, color, timer: 0.6, x: laneX };

  const particleCount = judgment === 'PERFECT' ? 20 : judgment === 'GREAT' ? 12 : 6;
  particles.emit(laneX, judgeY, {
    count: particleCount,
    color: LANE_COLORS[lane],
    speed: 150,
    life: 0.5,
    size: 4,
    gravity: 200,
  });

  floatText.add(laneX, judgeY - 30, `+${finalScore}`, { color, size: 18, duration: 0.8 });

  // Check energy full
  if (swordEnergy === MAX_ENERGY) {
    goldBorderGlow = 1;
  }

  if (combo === 50) {
    swordFlashTimer = 1.5;
    audio && audio.playCombo(5);
  } else if (combo % 25 === 0 && combo > 0) {
    audio && audio.playCombo(Math.min(10, Math.floor(combo / 25)));
  }

  if (bestNote.type === N_HOLD) {
    laneHolds[lane] = {
      noteIndex: activeNotes.indexOf(bestNote),
      startTime: songTime,
      touchId: touchId ?? null,
      baseScore: finalScore,
    };
  }
}

function handleUltPress(touchId) {
  if (state !== S_PLAYING) return;
  if (swordEnergy < MAX_ENERGY) return;
  if (ultActive) return;

  // Find an ult note in the judgment window
  let bestNote = null;
  let bestDiff = Infinity;

  for (const note of activeNotes) {
    if (note.type !== N_ULT || note.hit || note.missed) continue;
    const diff = Math.abs(note.time - songTime);
    if (diff < J_GOOD + 0.04 && diff < bestDiff) {
      bestDiff = diff;
      bestNote = note;
    }
  }

  if (!bestNote) return;

  // Ultimate hit!
  bestNote.hit = true;
  bestNote.hitTime = songTime;
  bestNote.judgment = 'ULTIMATE';

  // Reset energy, activate ult
  swordEnergy = 0;
  ultActive = true;
  ultTimer = ULT_DURATION;
  ultVisualTimer = ULT_VISUAL_DURATION;
  goldBorderGlow = 0;

  // Generate slash lines
  ultSlashLines = [
    { x1: -50, y1: H * 0.2, x2: W + 50, y2: H * 0.6, delay: 0 },
    { x1: W + 50, y1: H * 0.1, x2: -50, y2: H * 0.7, delay: 0.1 },
    { x1: W * 0.5, y1: -50, x2: W * 0.5, y2: H + 50, delay: 0.2 },
  ];

  // Score: 500 * combo multiplier
  combo++;
  if (combo > maxCombo) maxCombo = combo;
  comboScale = 1.8;

  const mult = getComboMult();
  const finalScore = Math.round(ULT_SCORE * mult);
  score += finalScore;

  // Massive visual effects
  screenShake = 0.15;

  // Gold particle explosion from center
  particles.emit(W / 2, H / 2, {
    count: 60,
    color: '#FFD700',
    speed: 300,
    life: 1.2,
    size: 6,
    gravity: 100,
  });
  particles.emit(W / 2, H / 2, {
    count: 30,
    color: '#FFF',
    speed: 200,
    life: 0.8,
    size: 3,
    gravity: 150,
  });

  floatText.add(W / 2, H * 0.35, `青莲剑歌! +${finalScore}`, { color: '#FFD700', size: 28, duration: 1.5 });

  audio && audio.playCombo(10);
}

function addEnergyGainAnim() {
  energyGainAnim.push({ timer: 0.5, value: swordEnergy });
}

function endHoldNote(lane) {
  const hold = laneHolds[lane];
  if (!hold) return;
  laneHolds[lane] = null;

  const note = activeNotes[hold.noteIndex];
  if (!note || note.type !== N_HOLD) return;

  const heldRatio = Math.min(1, (songTime - hold.startTime) / ((note.holdDuration || 0.5)));
  const holdBonus = Math.round(50 * heldRatio);

  if (heldRatio > 0.6) {
    score += holdBonus;
    const laneW = W / NUM_LANES;
    const laneX = (lane + 0.5) * laneW;
    floatText.add(laneX, H * JUDGE_Y_FRAC - 50, `+${holdBonus}`, {
      color: '#FFD700', size: 16, duration: 0.6,
    });
  }

  note.holdComplete = true;
}

function processAutoMiss(dt) {
  for (const note of activeNotes) {
    if (note.hit || note.missed) continue;

    // Ult notes: only visible/active when energy is full
    if (note.type === N_ULT) {
      // If energy isn't full, ult notes are invisible and just pass through
      if (swordEnergy < MAX_ENERGY) {
        if (songTime - note.time > J_GOOD + 0.1) {
          note.missed = true;
          note.missTime = songTime;
          // No penalty for missing ult when energy isn't full
        }
        continue;
      }
      // Energy is full but player missed the ult note
      if (songTime - note.time > J_GOOD + 0.04) {
        note.missed = true;
        note.missTime = songTime;
        // Energy stays at 4, just a missed opportunity
        // No combo break for ult miss
      }
      continue;
    }

    // Regular notes
    if (songTime - note.time > J_GOOD + 0.02) {
      note.missed = true;
      note.missTime = songTime;
      combo = 0;
      judgments.miss++;
      // Miss: -1 energy
      swordEnergy = Math.max(0, swordEnergy - 1);
      if (swordEnergy < MAX_ENERGY) goldBorderGlow = 0;

      const laneW = W / NUM_LANES;
      const laneX = (note.lane + 0.5) * laneW;
      judgmentDisplay = { text: 'MISS', color: '#E74C3C', timer: 0.5, x: laneX };
    }
  }

  // Handle hold note endings
  for (let lane = 0; lane < NUM_LANES; lane++) {
    if (laneHolds[lane]) {
      const note = activeNotes[laneHolds[lane].noteIndex];
      if (note) {
        const holdEnd = note.time + (note.holdDuration || 0);
        if (songTime >= holdEnd + 0.05) {
          endHoldNote(lane);
        }
      }
    }
  }
}

function processUltAutoScore(dt) {
  if (!ultActive) return;
  ultTimer -= dt;
  if (ultTimer <= 0) {
    ultActive = false;
    ultTimer = 0;
    return;
  }

  // Auto-hit all notes currently in the judgment window
  for (const note of activeNotes) {
    if (note.hit || note.missed || note.type === N_ULT) continue;
    const diff = note.time - songTime;
    // Auto-hit notes that are within a generous window
    if (diff > -0.3 && diff < 0.3) {
      note.hit = true;
      note.hitTime = songTime;
      note.judgment = 'AUTO';
      note.autoHit = true;
      score += ULT_AUTO_SCORE;
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      // Energy gain from auto-hit
      swordEnergy = Math.min(MAX_ENERGY, swordEnergy + 1);

      const laneW = W / NUM_LANES;
      const laneX = (note.lane + 0.5) * laneW;
      particles.emit(laneX, H * JUDGE_Y_FRAC, {
        count: 5,
        color: '#FFD700',
        speed: 100,
        life: 0.3,
        size: 3,
        gravity: 150,
      });
      floatText.add(laneX, H * JUDGE_Y_FRAC - 20, `+${ULT_AUTO_SCORE}`, {
        color: '#FFD700', size: 14, duration: 0.5,
      });
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// TITLE SCREEN
// ══════════════════════════════════════════════════════════════════════════════

function handleTitleTap(x, y) {
  // Handle missing prompt modal first
  if (showMissingPrompt) {
    handleMissingPromptTap(x, y);
    return;
  }

  // Back button
  if (x < W * 0.25 && y < H * 0.08) {
    window.location.href = '../../index.html';
    return;
  }

  // Song selection buttons
  const btnWidth = W * 0.7;
  const btnHeight = H * 0.1;
  const btnX = (W - btnWidth) / 2;
  const startY = H * 0.42;
  const gap = btnHeight + H * 0.02;

  for (let i = 0; i < SONGS.length; i++) {
    const btnY = startY + i * gap;
    if (x >= btnX && x <= btnX + btnWidth && y >= btnY && y <= btnY + btnHeight) {
      titleSelectedSong = i;
    }
  }

  // Start button
  const startBtnY = startY + 3 * gap + H * 0.01;
  const startBtnH = H * 0.07;
  if (x >= btnX && x <= btnX + btnWidth && y >= startBtnY && y <= startBtnY + startBtnH) {
    const song = SONGS[titleSelectedSong];
    const status = songMp3Status[song.id];
    if (status === 'loaded') {
      startGame(titleSelectedSong, false);
    } else if (status === 'missing' || status === 'error') {
      showMissingPrompt = true;
      missingPromptSong = song;
    } else {
      startGame(titleSelectedSong, true);
    }
  }
}

function handleMissingPromptTap(x, y) {
  const modalW = W * 0.85;
  const modalH = H * 0.42;
  const modalX = (W - modalW) / 2;
  const modalY = (H - modalH) / 2;

  const btnW = modalW * 0.6;
  const btnH = H * 0.05;
  const btnX = (W - btnW) / 2;
  const btn1Y = modalY + modalH * 0.58;
  const btn2Y = modalY + modalH * 0.75;

  // "Use synth" button
  if (x >= btnX && x <= btnX + btnW && y >= btn1Y && y <= btn1Y + btnH) {
    showMissingPrompt = false;
    startGame(titleSelectedSong, true);
    return;
  }

  // "Close" button
  if (x >= btnX && x <= btnX + btnW && y >= btn2Y && y <= btn2Y + btnH) {
    showMissingPrompt = false;
    return;
  }

  // Click outside modal to close
  if (x < modalX || x > modalX + modalW || y < modalY || y > modalY + modalH) {
    showMissingPrompt = false;
  }
}

function startGame(songIndex, forceSynth) {
  selectedSong = songIndex;
  currentSong = SONGS[songIndex];
  usingSynth = forceSynth;

  // Reset state
  score = 0;
  combo = 0;
  maxCombo = 0;
  judgments = { perfect: 0, great: 0, good: 0, miss: 0 };
  swordFlashTimer = 0;
  beatPulse = 0;
  screenShake = 0;
  laneHolds = [null, null, null];

  // Reset 剑气 system
  swordEnergy = 0;
  ultActive = false;
  ultTimer = 0;
  ultVisualTimer = 0;
  ultSlashLines = [];
  energyPulseTimer = 0;
  energyGainAnim = [];
  goldBorderGlow = 0;
  slowMoTimer = 0;

  // Clone notes with gameplay state
  activeNotes = currentSong.notes.map(n => ({
    ...n,
    hit: false,
    missed: false,
    hitTime: 0,
    missTime: 0,
    holdComplete: false,
    judgment: '',
    autoHit: false,
  }));

  // Calculate max possible score (assume all perfect + all ults hit)
  let simCombo = 0;
  let simEnergy = 0;
  maxPossibleScore = 0;
  for (const note of activeNotes) {
    simCombo++;
    let mult = 1;
    for (const [threshold, m] of COMBO_MULT) {
      if (simCombo >= threshold) { mult = m; break; }
    }
    if (note.type === N_ULT) {
      maxPossibleScore += Math.round(ULT_SCORE * mult);
      simEnergy = 0;
    } else {
      maxPossibleScore += Math.round(100 * mult);
      simEnergy++;
      if (note.type === N_HOLD) maxPossibleScore += 50;
    }
  }

  // Start countdown
  state = S_COUNTDOWN;
  countdownTimer = 0;
  countdownNum = 3;

  audio && audio.playCountdown();
}

function startPlaying() {
  state = S_PLAYING;
  songTime = -0.5; // small lead-in

  const ctx = getMusicContext();
  if (ctx.state === 'suspended') ctx.resume();

  stopMusic();

  if (!usingSynth && audioBufferCache[currentSong.id]) {
    // Play MP3 using AudioBufferSourceNode
    musicGainNode = ctx.createGain();
    musicGainNode.gain.value = 0.5;
    musicGainNode.connect(ctx.destination);

    musicSourceNode = ctx.createBufferSource();
    musicSourceNode.buffer = audioBufferCache[currentSong.id];
    musicSourceNode.connect(musicGainNode);

    musicStartCtxTime = ctx.currentTime + 0.5; // 0.5s lead-in
    songStartRealTime = musicStartCtxTime;
    musicSourceNode.start(musicStartCtxTime);

    musicSourceNode.onended = () => {
      if (state === S_PLAYING) {
        setTimeout(() => { if (state === S_PLAYING) showResults(); }, 500);
      }
    };
  } else {
    // Use synth fallback
    usingSynth = true;
    songStartRealTime = ctx.currentTime + 0.5;
    musicStartCtxTime = songStartRealTime;
    synthEngine = createSynthEngine(ctx, currentSong);
    synthEngine.start(songStartRealTime);
  }

  audio && audio.playStart();
}

// ══════════════════════════════════════════════════════════════════════════════
// RESULTS SCREEN
// ══════════════════════════════════════════════════════════════════════════════

function showResults() {
  state = S_RESULTS;
  stopMusic();
  gameOverReady = false;
  gameOverRank = -1;

  audio && audio.playScore();

  async function handleResults() {
    if (isTopScore(GAME_ID, score)) {
      const name = await showNicknameInput(screen.canvas, score, '进入今日前5!');
      const result = addScore(GAME_ID, score, name);
      gameOverRank = result.rank;
    } else {
      const result = addScore(GAME_ID, score, getPlayerName());
      gameOverRank = result.rank;
    }
    gameOverReady = true;
  }
  handleResults();
}

function handleResultsTap(x, y) {
  if (!gameOverReady) return;
  const btnW = W * 0.35;
  const btnH = H * 0.06;
  const gap = W * 0.05;
  const baseY = H * 0.82;

  // Retry
  const retryX = W / 2 - btnW - gap / 2;
  if (x >= retryX && x <= retryX + btnW && y >= baseY && y <= baseY + btnH) {
    startGame(selectedSong, usingSynth);
    return;
  }

  // Back
  const backX = W / 2 + gap / 2;
  if (x >= backX && x <= backX + btnW && y >= baseY && y <= baseY + btnH) {
    state = S_TITLE;
    return;
  }

  // Lobby
  const lobbyY = baseY + btnH + H * 0.02;
  if (y >= lobbyY && y <= lobbyY + H * 0.05 && x >= W * 0.2 && x <= W * 0.8) {
    window.location.href = '../../index.html';
    return;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// UPDATE
// ══════════════════════════════════════════════════════════════════════════════

function update(dt) {
  W = screen.width;
  H = screen.height;
  safeTop = screen.safeTop;
  safeBottom = screen.safeBottom;

  particles.update(dt);
  floatText.update(dt);

  for (let i = 0; i < NUM_LANES; i++) {
    if (laneFlash[i] > 0) laneFlash[i] = Math.max(0, laneFlash[i] - dt);
  }
  if (ultFlash > 0) ultFlash = Math.max(0, ultFlash - dt);
  if (judgmentDisplay.timer > 0) judgmentDisplay.timer -= dt;
  if (comboScale > 1) comboScale = Math.max(1, comboScale - dt * 3);
  if (swordFlashTimer > 0) swordFlashTimer -= dt;
  if (beatPulse > 0) beatPulse = Math.max(0, beatPulse - dt * 4);
  if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 2);
  if (slowMoTimer > 0) slowMoTimer = Math.max(0, slowMoTimer - dt);
  if (ultVisualTimer > 0) ultVisualTimer = Math.max(0, ultVisualTimer - dt);
  if (goldBorderGlow > 0 && swordEnergy < MAX_ENERGY) goldBorderGlow = Math.max(0, goldBorderGlow - dt * 2);

  // Energy pulse animation when full
  if (swordEnergy >= MAX_ENERGY) {
    energyPulseTimer += dt * 3;
    goldBorderGlow = 0.5 + Math.sin(energyPulseTimer) * 0.5;
  } else {
    energyPulseTimer = 0;
  }

  // Energy gain animation
  energyGainAnim = energyGainAnim.filter(a => {
    a.timer -= dt;
    return a.timer > 0;
  });

  if (state === S_LOADING) {
    // Loading handled in init
  } else if (state === S_TITLE) {
    titleTime += dt;
  } else if (state === S_COUNTDOWN) {
    countdownTimer += dt;
    if (countdownTimer >= 1 && countdownNum === 3) {
      countdownNum = 2;
      audio && audio.playCountdown();
    } else if (countdownTimer >= 2 && countdownNum === 2) {
      countdownNum = 1;
      audio && audio.playCountdown();
    } else if (countdownTimer >= 3) {
      startPlaying();
    }
  } else if (state === S_PLAYING) {
    // Update song time from AudioContext for precision
    const mctx = getMusicContext();
    if (mctx) {
      songTime = mctx.currentTime - songStartRealTime;
    } else {
      songTime += dt;
    }

    // Beat pulse for synth mode (and MP3 mode based on BPM)
    if (currentSong) {
      const beatLen = 60 / currentSong.bpm;
      const beatFrac = ((songTime % beatLen) + beatLen) % beatLen / beatLen;
      if (beatFrac < 0.05) beatPulse = Math.max(beatPulse, 0.8);
    }

    processAutoMiss(dt);
    processUltAutoScore(dt);

    // Check song end
    if (songTime >= currentSong.duration) {
      showResults();
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════════

function render() {
  ctx.save();

  if (screenShake > 0) {
    const shakeX = (Math.random() - 0.5) * screenShake * 20;
    const shakeY = (Math.random() - 0.5) * screenShake * 20;
    ctx.translate(shakeX, shakeY);
  }

  renderBackground();

  if (state === S_TITLE) {
    renderTitle();
    if (showMissingPrompt) renderMissingPrompt();
  } else if (state === S_COUNTDOWN) {
    renderPlayfield();
    renderCountdown();
  } else if (state === S_PLAYING) {
    renderPlayfield();
    renderNotes();
    renderJudgmentLine();
    renderLaneButtons();
    renderSwordEnergyIndicator();
    renderHUD();
    renderEffects();
    renderUltEffect();
    renderGoldBorder();
  } else if (state === S_RESULTS) {
    renderResults();
  } else if (state === S_LOADING) {
    renderLoading();
  }

  particles.render(ctx);
  floatText.render(ctx);
  ctx.restore();
}

function renderBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(0.5, '#0f0f2a');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.globalAlpha = 0.03 + beatPulse * 0.02;
  for (let i = 0; i < 5; i++) {
    const x = W * (0.1 + i * 0.2);
    const grad2 = ctx.createLinearGradient(x - 30, 0, x + 30, 0);
    grad2.addColorStop(0, 'transparent');
    grad2.addColorStop(0.5, '#D4A84B');
    grad2.addColorStop(1, 'transparent');
    ctx.fillStyle = grad2;
    ctx.fillRect(x - 40, 0, 80, H);
  }
  ctx.restore();

  // Darken during ult visual
  if (ultVisualTimer > 0 && state === S_PLAYING) {
    const darkAlpha = Math.min(0.5, ultVisualTimer / ULT_VISUAL_DURATION * 0.6);
    ctx.save();
    ctx.fillStyle = `rgba(0,0,0,${darkAlpha})`;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  if (state === S_PLAYING || state === S_COUNTDOWN) {
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.font = `bold ${H * 0.15}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#D4A84B';
    ctx.fillText('李白', W / 2, H * 0.4);
    ctx.restore();
  }
}

function renderLoading() {
  ctx.fillStyle = '#D4A84B';
  ctx.font = `bold ${W * 0.06}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(loadingMessage, W / 2, H * 0.4);

  // Loading progress for songs
  const barW = W * 0.6;
  const barH = H * 0.015;
  const barX = (W - barW) / 2;
  let baseY = H * 0.5;

  for (let i = 0; i < SONGS.length; i++) {
    const song = SONGS[i];
    const status = songMp3Status[song.id];
    const progress = songLoadProgress[song.id] || 0;
    const y = baseY + i * (barH + H * 0.06);

    // Song title
    ctx.fillStyle = status === 'loaded' ? '#2ECC71' : status === 'missing' ? '#E74C3C' : '#999';
    ctx.font = `${W * 0.03}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(song.title, barX, y - barH);

    // Status text
    ctx.textAlign = 'right';
    ctx.font = `${W * 0.025}px sans-serif`;
    if (status === 'loaded') {
      ctx.fillStyle = '#2ECC71';
      ctx.fillText('已加载', barX + barW, y - barH);
    } else if (status === 'missing') {
      ctx.fillStyle = '#E74C3C';
      ctx.fillText('未找到', barX + barW, y - barH);
    } else if (status === 'loading') {
      ctx.fillStyle = '#D4A84B';
      ctx.fillText(`${Math.round(progress * 100)}%`, barX + barW, y - barH);
    } else if (status === 'error') {
      ctx.fillStyle = '#E74C3C';
      ctx.fillText('加载失败', barX + barW, y - barH);
    }

    // Progress bar background
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    drawRoundRect(ctx, barX, y, barW, barH, barH / 2);
    ctx.fill();

    // Progress bar fill
    if (status === 'loaded') {
      ctx.fillStyle = '#2ECC71';
      drawRoundRect(ctx, barX, y, barW, barH, barH / 2);
      ctx.fill();
    } else if (status === 'loading' && progress > 0) {
      ctx.fillStyle = '#D4A84B';
      drawRoundRect(ctx, barX, y, barW * progress, barH, barH / 2);
      ctx.fill();
    }
  }
}

function renderPlayfield() {
  const laneW = W / NUM_LANES;
  const judgeY = H * JUDGE_Y_FRAC;

  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 1; i < NUM_LANES; i++) {
    ctx.beginPath();
    ctx.moveTo(i * laneW, 0);
    ctx.lineTo(i * laneW, judgeY);
    ctx.stroke();
  }

  for (let i = 0; i < NUM_LANES; i++) {
    const grad = ctx.createLinearGradient(0, judgeY - H * 0.15, 0, judgeY);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(1, `rgba(${LANE_RGB[i]},0.05)`);
    ctx.fillStyle = grad;
    ctx.fillRect(i * laneW, judgeY - H * 0.15, laneW, H * 0.15);
  }

  ctx.restore();
}

function renderJudgmentLine() {
  const judgeY = H * JUDGE_Y_FRAC;

  ctx.save();
  const glow = 0.6 + beatPulse * 0.4;
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 10 + beatPulse * 10;
  ctx.strokeStyle = `rgba(255, 215, 0, ${glow})`;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, judgeY);
  ctx.lineTo(W, judgeY);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  const laneW = W / NUM_LANES;
  for (let i = 0; i < NUM_LANES; i++) {
    if (laneFlash[i] > 0) {
      ctx.save();
      const alpha = laneFlash[i] / 0.15;
      const grad = ctx.createRadialGradient(
        (i + 0.5) * laneW, judgeY, 0,
        (i + 0.5) * laneW, judgeY, laneW * 0.6
      );
      grad.addColorStop(0, `rgba(${LANE_RGB[i]},${alpha * 0.5})`);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(i * laneW, judgeY - laneW * 0.6, laneW, laneW * 1.2);
      ctx.restore();
    }
  }
}

function renderNotes() {
  const laneW = W / NUM_LANES;
  const judgeY = H * JUDGE_Y_FRAC;
  const topY = H * 0.05;
  const scrollRange = judgeY - topY;

  for (const note of activeNotes) {
    const timeDiff = note.time - songTime;

    if (timeDiff > SCROLL_WINDOW + 0.5) continue;
    if (timeDiff < -1) continue;

    // Ultimate notes: only show when energy is full
    if (note.type === N_ULT) {
      if (swordEnergy < MAX_ENERGY) continue;
      if (note.hit || note.missed) {
        if (note.hit) {
          // Hit ult note fades with gold burst
          const elapsed = songTime - note.hitTime;
          if (elapsed > 0.5) continue;
          const fade = 1 - elapsed / 0.5;
          ctx.save();
          ctx.globalAlpha = fade * 0.8;
          const scale = 1 + elapsed * 5;
          ctx.translate(W / 2, judgeY);
          ctx.scale(scale, scale);
          const ultNoteW = laneW * 0.8;
          const ultNoteH = laneW * 0.35;
          ctx.fillStyle = '#FFD700';
          ctx.shadowColor = '#FFD700';
          ctx.shadowBlur = 30;
          drawRoundRect(ctx, -ultNoteW / 2, -ultNoteH / 2, ultNoteW, ultNoteH, 12);
          ctx.fill();
          ctx.restore();
        }
        continue;
      }

      // Draw ult note (center lane, larger, golden)
      const progress = 1 - (timeDiff / SCROLL_WINDOW);
      const noteY = topY + progress * scrollRange;
      if (noteY < topY - 50 || noteY > judgeY + 50) continue;

      const ultNoteW = laneW * 1.0;
      const ultNoteH = laneW * 0.35;
      const pulseScale = 1 + Math.sin(songTime * 6) * 0.08;

      ctx.save();
      ctx.translate(W / 2, noteY);
      ctx.scale(pulseScale, pulseScale);

      // Glow
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 20 + Math.sin(songTime * 8) * 10;

      // Note body
      const ultGrad = ctx.createLinearGradient(-ultNoteW / 2, 0, ultNoteW / 2, 0);
      ultGrad.addColorStop(0, '#B8860B');
      ultGrad.addColorStop(0.5, '#FFD700');
      ultGrad.addColorStop(1, '#B8860B');
      ctx.fillStyle = ultGrad;
      drawRoundRect(ctx, -ultNoteW / 2, -ultNoteH / 2, ultNoteW, ultNoteH, 12);
      ctx.fill();

      // Highlight
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      drawRoundRect(ctx, -ultNoteW / 2 + 4, -ultNoteH / 2 + 4, ultNoteW - 8, ultNoteH * 0.4, 8);
      ctx.fill();

      // Sword icon text
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.font = `bold ${ultNoteH * 0.55}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u2694', 0, 0);

      ctx.restore();
      continue;
    }

    // Regular notes (lanes 0-2)
    const laneX = note.lane * laneW;
    const laneCX = laneX + laneW / 2;
    const noteW = laneW * 0.65;
    const noteH = laneW * 0.22;

    const progress = 1 - (timeDiff / SCROLL_WINDOW);
    const noteY = topY + progress * scrollRange;

    const brightness = Math.min(1, 0.4 + progress * 0.8);

    if (note.hit) {
      const elapsed = songTime - note.hitTime;
      if (elapsed > 0.3) continue;
      const fade = 1 - elapsed / 0.3;
      const scale = 1 + elapsed * 3;
      ctx.save();
      ctx.globalAlpha = fade * 0.5;
      ctx.translate(laneCX, judgeY);
      ctx.scale(scale, scale);
      ctx.fillStyle = note.autoHit ? '#FFD700' : LANE_COLORS[note.lane];
      drawRoundRect(ctx, -noteW / 2, -noteH / 2, noteW, noteH, 8);
      ctx.fill();
      ctx.restore();
      continue;
    }

    if (note.missed) {
      const elapsed = songTime - note.missTime;
      if (elapsed > 0.5) continue;
      const fade = 1 - elapsed / 0.5;
      const fallY = noteY + elapsed * 200;
      const rot = elapsed * 2;
      ctx.save();
      ctx.globalAlpha = fade;
      ctx.translate(laneCX, fallY);
      ctx.rotate(rot);
      ctx.fillStyle = '#E74C3C';
      drawRoundRect(ctx, -noteW / 2, -noteH / 2, noteW, noteH, 8);
      ctx.fill();
      ctx.restore();
      continue;
    }

    if (noteY < topY - 30 || noteY > judgeY + 30) continue;

    ctx.save();

    if (note.type === N_HOLD) {
      const holdEndTime = note.time + (note.holdDuration || 0);
      const holdEndDiff = holdEndTime - songTime;
      const holdEndProgress = 1 - (holdEndDiff / SCROLL_WINDOW);
      const holdEndY = Math.max(topY, topY + holdEndProgress * scrollRange);
      const holdBodyTop = Math.max(topY, Math.min(noteY, judgeY));
      const holdStartY = Math.max(topY, holdEndY);

      const isHeld = laneHolds[note.lane] !== null;
      ctx.fillStyle = LANE_COLORS[note.lane];
      ctx.globalAlpha = (isHeld ? 0.5 : 0.25) * brightness;
      drawRoundRect(ctx, laneCX - noteW * 0.35, holdStartY, noteW * 0.7,
        holdBodyTop - holdStartY, 6);
      ctx.fill();

      if (isHeld) {
        ctx.globalAlpha = 0.15 + Math.sin(songTime * 8) * 0.1;
        ctx.fillStyle = LANE_COLORS[note.lane];
        drawRoundRect(ctx, laneCX - noteW * 0.45, holdStartY - 2, noteW * 0.9,
          holdBodyTop - holdStartY + 4, 8);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    const color = LANE_COLORS[note.lane];
    ctx.globalAlpha = brightness;

    ctx.shadowColor = color;
    ctx.shadowBlur = 8 + (1 - Math.abs(timeDiff)) * 8;

    ctx.fillStyle = color;
    drawRoundRect(ctx, laneCX - noteW / 2, noteY - noteH / 2, noteW, noteH, 8);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    drawRoundRect(ctx, laneCX - noteW / 2 + 3, noteY - noteH / 2 + 3,
      noteW - 6, noteH * 0.4, 5);
    ctx.fill();

    if (note.type === N_HOLD) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = `bold ${noteH * 0.55}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('HOLD', laneCX, noteY);
    }

    ctx.restore();
  }
}

function renderLaneButtons() {
  const laneW = W / NUM_LANES;
  const judgeY = H * JUDGE_Y_FRAC;
  const btnY = judgeY + 2;
  const btnH = H - btnY;
  const ultBtnH = btnH * 0.35;
  const regularBtnY = btnY + (swordEnergy >= MAX_ENERGY ? ultBtnH + 2 : 0);
  const regularBtnH = btnH - (swordEnergy >= MAX_ENERGY ? ultBtnH + 2 : 0);

  // Ultimate button (appears when energy is full, above regular lanes)
  if (swordEnergy >= MAX_ENERGY) {
    const ultBtnW = W * 0.5;
    const ultBtnX = (W - ultBtnW) / 2;
    const isPressed = ultTouched;

    ctx.save();
    // Gold background with pulse
    const pulseAlpha = 0.3 + Math.sin(energyPulseTimer) * 0.15;
    const ultGrad = ctx.createLinearGradient(0, btnY, 0, btnY + ultBtnH);
    if (isPressed) {
      ultGrad.addColorStop(0, `rgba(${ULT_RGB},0.6)`);
      ultGrad.addColorStop(1, `rgba(${ULT_RGB},0.3)`);
    } else {
      ultGrad.addColorStop(0, `rgba(${ULT_RGB},${pulseAlpha + 0.1})`);
      ultGrad.addColorStop(1, `rgba(${ULT_RGB},${pulseAlpha * 0.5})`);
    }
    drawRoundRect(ctx, ultBtnX, btnY, ultBtnW, ultBtnH, 12);
    ctx.fillStyle = ultGrad;
    ctx.fill();

    // Border
    ctx.strokeStyle = isPressed ? '#FFF' : '#FFD700';
    ctx.lineWidth = isPressed ? 3 : 2;
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 10 + Math.sin(energyPulseTimer) * 8;
    drawRoundRect(ctx, ultBtnX, btnY, ultBtnW, ultBtnH, 12);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Label
    const scale = isPressed ? 0.92 : 1 + Math.sin(energyPulseTimer * 1.5) * 0.05;
    ctx.translate(ultBtnX + ultBtnW / 2, btnY + ultBtnH * 0.5);
    ctx.scale(scale, scale);
    ctx.fillStyle = isPressed ? '#FFF' : '#FFD700';
    ctx.font = `bold ${W * 0.045}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u2694 青莲剑歌', 0, 0);

    ctx.restore();
  }

  // Regular 3 lane buttons
  for (let i = 0; i < NUM_LANES; i++) {
    const x = i * laneW;
    const isPressed = laneTouched[i];

    ctx.save();

    const grad = ctx.createLinearGradient(0, regularBtnY, 0, regularBtnY + regularBtnH);
    if (isPressed) {
      grad.addColorStop(0, `rgba(${LANE_RGB[i]},0.4)`);
      grad.addColorStop(1, `rgba(${LANE_RGB[i]},0.15)`);
    } else {
      grad.addColorStop(0, 'rgba(255,255,255,0.06)');
      grad.addColorStop(1, 'rgba(255,255,255,0.02)');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(x, regularBtnY, laneW, regularBtnH);

    ctx.strokeStyle = isPressed ? LANE_COLORS[i] : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = isPressed ? 2 : 1;
    ctx.strokeRect(x, regularBtnY, laneW, regularBtnH);

    const scale = isPressed ? 0.92 : 1;

    ctx.fillStyle = isPressed ? LANE_COLORS[i] : 'rgba(255,255,255,0.35)';
    ctx.font = `bold ${W * 0.04 * scale}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(LANE_LABELS[i], x + laneW / 2, regularBtnY + regularBtnH * 0.5);

    if (laneHolds[i]) {
      ctx.fillStyle = LANE_COLORS[i];
      ctx.globalAlpha = 0.3 + Math.sin(songTime * 10) * 0.15;
      ctx.fillRect(x, regularBtnY, laneW, regularBtnH);
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  // Keyboard hint on desktop (small text)
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#fff';
  ctx.font = `${W * 0.02}px sans-serif`;
  ctx.textAlign = 'center';
  const kbY = regularBtnY + regularBtnH - W * 0.03;
  ctx.fillText('D', laneW * 0.5, kbY);
  ctx.fillText('F', laneW * 1.5, kbY);
  ctx.fillText('J', laneW * 2.5, kbY);
  if (swordEnergy >= MAX_ENERGY) {
    ctx.fillText('Space/K', W / 2, btnY + ultBtnH - W * 0.02);
  }
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════════════════════
// SWORD ENERGY (剑气) INDICATOR
// ══════════════════════════════════════════════════════════════════════════════

function renderSwordEnergyIndicator() {
  const cx = W / 2;
  const indicatorY = safeTop + H * 0.1;
  const swordSize = W * 0.06;
  const swordGap = W * 0.025;
  const totalWidth = MAX_ENERGY * swordSize + (MAX_ENERGY - 1) * swordGap;
  const startX = cx - totalWidth / 2;

  ctx.save();

  // Label
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${W * 0.025}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('剑 气', cx, indicatorY - swordSize * 0.7);

  for (let i = 0; i < MAX_ENERGY; i++) {
    const sx = startX + i * (swordSize + swordGap);
    const sy = indicatorY;
    const filled = i < swordEnergy;

    ctx.save();
    ctx.translate(sx + swordSize / 2, sy);

    if (filled) {
      // Filled sword: glowing gold, pulsing
      const pulse = swordEnergy >= MAX_ENERGY ? 1 + Math.sin(energyPulseTimer + i * 0.5) * 0.15 : 1;
      ctx.scale(pulse, pulse);

      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = swordEnergy >= MAX_ENERGY ? 15 + Math.sin(energyPulseTimer + i) * 8 : 8;

      // Sword shape (simplified diamond/blade)
      ctx.beginPath();
      ctx.moveTo(0, -swordSize * 0.45);
      ctx.lineTo(swordSize * 0.2, -swordSize * 0.1);
      ctx.lineTo(swordSize * 0.08, swordSize * 0.1);
      ctx.lineTo(swordSize * 0.15, swordSize * 0.45);
      ctx.lineTo(0, swordSize * 0.35);
      ctx.lineTo(-swordSize * 0.15, swordSize * 0.45);
      ctx.lineTo(-swordSize * 0.08, swordSize * 0.1);
      ctx.lineTo(-swordSize * 0.2, -swordSize * 0.1);
      ctx.closePath();

      const swordGrad = ctx.createLinearGradient(0, -swordSize * 0.45, 0, swordSize * 0.45);
      swordGrad.addColorStop(0, '#FFF8DC');
      swordGrad.addColorStop(0.5, '#FFD700');
      swordGrad.addColorStop(1, '#B8860B');
      ctx.fillStyle = swordGrad;
      ctx.fill();

      // Emit particles when all full
      if (swordEnergy >= MAX_ENERGY && Math.random() < 0.05) {
        particles.emit(sx + swordSize / 2, sy, {
          count: 1,
          color: '#FFD700',
          speed: 30,
          life: 0.5,
          size: 2,
          gravity: -20,
        });
      }
    } else {
      // Empty sword: dark grey
      ctx.beginPath();
      ctx.moveTo(0, -swordSize * 0.45);
      ctx.lineTo(swordSize * 0.2, -swordSize * 0.1);
      ctx.lineTo(swordSize * 0.08, swordSize * 0.1);
      ctx.lineTo(swordSize * 0.15, swordSize * 0.45);
      ctx.lineTo(0, swordSize * 0.35);
      ctx.lineTo(-swordSize * 0.15, swordSize * 0.45);
      ctx.lineTo(-swordSize * 0.08, swordSize * 0.1);
      ctx.lineTo(-swordSize * 0.2, -swordSize * 0.1);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    ctx.restore();
  }

  // Energy count text
  ctx.fillStyle = swordEnergy >= MAX_ENERGY ? '#FFD700' : 'rgba(255,255,255,0.6)';
  ctx.font = `bold ${W * 0.03}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${swordEnergy}/${MAX_ENERGY}`, cx, indicatorY + swordSize * 0.7);

  // "青莲剑歌" flash text when full
  if (swordEnergy >= MAX_ENERGY) {
    const flashAlpha = 0.6 + Math.sin(energyPulseTimer * 2) * 0.4;
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 12;
    ctx.font = `bold ${W * 0.035}px sans-serif`;
    ctx.fillText('青莲剑歌 就绪!', cx, indicatorY + swordSize * 1.1);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ══════════════════════════════════════════════════════════════════════════════
// GOLD BORDER GLOW (when energy is full)
// ══════════════════════════════════════════════════════════════════════════════

function renderGoldBorder() {
  if (goldBorderGlow <= 0) return;

  ctx.save();
  const borderWidth = W * 0.015;
  const alpha = goldBorderGlow * 0.6;

  // Top
  const grad1 = ctx.createLinearGradient(0, 0, 0, borderWidth * 3);
  grad1.addColorStop(0, `rgba(${ULT_RGB},${alpha})`);
  grad1.addColorStop(1, 'transparent');
  ctx.fillStyle = grad1;
  ctx.fillRect(0, 0, W, borderWidth * 3);

  // Bottom
  const grad2 = ctx.createLinearGradient(0, H, 0, H - borderWidth * 3);
  grad2.addColorStop(0, `rgba(${ULT_RGB},${alpha})`);
  grad2.addColorStop(1, 'transparent');
  ctx.fillStyle = grad2;
  ctx.fillRect(0, H - borderWidth * 3, W, borderWidth * 3);

  // Left
  const grad3 = ctx.createLinearGradient(0, 0, borderWidth * 3, 0);
  grad3.addColorStop(0, `rgba(${ULT_RGB},${alpha})`);
  grad3.addColorStop(1, 'transparent');
  ctx.fillStyle = grad3;
  ctx.fillRect(0, 0, borderWidth * 3, H);

  // Right
  const grad4 = ctx.createLinearGradient(W, 0, W - borderWidth * 3, 0);
  grad4.addColorStop(0, `rgba(${ULT_RGB},${alpha})`);
  grad4.addColorStop(1, 'transparent');
  ctx.fillStyle = grad4;
  ctx.fillRect(W - borderWidth * 3, 0, borderWidth * 3, H);

  ctx.restore();
}

// ══════════════════════════════════════════════════════════════════════════════
// ULTIMATE EFFECT (screen-wide sword slash)
// ══════════════════════════════════════════════════════════════════════════════

function renderUltEffect() {
  if (ultVisualTimer <= 0) return;

  const progress = 1 - ultVisualTimer / ULT_VISUAL_DURATION;
  ctx.save();

  // Screen flash gold
  if (progress < 0.15) {
    const flashAlpha = (0.15 - progress) / 0.15 * 0.6;
    ctx.fillStyle = `rgba(${ULT_RGB},${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Diagonal sword slash lines
  for (const slash of ultSlashLines) {
    const slashProgress = Math.max(0, (progress - slash.delay) / 0.3);
    if (slashProgress <= 0 || slashProgress > 1.5) continue;

    const drawProgress = Math.min(1, slashProgress);
    const fadeOut = slashProgress > 1 ? 1 - (slashProgress - 1) / 0.5 : 1;

    ctx.save();
    ctx.globalAlpha = fadeOut * 0.9;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 4 + (1 - drawProgress) * 8;
    ctx.shadowColor = '#FFF';
    ctx.shadowBlur = 25;

    ctx.beginPath();
    const x1 = slash.x1;
    const y1 = slash.y1;
    const x2 = x1 + (slash.x2 - x1) * drawProgress;
    const y2 = y1 + (slash.y2 - y1) * drawProgress;
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    // White core line
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    ctx.restore();
  }

  // Large "青莲剑歌" text in center
  if (progress > 0.1 && progress < 0.9) {
    const textAlpha = progress < 0.3 ? (progress - 0.1) / 0.2
      : progress > 0.7 ? (0.9 - progress) / 0.2 : 1;
    const textScale = 1 + (1 - Math.min(1, (progress - 0.1) / 0.2)) * 0.5;

    ctx.save();
    ctx.globalAlpha = textAlpha * 0.9;
    ctx.translate(W / 2, H * 0.4);
    ctx.scale(textScale, textScale);
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${W * 0.14}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('青莲剑歌', 0, 0);

    // White outline
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeText('青莲剑歌', 0, 0);

    ctx.restore();
  }

  // Li Bai avatar flash in center
  const avatar = getAvatarImage(LIBAI);
  if (avatar && progress > 0.05 && progress < 0.6) {
    const avatarAlpha = progress < 0.15 ? (progress - 0.05) / 0.1
      : progress > 0.4 ? (0.6 - progress) / 0.2 : 0.5;
    const avatarSize = W * 0.35;
    ctx.save();
    ctx.globalAlpha = avatarAlpha * 0.4;
    ctx.drawImage(avatar, W / 2 - avatarSize / 2, H * 0.2, avatarSize, avatarSize);
    ctx.restore();
  }

  // "Auto" indicator while ult is scoring
  if (ultActive) {
    ctx.globalAlpha = 0.6 + Math.sin(songTime * 8) * 0.3;
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${W * 0.04}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`\u2694 自动斩击中... ${ultTimer.toFixed(1)}s`, W / 2, H * 0.6);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function renderHUD() {
  const cx = W / 2;

  // Score (top right)
  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${W * 0.05}px sans-serif`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText(formatScore(score), W - W * 0.03, safeTop + H * 0.015);
  ctx.restore();

  // Combo (between energy indicator and playfield)
  if (combo > 0) {
    ctx.save();
    const scale = comboScale;
    const comboY = safeTop + H * 0.22;
    ctx.translate(cx, comboY);
    ctx.scale(scale, scale);

    if (combo >= 50) {
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 15;
    } else if (combo >= 30) {
      ctx.shadowColor = '#D4A84B';
      ctx.shadowBlur = 8;
    }

    ctx.fillStyle = combo >= 50 ? '#FFD700' : combo >= 30 ? '#D4A84B' : '#fff';
    ctx.font = `bold ${W * 0.09}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(combo.toString(), 0, 0);

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${W * 0.025}px sans-serif`;
    ctx.fillText('COMBO', 0, W * 0.05);

    ctx.restore();
  }

  // Song progress bar (top)
  if (currentSong) {
    const progress = Math.max(0, Math.min(1, songTime / currentSong.duration));
    ctx.save();
    const barH = Math.max(2, H * 0.004);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(0, 0, W, barH);
    ctx.fillStyle = '#D4A84B';
    ctx.fillRect(0, 0, W * progress, barH);
    ctx.restore();
  }

  // Judgment display
  if (judgmentDisplay.timer > 0) {
    ctx.save();
    const alpha = Math.min(1, judgmentDisplay.timer / 0.3);
    const scale = 1 + (0.6 - Math.min(0.6, judgmentDisplay.timer)) * 0.5;
    ctx.globalAlpha = alpha;
    ctx.translate(judgmentDisplay.x, H * JUDGE_Y_FRAC - 50);
    ctx.scale(scale, scale);
    ctx.fillStyle = judgmentDisplay.color;
    ctx.font = `bold ${W * 0.06}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.strokeText(judgmentDisplay.text, 0, 0);
    ctx.fillText(judgmentDisplay.text, 0, 0);
    ctx.restore();
  }

  // Song title + synth indicator (top left)
  if (currentSong) {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `bold ${W * 0.03}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(currentSong.title, W * 0.025, safeTop + H * 0.01);

    if (usingSynth) {
      ctx.fillStyle = 'rgba(230,126,34,0.6)';
      ctx.font = `${W * 0.02}px sans-serif`;
      ctx.fillText('合成音乐', W * 0.025, safeTop + H * 0.035);
    }
    ctx.restore();
  }

  // Combo multiplier indicator
  if (combo >= 10) {
    const mult = getComboMult();
    ctx.save();
    ctx.fillStyle = mult >= 3 ? '#FFD700' : mult >= 2 ? '#D4A84B' : '#aaa';
    ctx.font = `bold ${W * 0.025}px sans-serif`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText(`x${mult}`, W - W * 0.03, safeTop + H * 0.055);
    ctx.restore();
  }
}

function renderEffects() {
  // Sword flash on combo milestone
  if (swordFlashTimer > 0) {
    ctx.save();
    const progress = 1 - swordFlashTimer / 1.5;
    const alpha = swordFlashTimer > 1 ? (1.5 - swordFlashTimer) * 2 : swordFlashTimer / 1;

    ctx.globalAlpha = alpha * 0.8;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 20;

    const slashY = H * 0.3 + progress * H * 0.2;
    ctx.beginPath();
    ctx.moveTo(-20, slashY + 30);
    ctx.lineTo(W + 20, slashY - 30);
    ctx.stroke();

    ctx.restore();
  }

  // Slow-mo visual hint (brief white vignette)
  if (slowMoTimer > 0) {
    ctx.save();
    const alpha = slowMoTimer / 0.15 * 0.15;
    const grad = ctx.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.8);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(1, `rgba(255,255,255,${alpha})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

function renderCountdown() {
  ctx.save();
  const num = countdownNum;
  const frac = countdownTimer % 1;
  const scale = 1 + (1 - frac) * 0.5;
  const alpha = frac < 0.7 ? 1 : 1 - (frac - 0.7) / 0.3;

  ctx.globalAlpha = alpha * 0.9;
  ctx.translate(W / 2, H * 0.4);
  ctx.scale(scale, scale);
  ctx.fillStyle = '#D4A84B';
  ctx.font = `bold ${W * 0.25}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(num.toString(), 0, 0);
  ctx.restore();

  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${W * 0.04}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('准备!', W / 2, H * 0.55);

  // Show lane hints during countdown
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = `${W * 0.028}px sans-serif`;
  ctx.fillText('集齐4剑气，释放青莲剑歌!', W / 2, H * 0.62);
  ctx.restore();
}

function renderResults() {
  ctx.save();
  ctx.fillStyle = 'rgba(10,10,26,0.92)';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  if (!gameOverReady) {
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('...', W / 2, H / 2);
    return;
  }

  const cx = W / 2;
  const scoreRatio = maxPossibleScore > 0 ? score / maxPossibleScore : 0;

  let grade = 'C';
  for (const [g, threshold] of GRADES) {
    if (scoreRatio >= threshold) { grade = g; break; }
  }

  const gradeColors = { S: '#FFD700', A: '#3498DB', B: '#2ECC71', C: '#999' };

  // Title
  ctx.fillStyle = '#D4A84B';
  ctx.font = `bold ${W * 0.06}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('演奏完成!', cx, H * 0.08);

  // Song name
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = `${W * 0.035}px sans-serif`;
  ctx.fillText(currentSong.title, cx, H * 0.13);

  // Grade circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, H * 0.22, W * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fill();
  ctx.strokeStyle = gradeColors[grade];
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = gradeColors[grade];
  ctx.font = `bold ${W * 0.1}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(grade, cx, H * 0.22);
  ctx.restore();

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${W * 0.08}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(formatScore(score), cx, H * 0.34);

  ctx.fillStyle = '#888';
  ctx.font = `${W * 0.03}px sans-serif`;
  ctx.fillText(`满分 ${formatScore(maxPossibleScore)} · ${Math.round(scoreRatio * 100)}%`, cx, H * 0.39);

  // Judgment breakdown
  const breakdownY = H * 0.44;
  const lineH = H * 0.04;
  const labels = [
    ['PERFECT', judgments.perfect, '#FFD700'],
    ['GREAT', judgments.great, '#3498DB'],
    ['GOOD', judgments.good, '#2ECC71'],
    ['MISS', judgments.miss, '#E74C3C'],
  ];

  for (let i = 0; i < labels.length; i++) {
    const [label, count, color] = labels[i];
    const y = breakdownY + i * lineH;

    ctx.textAlign = 'left';
    ctx.fillStyle = color;
    ctx.font = `bold ${W * 0.033}px sans-serif`;
    ctx.fillText(label, W * 0.2, y);

    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = `${W * 0.033}px sans-serif`;
    ctx.fillText(count.toString(), W * 0.8, y);
  }

  // Max combo
  ctx.textAlign = 'left';
  ctx.fillStyle = '#D4A84B';
  ctx.font = `bold ${W * 0.033}px sans-serif`;
  ctx.fillText('最大连击', W * 0.2, breakdownY + 4 * lineH + lineH * 0.5);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff';
  ctx.fillText(maxCombo.toString(), W * 0.8, breakdownY + 4 * lineH + lineH * 0.5);

  // Mini Leaderboard
  const lb = getLeaderboard(GAME_ID);
  if (lb.length > 0) {
    const lbW = Math.min(W * 0.85, 320);
    const lbX = cx - lbW / 2;
    const lbY = H * 0.66;
    renderMiniLeaderboard(ctx, lbX, lbY, lbW, lb.slice(0, 5), gameOverRank);
  }

  // Buttons
  const btnW = W * 0.35;
  const btnH = H * 0.06;
  const gap = W * 0.05;
  const btnY = H * 0.82;

  // Retry
  const retryX = cx - btnW - gap / 2;
  ctx.save();
  drawRoundRect(ctx, retryX, btnY, btnW, btnH, 10);
  ctx.fillStyle = '#D4A84B';
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#1A1A2E';
  ctx.font = `bold ${W * 0.035}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('再来一次', retryX + btnW / 2, btnY + btnH * 0.55);

  // Back
  const backX = cx + gap / 2;
  ctx.save();
  drawRoundRect(ctx, backX, btnY, btnW, btnH, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${W * 0.035}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('返回', backX + btnW / 2, btnY + btnH * 0.55);

  // Lobby button
  ctx.font = `bold ${W * 0.03}px sans-serif`;
  ctx.fillStyle = 'rgba(212,168,75,0.7)';
  ctx.textAlign = 'center';
  ctx.fillText('\u8FD4\u56DE\u5927\u5385', cx, btnY + btnH + H * 0.04);
}

// ══════════════════════════════════════════════════════════════════════════════
// INITIALIZATION
// ══════════════════════════════════════════════════════════════════════════════

async function init() {
  state = S_LOADING;
  loadingMessage = '加载资源...';

  // Load shared modules in parallel
  const [heroList] = await Promise.all([
    loadHeroList(),
    preloadAvatars([LIBAI]),
  ]);

  season = getCurrentSeason();

  // Start game loop and touch handlers immediately
  const loop = createGameLoop(update, render);
  loop.start();
  setupTouchHandlers();

  // Try to load MP3 files in parallel (non-blocking)
  loadingMessage = '加载音乐...';
  const loadPromises = SONGS.map(song => loadSongAudio(song).catch(() => null));
  await Promise.allSettled(loadPromises);

  // Go to title regardless of MP3 load results
  state = S_TITLE;
}

// Clean up when navigating away
window.addEventListener('beforeunload', () => {
  stopMusic();
});
window.addEventListener('pagehide', () => {
  stopMusic();
});

init().catch(console.error);

</script>
