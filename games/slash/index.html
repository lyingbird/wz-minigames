<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>兰陵王·暗影刺客</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
#game{width:100%;height:100%;position:fixed;inset:0}
</style>
</head>
<body>
<div id="game"></div>
<script type="module">
import{createCanvas,createGameLoop,createSwipeDetector,createTapDetector,createParticleSystem,createFloatingText,lineCircleCollision,drawRoundRect,formatScore,showOverlay,COLORS}from'../../shared/engine.js';
import{loadHeroList,getHeroById,getRandomHeroes,getAvatarUrl,preloadAvatars,getAvatarImage,GAME_HEROES}from'../../shared/heroes.js';
import{initAudio}from'../../shared/audio.js';
import{addScore,getLeaderboard,isHighScore,getPersonalBest}from'../../shared/leaderboard.js';
import{getCurrentSeason}from'../../shared/season.js';

// ══════════════════════════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════════════════════════
const GAME_ID='slash';
const LLW=GAME_HEROES.LANLINGWANG; // 153
const TARGET_RADIUS=28;
const GRAVITY=420;
const TRAIL_FADE=300;
const ENERGY_MAX=500;
const ULT_DURATION=1.2;
const FREEZE_DURATION=2;
const DOUBLE_DURATION=5;

// Target types
const T_ENEMY_COMMON=0,T_ENEMY_REGULAR=1,T_ENEMY_RARE=2,T_ALLY=3,T_BUFF_BLUE=4,T_BUFF_RED=5,T_BUFF_GREEN=6,T_BOMB=7;

// Game states
const S_LOADING=0,S_TITLE=1,S_COUNTDOWN=2,S_PLAYING=3,S_GAMEOVER=4,S_PAUSED=5;

// ══════════════════════════════════════════════════════════════════════════════
// GLOBALS
// ══════════════════════════════════════════════════════════════════════════════
const screen=createCanvas(document.getElementById('game'));
const{canvas,ctx}=screen;
let W=screen.width,H=screen.height;
const particles=createParticleSystem(400);
const floatText=createFloatingText();
let audio=null;
let swipe=null;
let tap=null;

let state=S_LOADING;
let mode='classic'; // 'classic' | 'survival'
let score=0,combo=0,maxCombo=0,lives=3,energy=0;
let gameTime=0,totalTime=60;
let targets=[];
let halves=[]; // split halves after slash
let tossTimer=0,tossInterval=1.5;
let difficultyLevel=0;
let freezeTimer=0,doubleTimer=0;
let ultActive=false,ultTimer=0;
let ultSlashes=[];
let countdownVal=3,countdownTimer=0;
let bgParticles=[];
let season=null;
let heroPool=[];
let personalBest=null;
let titlePulse=0;
let screenShake=0;
let comboDisplay=0,comboDisplayTimer=0;
let missedEnemies=0; // for survival mode

// UI button bounds
let btnClassic={x:0,y:0,w:0,h:0};
let btnSurvival={x:0,y:0,w:0,h:0};
let btnReplay={x:0,y:0,w:0,h:0};
let btnEnergy={x:0,y:0,w:0,h:0};

// ══════════════════════════════════════════════════════════════════════════════
// INITIALIZATION
// ══════════════════════════════════════════════════════════════════════════════
async function init(){
  season=getCurrentSeason();
  heroPool=[...season.heroPool];

  // Init background particles
  for(let i=0;i<30;i++){
    bgParticles.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10,
      r:Math.random()*2+1,a:Math.random()*0.3+0.05
    });
  }

  // Preload hero avatars
  const toPreload=[LLW,...heroPool];
  await loadHeroList();
  await preloadAvatars(toPreload);

  personalBest=getPersonalBest(GAME_ID);

  // Setup input
  swipe=createSwipeDetector(canvas);
  tap=createTapDetector(canvas);

  swipe.onSwipe=(pts,velocity)=>{
    if(state===S_PLAYING&&!ultActive){
      handleSwipe(pts,velocity);
    }
  };

  tap.onTap=(x,y)=>{
    handleTap(x,y);
  };

  // Init audio on first interaction
  const initAudioOnce=()=>{
    if(!audio){
      audio=initAudio();
    }
    document.removeEventListener('touchstart',initAudioOnce);
    document.removeEventListener('mousedown',initAudioOnce);
  };
  document.addEventListener('touchstart',initAudioOnce,{passive:true});
  document.addEventListener('mousedown',initAudioOnce,{passive:true});

  // Also support mouse for desktop testing
  setupMouseSwipe();

  state=S_TITLE;
  loop.start();
}

// Mouse support for desktop
function setupMouseSwipe(){
  let mouseDown=false;
  let mouseTrail=null;
  canvas.addEventListener('mousedown',(e)=>{
    if(!audio) audio=initAudio();
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left,y=e.clientY-rect.top;
    mouseDown=true;
    mouseTrail={points:[{x,y,t:performance.now()}],active:true};
    swipe.trails.push(mouseTrail);

    // Also handle tap for title/gameover
    handleTap(x,y);
  });
  canvas.addEventListener('mousemove',(e)=>{
    if(!mouseDown||!mouseTrail)return;
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left,y=e.clientY-rect.top;
    mouseTrail.points.push({x,y,t:performance.now()});
  });
  const endMouse=(e)=>{
    if(!mouseDown||!mouseTrail)return;
    mouseDown=false;
    mouseTrail.active=false;
    const pts=mouseTrail.points;
    if(pts.length>=2){
      const dx=pts[pts.length-1].x-pts[0].x;
      const dy=pts[pts.length-1].y-pts[0].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>=30&&state===S_PLAYING&&!ultActive){
        const elapsed=(pts[pts.length-1].t-pts[0].t)/1000||0.01;
        handleSwipe(pts,dist/elapsed);
      }
    }
    mouseTrail=null;
  };
  canvas.addEventListener('mouseup',endMouse);
  canvas.addEventListener('mouseleave',endMouse);
}

// ══════════════════════════════════════════════════════════════════════════════
// TARGET CREATION
// ══════════════════════════════════════════════════════════════════════════════
function createTarget(type){
  const x=40+Math.random()*(W-80);
  const baseVY=-(350+Math.random()*200);
  const vx=(Math.random()-0.5)*120;
  let r=TARGET_RADIUS;
  let points=30;
  let ename=heroPool[Math.floor(Math.random()*heroPool.length)];

  if(type===T_ENEMY_COMMON){r=22;points=10;}
  else if(type===T_ENEMY_REGULAR){points=30;}
  else if(type===T_ENEMY_RARE){points=50;r=32;}
  else if(type===T_ALLY){ename=LLW;points=-100;}
  else if(type===T_BUFF_BLUE||type===T_BUFF_RED||type===T_BUFF_GREEN){ename=0;r=24;points=0;}
  else if(type===T_BOMB){ename=0;r=26;points=0;}

  return{
    x,y:H+r+10,
    vx,vy:baseVY,
    r,type,ename,points,
    alive:true,slashed:false,
    rotation:0,rotSpeed:(Math.random()-0.5)*3,
    glowPhase:Math.random()*Math.PI*2,
    spawnTime:gameTime
  };
}

function spawnWave(){
  const dl=difficultyLevel;
  let count=1;
  if(dl>=1)count=1+Math.floor(Math.random()*2);
  if(dl>=2)count=2+Math.floor(Math.random()*2);
  if(dl>=3)count=3+Math.floor(Math.random()*2);

  for(let i=0;i<count;i++){
    let type=T_ENEMY_REGULAR;
    const roll=Math.random();

    if(dl===0){
      // Easy: common and regular only
      type=roll<0.4?T_ENEMY_COMMON:roll<0.85?T_ENEMY_REGULAR:T_ENEMY_RARE;
    }else if(dl===1){
      // Bombs appear
      if(roll<0.08)type=T_BOMB;
      else if(roll<0.15)type=T_BUFF_BLUE+Math.floor(Math.random()*3);
      else if(roll<0.35)type=T_ENEMY_COMMON;
      else if(roll<0.8)type=T_ENEMY_REGULAR;
      else type=T_ENEMY_RARE;
    }else if(dl===2){
      // Allies appear
      if(roll<0.1)type=T_BOMB;
      else if(roll<0.2)type=T_ALLY;
      else if(roll<0.28)type=T_BUFF_BLUE+Math.floor(Math.random()*3);
      else if(roll<0.45)type=T_ENEMY_COMMON;
      else if(roll<0.8)type=T_ENEMY_REGULAR;
      else type=T_ENEMY_RARE;
    }else{
      // Maximum chaos
      if(roll<0.12)type=T_BOMB;
      else if(roll<0.25)type=T_ALLY;
      else if(roll<0.32)type=T_BUFF_BLUE+Math.floor(Math.random()*3);
      else if(roll<0.5)type=T_ENEMY_COMMON;
      else if(roll<0.82)type=T_ENEMY_REGULAR;
      else type=T_ENEMY_RARE;
    }

    targets.push(createTarget(type));
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// SWIPE HANDLING
// ══════════════════════════════════════════════════════════════════════════════
function handleSwipe(pts,velocity){
  let hitCount=0;
  let hitAlly=false;
  let hitBomb=false;
  let totalScore=0;
  let playedSlash=false;

  for(let ti=targets.length-1;ti>=0;ti--){
    const t=targets[ti];
    if(!t.alive||t.slashed)continue;

    // Check if any segment of the swipe trail intersects the target circle
    let hit=false;
    for(let pi=0;pi<pts.length-1;pi++){
      if(lineCircleCollision(pts[pi].x,pts[pi].y,pts[pi+1].x,pts[pi+1].y,t.x,t.y,t.r)){
        hit=true;break;
      }
    }
    if(!hit)continue;

    // We hit this target
    t.slashed=true;
    t.alive=false;

    if(!playedSlash&&audio){audio.playSlash();playedSlash=true;}

    if(t.type===T_ALLY){
      hitAlly=true;
      combo=0;
      comboDisplay=0;
      lives--;
      score=Math.max(0,score+t.points);
      screenShake=0.3;
      if(audio)audio.playDeath();
      floatText.add(t.x,t.y,'-100',{color:COLORS.RED,size:28,duration:1.2});
      particles.emit(t.x,t.y,{count:20,speed:180,color:COLORS.BLUE,size:5,gravity:200});
      createSplitHalves(t,pts);
    }else if(t.type===T_BOMB){
      hitBomb=true;
      combo=0;
      comboDisplay=0;
      lives--;
      screenShake=0.4;
      if(audio)audio.playDeath();
      // Explosion effect
      particles.emit(t.x,t.y,{count:30,speed:250,color:COLORS.RED,size:6,gravity:100});
      particles.emit(t.x,t.y,{count:15,speed:150,color:'#FF8800',size:4,gravity:100});
      floatText.add(t.x,t.y,'BOOM!',{color:COLORS.RED,size:32,duration:1});
    }else if(t.type===T_BUFF_BLUE){
      freezeTimer=FREEZE_DURATION;
      if(audio)audio.playScore();
      floatText.add(t.x,t.y,'冰冻!',{color:'#00CCFF',size:26,duration:1.2});
      particles.emit(t.x,t.y,{count:20,speed:120,color:'#00CCFF',size:4,gravity:50});
    }else if(t.type===T_BUFF_RED){
      doubleTimer=DOUBLE_DURATION;
      if(audio)audio.playScore();
      floatText.add(t.x,t.y,'双倍!',{color:COLORS.RED,size:26,duration:1.2});
      particles.emit(t.x,t.y,{count:20,speed:120,color:COLORS.RED,size:4,gravity:50});
    }else if(t.type===T_BUFF_GREEN){
      lives=Math.min(lives+1,5);
      if(audio)audio.playScore();
      floatText.add(t.x,t.y,'+1 ❤',{color:'#44FF44',size:26,duration:1.2});
      particles.emit(t.x,t.y,{count:15,speed:100,color:'#44FF44',size:4,gravity:50});
    }else{
      // Enemy hit
      hitCount++;
      let pts_val=t.points;
      if(doubleTimer>0)pts_val*=2;
      totalScore+=pts_val;
      energy=Math.min(energy+pts_val,ENERGY_MAX);

      const color=t.type===T_ENEMY_RARE?COLORS.GOLD:COLORS.WHITE;
      particles.emit(t.x,t.y,{count:12,speed:150,color,size:4,gravity:200});
      floatText.add(t.x,t.y,`+${pts_val}`,{color:doubleTimer>0?COLORS.RED:COLORS.GOLD,size:22,duration:0.8});
      createSplitHalves(t,pts);
    }
  }

  // Combo calculation
  if(hitCount>0&&!hitAlly&&!hitBomb){
    combo+=hitCount;
    if(combo>maxCombo)maxCombo=combo;
    comboDisplay=combo;
    comboDisplayTimer=1.5;

    if(hitCount>=2){
      // Multi-hit bonus
      const multiplier=hitCount;
      totalScore=Math.floor(totalScore*multiplier);
      if(audio)audio.playCombo(hitCount);
      floatText.add(W/2,H*0.35,`${hitCount}x 连斩!`,{color:COLORS.GOLD,size:36,duration:1.5});
    }else if(audio&&hitCount===1){
      audio.playHit();
    }
    score+=totalScore;
  }

  // Check game over
  if(lives<=0&&state===S_PLAYING){
    endGame();
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// SPLIT HALVES EFFECT
// ══════════════════════════════════════════════════════════════════════════════
function createSplitHalves(target,swipePts){
  // Calculate slash angle from swipe
  let angle=0;
  if(swipePts&&swipePts.length>=2){
    const p0=swipePts[0],p1=swipePts[swipePts.length-1];
    angle=Math.atan2(p1.y-p0.y,p1.x-p0.x);
  }
  const perpAngle=angle+Math.PI/2;
  const speed=80;

  halves.push({
    x:target.x,y:target.y,
    vx:Math.cos(perpAngle)*speed,vy:Math.sin(perpAngle)*speed-50,
    r:target.r,ename:target.ename,type:target.type,
    angle,half:0, // top half
    life:1.0,rotation:target.rotation
  });
  halves.push({
    x:target.x,y:target.y,
    vx:-Math.cos(perpAngle)*speed,vy:-Math.sin(perpAngle)*speed-50,
    r:target.r,ename:target.ename,type:target.type,
    angle,half:1, // bottom half
    life:1.0,rotation:target.rotation
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// TAP HANDLING
// ══════════════════════════════════════════════════════════════════════════════
function handleTap(x,y){
  if(state===S_TITLE){
    if(pointInBtn(x,y,btnClassic)){
      mode='classic';totalTime=60;lives=3;
      startGame();
    }else if(pointInBtn(x,y,btnSurvival)){
      mode='survival';totalTime=Infinity;lives=3;
      startGame();
    }
  }else if(state===S_GAMEOVER){
    if(pointInBtn(x,y,btnReplay)){
      state=S_TITLE;
    }
  }else if(state===S_PLAYING){
    // Check energy bar tap
    if(energy>=ENERGY_MAX&&pointInBtn(x,y,btnEnergy)){
      activateUltimate();
    }
  }
}

function pointInBtn(x,y,btn){
  return x>=btn.x&&x<=btn.x+btn.w&&y>=btn.y&&y<=btn.y+btn.h;
}

// ══════════════════════════════════════════════════════════════════════════════
// ULTIMATE ABILITY
// ══════════════════════════════════════════════════════════════════════════════
function activateUltimate(){
  ultActive=true;
  ultTimer=ULT_DURATION;
  energy=0;
  ultSlashes=[];
  screenShake=0.2;
  if(audio){audio.playSlash();audio.playCombo(8);}

  // Create dramatic slash marks across screen
  for(let i=0;i<6;i++){
    ultSlashes.push({
      x1:Math.random()*W,y1:Math.random()*H*0.3,
      x2:Math.random()*W,y2:H*0.3+Math.random()*H*0.5,
      life:1.0,delay:i*0.1
    });
  }

  // Slash all current enemy targets
  let ultScore=0;
  for(const t of targets){
    if(!t.alive||t.slashed)continue;
    if(t.type===T_ALLY||t.type===T_BOMB)continue;
    if(t.type>=T_BUFF_BLUE&&t.type<=T_BUFF_GREEN)continue;

    t.slashed=true;t.alive=false;
    let pts_val=t.points*2;
    if(doubleTimer>0)pts_val*=2;
    ultScore+=pts_val;
    particles.emit(t.x,t.y,{count:15,speed:200,color:COLORS.GOLD,size:5,gravity:150});
    createSplitHalves(t,[{x:t.x-30,y:t.y-30},{x:t.x+30,y:t.y+30}]);
  }
  score+=ultScore;
  if(ultScore>0){
    floatText.add(W/2,H*0.25,`暗影突袭! +${ultScore}`,{color:COLORS.GOLD,size:34,duration:2});
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// GAME STATE MANAGEMENT
// ══════════════════════════════════════════════════════════════════════════════
function startGame(){
  state=S_COUNTDOWN;
  countdownVal=3;
  countdownTimer=0;
  score=0;combo=0;maxCombo=0;
  lives=mode==='survival'?3:3;
  energy=0;gameTime=0;
  targets=[];halves=[];
  tossTimer=0;tossInterval=1.5;
  difficultyLevel=0;
  freezeTimer=0;doubleTimer=0;
  ultActive=false;ultTimer=0;ultSlashes=[];
  missedEnemies=0;
  comboDisplay=0;comboDisplayTimer=0;
  particles.clear();
  floatText.clear();
  if(audio)audio.playCountdown();
}

function endGame(){
  state=S_GAMEOVER;
  // Save score
  addScore(GAME_ID,score,LLW);
  personalBest=getPersonalBest(GAME_ID);
  if(audio)audio.playDeath();
}

// ══════════════════════════════════════════════════════════════════════════════
// UPDATE
// ══════════════════════════════════════════════════════════════════════════════
function update(dt){
  W=screen.width;H=screen.height;
  titlePulse+=dt;

  // Background particles always update
  for(const p of bgParticles){
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;
  }

  if(state===S_COUNTDOWN){
    countdownTimer+=dt;
    if(countdownTimer>=1){
      countdownTimer-=1;
      countdownVal--;
      if(audio)audio.playCountdown();
      if(countdownVal<=0){
        state=S_PLAYING;
        if(audio)audio.playStart();
      }
    }
    return;
  }

  if(state!==S_PLAYING)return;

  gameTime+=dt;

  // Difficulty progression
  if(gameTime<15)difficultyLevel=0;
  else if(gameTime<30)difficultyLevel=1;
  else if(gameTime<45)difficultyLevel=2;
  else difficultyLevel=3;

  // Toss interval gets shorter over time
  tossInterval=Math.max(0.5,1.5-gameTime*0.015);

  // Timers
  if(freezeTimer>0)freezeTimer-=dt;
  if(doubleTimer>0)doubleTimer-=dt;
  if(screenShake>0)screenShake-=dt*2;
  if(comboDisplayTimer>0)comboDisplayTimer-=dt;

  // Ultimate timer
  if(ultActive){
    ultTimer-=dt;
    if(ultTimer<=0)ultActive=false;
    for(const s of ultSlashes)s.life-=dt*1.5;
    ultSlashes=ultSlashes.filter(s=>s.life>0);
  }

  // Spawn targets
  tossTimer+=dt;
  if(tossTimer>=tossInterval){
    tossTimer=0;
    spawnWave();
  }

  // Update targets
  const timeScale=freezeTimer>0?0.15:1;
  for(let i=targets.length-1;i>=0;i--){
    const t=targets[i];
    if(!t.alive){targets.splice(i,1);continue;}
    t.vy+=GRAVITY*dt*timeScale;
    t.x+=t.vx*dt*timeScale;
    t.y+=t.vy*dt*timeScale;
    t.rotation+=t.rotSpeed*dt*timeScale;
    t.glowPhase+=dt*3;

    // Off screen bottom
    if(t.y>H+t.r+50){
      // In survival mode, missed enemies cost a life
      if(mode==='survival'&&(t.type===T_ENEMY_COMMON||t.type===T_ENEMY_REGULAR||t.type===T_ENEMY_RARE)){
        lives--;
        screenShake=0.2;
        if(lives<=0)endGame();
      }
      targets.splice(i,1);
    }
  }

  // Update halves
  for(let i=halves.length-1;i>=0;i--){
    const h=halves[i];
    h.vy+=GRAVITY*dt;
    h.x+=h.vx*dt;
    h.y+=h.vy*dt;
    h.life-=dt*1.5;
    h.rotation+=2*dt;
    if(h.life<=0)halves.splice(i,1);
  }

  // Classic mode timer
  if(mode==='classic'){
    if(gameTime>=totalTime){
      endGame();
    }
  }

  // Prune swipe trails
  swipe.prune();

  particles.update(dt);
  floatText.update(dt);
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════════
function render(){
  ctx.save();

  // Screen shake
  if(screenShake>0){
    const sx=(Math.random()-0.5)*screenShake*12;
    const sy=(Math.random()-0.5)*screenShake*12;
    ctx.translate(sx,sy);
  }

  // Background gradient
  const bgGrad=ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#0a0a1a');
  bgGrad.addColorStop(1,'#1a1a3e');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(-10,-10,W+20,H+20);

  // Background particles (mist)
  ctx.save();
  for(const p of bgParticles){
    ctx.globalAlpha=p.a;
    ctx.fillStyle='#D4A84B';
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  if(state===S_TITLE){
    renderTitle();
  }else if(state===S_COUNTDOWN){
    renderCountdown();
  }else if(state===S_PLAYING||state===S_GAMEOVER){
    renderGame();
    if(state===S_GAMEOVER)renderGameOver();
  }

  ctx.restore();
}

// ── TITLE SCREEN ──────────────────────────────────────────────
function renderTitle(){
  const cx=W/2;

  // Lan Ling Wang avatar
  const avatar=getAvatarImage(LLW);
  const avatarSize=90;
  const ay=H*0.22;
  if(avatar){
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,ay,avatarSize/2,0,Math.PI*2);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(avatar,cx-avatarSize/2,ay-avatarSize/2,avatarSize,avatarSize);
    ctx.restore();
    // Border glow
    ctx.save();
    ctx.shadowColor=COLORS.GOLD;
    ctx.shadowBlur=15+Math.sin(titlePulse*2)*5;
    ctx.strokeStyle=COLORS.GOLD;
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(cx,ay,avatarSize/2+2,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  // Title
  ctx.save();
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='bold 32px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.shadowColor=COLORS.GOLD;ctx.shadowBlur=20;
  ctx.fillStyle=COLORS.GOLD;
  ctx.fillText('兰陵王',cx,H*0.35);
  ctx.font='bold 22px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('暗影刺客',cx,H*0.40);
  ctx.restore();

  // Season info
  ctx.save();
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='14px sans-serif';
  ctx.fillStyle='rgba(212,168,75,0.6)';
  ctx.fillText(`赛季: ${season.name}`,cx,H*0.46);
  ctx.restore();

  // Personal best
  if(personalBest){
    ctx.save();
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='16px sans-serif';
    ctx.fillStyle=COLORS.LIGHT_GOLD;
    ctx.fillText(`最高分: ${formatScore(personalBest.score)}`,cx,H*0.52);
    ctx.restore();
  }

  // Mode buttons
  const btnW=180,btnH=50,btnGap=20;
  const btnY1=H*0.60;
  const btnY2=btnY1+btnH+btnGap;

  btnClassic={x:cx-btnW/2,y:btnY1,w:btnW,h:btnH};
  btnSurvival={x:cx-btnW/2,y:btnY2,w:btnW,h:btnH};

  drawButton(btnClassic,'经典模式','60秒挑战',COLORS.GOLD);
  drawButton(btnSurvival,'生存模式','生死一线',COLORS.RED);

  // Instructions
  ctx.save();
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='13px sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText('滑动屏幕斩杀敌方英雄',cx,H*0.88);
  ctx.fillText('避开己方英雄和炸弹',cx,H*0.92);
  ctx.restore();
}

function drawButton(btn,text,sub,color){
  ctx.save();
  const pulse=Math.sin(titlePulse*3)*0.1+0.9;
  ctx.shadowColor=color;ctx.shadowBlur=10*pulse;
  ctx.strokeStyle=color;ctx.lineWidth=2;
  drawRoundRect(ctx,btn.x,btn.y,btn.w,btn.h,12);
  ctx.fillStyle='rgba(26,26,46,0.8)';
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur=0;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='bold 18px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillStyle=color;
  ctx.fillText(text,btn.x+btn.w/2,btn.y+btn.h/2-(sub?8:0));
  if(sub){
    ctx.font='12px sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText(sub,btn.x+btn.w/2,btn.y+btn.h/2+14);
  }
  ctx.restore();
}

// ── COUNTDOWN ────────────────────────────────────────────────
function renderCountdown(){
  const cx=W/2,cy=H/2;
  const t=countdownTimer;
  const scale=1+t*0.5;
  const alpha=1-t;

  ctx.save();
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.globalAlpha=Math.max(0,alpha);
  ctx.font=`bold ${Math.round(80*scale)}px sans-serif`;
  ctx.shadowColor=COLORS.GOLD;ctx.shadowBlur=30;
  ctx.fillStyle=COLORS.GOLD;
  ctx.fillText(countdownVal>0?String(countdownVal):'GO!',cx,cy);
  ctx.restore();
}

// ── GAME RENDER ──────────────────────────────────────────────
function renderGame(){
  // Ultimate dark overlay
  if(ultActive){
    ctx.save();
    ctx.globalAlpha=0.4*(ultTimer/ULT_DURATION);
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,W,H);
    ctx.restore();

    // Ult slash marks
    ctx.save();
    for(const s of ultSlashes){
      if(s.life<=0)continue;
      ctx.globalAlpha=s.life*0.8;
      ctx.strokeStyle=COLORS.GOLD;
      ctx.lineWidth=3;
      ctx.shadowColor=COLORS.GOLD;ctx.shadowBlur=15;
      ctx.beginPath();
      ctx.moveTo(s.x1,s.y1);
      ctx.lineTo(s.x2,s.y2);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Freeze overlay
  if(freezeTimer>0){
    ctx.save();
    ctx.globalAlpha=0.1;
    ctx.fillStyle='#00CCFF';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // Double score indicator
  if(doubleTimer>0){
    ctx.save();
    ctx.globalAlpha=0.08;
    ctx.fillStyle=COLORS.RED;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // Render targets
  for(const t of targets){
    if(!t.alive)continue;
    renderTarget(t);
  }

  // Render split halves
  for(const h of halves){
    renderHalf(h);
  }

  // Render swipe trails
  renderTrails();

  // Particles & floating text
  particles.render(ctx);
  floatText.render(ctx);

  // Combo display
  if(comboDisplayTimer>0&&comboDisplay>=2){
    renderComboDisplay();
  }

  // HUD
  renderHUD();
}

function renderTarget(t){
  ctx.save();
  ctx.translate(t.x,t.y);
  ctx.rotate(t.rotation);

  const glowAmt=Math.sin(t.glowPhase)*0.3+0.7;

  // Glow
  if(t.type===T_ENEMY_RARE){
    ctx.shadowColor=COLORS.GOLD;ctx.shadowBlur=18*glowAmt;
  }else if(t.type===T_ALLY){
    ctx.shadowColor=COLORS.BLUE;ctx.shadowBlur=15*glowAmt;
  }else if(t.type===T_BOMB){
    ctx.shadowColor=COLORS.RED;ctx.shadowBlur=20*glowAmt;
  }else if(t.type>=T_BUFF_BLUE&&t.type<=T_BUFF_GREEN){
    const buffColors=['#00CCFF',COLORS.RED,'#44FF44'];
    ctx.shadowColor=buffColors[t.type-T_BUFF_BLUE];
    ctx.shadowBlur=15*glowAmt;
  }else{
    ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=8;
  }

  // Background circle
  ctx.beginPath();
  ctx.arc(0,0,t.r,0,Math.PI*2);

  if(t.type===T_BOMB){
    // Red pulsing bomb
    const pulse=0.8+Math.sin(t.glowPhase*2)*0.2;
    ctx.fillStyle=`rgba(231,76,60,${pulse})`;
    ctx.fill();
    ctx.strokeStyle='#FF2200';ctx.lineWidth=2;ctx.stroke();
    ctx.shadowBlur=0;
    // Lightning symbol
    ctx.font=`bold ${t.r}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#FFF';
    ctx.fillText('⚡',0,0);
  }else if(t.type>=T_BUFF_BLUE&&t.type<=T_BUFF_GREEN){
    const buffColors=['#00CCFF','#FF4444','#44FF44'];
    const buffLabels=['蓝','红','绿'];
    const c=buffColors[t.type-T_BUFF_BLUE];
    const grad=ctx.createRadialGradient(0,0,0,0,0,t.r);
    grad.addColorStop(0,'rgba(255,255,255,0.9)');
    grad.addColorStop(0.6,c);
    grad.addColorStop(1,'rgba(0,0,0,0.3)');
    ctx.fillStyle=grad;ctx.fill();
    ctx.strokeStyle=c;ctx.lineWidth=2;ctx.stroke();
    ctx.shadowBlur=0;
    ctx.font=`bold ${t.r*0.8}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#FFF';
    ctx.fillText(buffLabels[t.type-T_BUFF_BLUE],0,1);
  }else{
    // Hero avatar circle
    const avatar=getAvatarImage(t.ename);
    if(avatar){
      ctx.save();
      ctx.beginPath();
      ctx.arc(0,0,t.r-1,0,Math.PI*2);
      ctx.clip();
      ctx.drawImage(avatar,-t.r,-t.r,t.r*2,t.r*2);
      ctx.restore();
    }else{
      ctx.fillStyle='#333';ctx.fill();
    }

    // Border
    ctx.beginPath();
    ctx.arc(0,0,t.r,0,Math.PI*2);
    if(t.type===T_ALLY){
      ctx.strokeStyle=COLORS.BLUE;ctx.lineWidth=3;
      // Shield indicator
      ctx.save();
      ctx.shadowBlur=0;
      ctx.beginPath();
      ctx.arc(0,0,t.r+4,0,Math.PI*2);
      ctx.strokeStyle='rgba(52,152,219,0.4)';ctx.lineWidth=4;ctx.stroke();
      ctx.restore();
    }else if(t.type===T_ENEMY_RARE){
      ctx.strokeStyle=COLORS.GOLD;ctx.lineWidth=3;
    }else if(t.type===T_ENEMY_COMMON){
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;
    }else{
      ctx.strokeStyle=COLORS.RED;ctx.lineWidth=2;
    }
    ctx.stroke();
  }

  ctx.restore();
}

function renderHalf(h){
  ctx.save();
  ctx.globalAlpha=Math.max(0,h.life);
  ctx.translate(h.x,h.y);
  ctx.rotate(h.rotation);

  // Clip to half
  ctx.beginPath();
  if(h.half===0){
    // Top half
    ctx.moveTo(-h.r,-h.r);
    ctx.lineTo(h.r,-h.r);
    ctx.lineTo(h.r,0);
    ctx.lineTo(-h.r,0);
  }else{
    ctx.moveTo(-h.r,0);
    ctx.lineTo(h.r,0);
    ctx.lineTo(h.r,h.r);
    ctx.lineTo(-h.r,h.r);
  }
  ctx.closePath();
  ctx.clip();

  // Draw avatar or colored circle in the clipped area
  const avatar=h.ename?getAvatarImage(h.ename):null;
  if(avatar){
    ctx.drawImage(avatar,-h.r,-h.r,h.r*2,h.r*2);
  }else{
    ctx.fillStyle=h.type===T_ALLY?COLORS.BLUE:COLORS.RED;
    ctx.beginPath();
    ctx.arc(0,0,h.r,0,Math.PI*2);
    ctx.fill();
  }

  // Border
  const borderColor=h.type===T_ALLY?COLORS.BLUE:h.type===T_ENEMY_RARE?COLORS.GOLD:COLORS.RED;
  ctx.beginPath();
  ctx.arc(0,0,h.r,0,Math.PI*2);
  ctx.strokeStyle=borderColor;ctx.lineWidth=2;ctx.stroke();

  ctx.restore();
}

function renderTrails(){
  const trails=swipe.trails;
  const now=performance.now();

  ctx.save();
  for(const trail of trails){
    const pts=trail.points;
    if(pts.length<2)continue;

    const lastT=pts[pts.length-1].t;
    const age=trail.active?0:(now-lastT)/TRAIL_FADE;
    if(age>=1)continue;

    const baseAlpha=trail.active?0.9:0.9*(1-age);

    // Draw tapered blade trail
    for(let i=1;i<pts.length;i++){
      const p0=pts[i-1],p1=pts[i];
      const segAge=trail.active?0:(now-p1.t)/TRAIL_FADE;
      if(segAge>=1)continue;

      const progress=i/pts.length;
      const width=Math.max(1,(1-progress)*8+2);
      const alpha=baseAlpha*(trail.active?(0.3+progress*0.7):(1-segAge));

      ctx.globalAlpha=Math.max(0,alpha);

      // Glow layer
      ctx.strokeStyle='rgba(212,168,75,0.5)';
      ctx.lineWidth=width+6;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(p0.x,p0.y);
      ctx.lineTo(p1.x,p1.y);
      ctx.stroke();

      // Core bright line
      const grad=ctx.createLinearGradient(p0.x,p0.y,p1.x,p1.y);
      grad.addColorStop(0,'rgba(255,255,255,0.9)');
      grad.addColorStop(1,COLORS.GOLD);
      ctx.strokeStyle=grad;
      ctx.lineWidth=width;
      ctx.beginPath();
      ctx.moveTo(p0.x,p0.y);
      ctx.lineTo(p1.x,p1.y);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function renderComboDisplay(){
  const cx=W/2,cy=H*0.18;
  const t=1-comboDisplayTimer/1.5;
  const scale=1+Math.sin(t*10)*0.05*(1-t);
  const alpha=Math.min(1,(1-t)*3);

  ctx.save();
  ctx.globalAlpha=Math.max(0,alpha);
  ctx.textAlign='center';ctx.textBaseline='middle';

  const size=Math.round(40*scale);
  ctx.font=`bold ${size}px "PingFang SC","Microsoft YaHei",sans-serif`;

  // Color based on combo level
  let color=COLORS.GOLD;
  if(comboDisplay>=10)color='#FF4444';
  else if(comboDisplay>=5)color='#FF8800';
  else if(comboDisplay>=3)color=COLORS.LIGHT_GOLD;

  ctx.shadowColor=color;ctx.shadowBlur=20;
  ctx.lineWidth=4;ctx.strokeStyle=COLORS.DARK;
  ctx.strokeText(`${comboDisplay} COMBO`,cx,cy);
  ctx.fillStyle=color;
  ctx.fillText(`${comboDisplay} COMBO`,cx,cy);
  ctx.restore();
}

function renderHUD(){
  ctx.save();
  const pad=12;
  const topY=Math.max(pad,parseInt(getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-top)'))||0)+pad;

  // Score (top left)
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.font='bold 24px sans-serif';
  ctx.shadowColor=COLORS.GOLD;ctx.shadowBlur=5;
  ctx.fillStyle=COLORS.GOLD;
  ctx.fillText(formatScore(score),pad,topY);

  // Timer or mode label (top center)
  ctx.textAlign='center';
  ctx.font='16px sans-serif';
  ctx.fillStyle=COLORS.WHITE;
  ctx.shadowBlur=0;
  if(mode==='classic'){
    const remain=Math.max(0,Math.ceil(totalTime-gameTime));
    const urgentColor=remain<=10?COLORS.RED:COLORS.WHITE;
    ctx.fillStyle=urgentColor;
    ctx.fillText(`${remain}s`,W/2,topY+4);
  }else{
    ctx.fillText('生存',W/2,topY+4);
  }

  // Lives (top right) - hearts
  ctx.textAlign='right';
  const heartSize=18;
  for(let i=0;i<Math.max(lives,0);i++){
    const hx=W-pad-(lives-1-i)*(heartSize+4);
    const hy=topY+heartSize/2+2;
    drawHeart(ctx,hx,hy,heartSize/2,COLORS.RED);
  }

  // Buff indicators
  let buffY=topY+34;
  ctx.textAlign='left';ctx.font='bold 13px sans-serif';
  if(freezeTimer>0){
    ctx.fillStyle='#00CCFF';
    ctx.fillText(`❄ 冰冻 ${freezeTimer.toFixed(1)}s`,pad,buffY);
    buffY+=18;
  }
  if(doubleTimer>0){
    ctx.fillStyle=COLORS.RED;
    ctx.fillText(`🔥 双倍 ${doubleTimer.toFixed(1)}s`,pad,buffY);
  }

  // Energy bar (bottom)
  const barW=W*0.6,barH=18;
  const barX=(W-barW)/2,barY=H-40;
  btnEnergy={x:barX-10,y:barY-10,w:barW+20,h:barH+20};

  // Bar background
  drawRoundRect(ctx,barX,barY,barW,barH,9);
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fill();
  ctx.strokeStyle='rgba(212,168,75,0.3)';ctx.lineWidth=1;ctx.stroke();

  // Bar fill
  const fillW=Math.max(0,(energy/ENERGY_MAX)*(barW-4));
  if(fillW>0){
    drawRoundRect(ctx,barX+2,barY+2,fillW,barH-4,7);
    const isFull=energy>=ENERGY_MAX;
    if(isFull){
      const pulse=Math.sin(titlePulse*6)*0.3+0.7;
      ctx.shadowColor=COLORS.GOLD;ctx.shadowBlur=15*pulse;
    }
    const barGrad=ctx.createLinearGradient(barX,0,barX+barW,0);
    barGrad.addColorStop(0,'#D4A84B');
    barGrad.addColorStop(1,'#FFD700');
    ctx.fillStyle=barGrad;ctx.fill();
    ctx.shadowBlur=0;
  }

  // Energy label
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='bold 11px sans-serif';
  ctx.fillStyle=energy>=ENERGY_MAX?'#FFF':COLORS.LIGHT_GOLD;
  ctx.fillText(energy>=ENERGY_MAX?'点击释放 暗影突袭!':'暗影突袭',W/2,barY+barH/2);

  ctx.restore();
}

function drawHeart(ctx,cx,cy,size,color){
  ctx.save();
  ctx.fillStyle=color;
  ctx.beginPath();
  const x=cx,y=cy;
  const s=size;
  ctx.moveTo(x,y+s*0.3);
  ctx.bezierCurveTo(x,y-s*0.3,x-s,y-s*0.3,x-s,y+s*0.1);
  ctx.bezierCurveTo(x-s,y+s*0.6,x,y+s*0.9,x,y+s);
  ctx.bezierCurveTo(x,y+s*0.9,x+s,y+s*0.6,x+s,y+s*0.1);
  ctx.bezierCurveTo(x+s,y-s*0.3,x,y-s*0.3,x,y+s*0.3);
  ctx.fill();
  ctx.restore();
}

// ── GAME OVER ────────────────────────────────────────────────
function renderGameOver(){
  ctx.save();
  ctx.globalAlpha=0.75;
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;

  const cx=W/2;
  let y=H*0.12;

  // Title
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='bold 28px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.shadowColor=COLORS.GOLD;ctx.shadowBlur=15;
  ctx.fillStyle=COLORS.GOLD;
  ctx.fillText('游戏结束',cx,y);
  ctx.shadowBlur=0;

  y+=50;

  // Score
  ctx.font='bold 42px sans-serif';
  ctx.fillStyle=COLORS.GOLD;
  ctx.fillText(formatScore(score),cx,y);

  y+=35;
  ctx.font='16px sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText(`最大连击: ${maxCombo}`,cx,y);

  y+=25;
  ctx.fillText(`模式: ${mode==='classic'?'经典':'生存'}`,cx,y);

  // High score check
  y+=35;
  if(personalBest&&score>=personalBest.score){
    ctx.font='bold 18px sans-serif';
    ctx.fillStyle='#FFD700';
    ctx.fillText('新纪录!',cx,y);
    y+=30;
  }else{
    y+=10;
  }

  // Leaderboard
  const lb=getLeaderboard(GAME_ID);
  if(lb.length>0){
    ctx.font='bold 16px sans-serif';
    ctx.fillStyle=COLORS.LIGHT_GOLD;
    ctx.fillText('排行榜 TOP 5',cx,y);
    y+=28;

    ctx.font='14px sans-serif';
    const top5=lb.slice(0,5);
    for(let i=0;i<top5.length;i++){
      const e=top5[i];
      const isMe=e.score===score&&i===top5.findIndex(x=>x.score===score);
      ctx.fillStyle=isMe?COLORS.GOLD:'rgba(255,255,255,0.7)';
      ctx.fillText(`#${e.rank}  ${formatScore(e.score)}`,cx,y);
      y+=22;
    }
  }

  // Replay button
  y=Math.max(y+20,H*0.78);
  const bw=160,bh=48;
  btnReplay={x:cx-bw/2,y:y,w:bw,h:bh};

  ctx.save();
  ctx.shadowColor=COLORS.GOLD;ctx.shadowBlur=10;
  drawRoundRect(ctx,btnReplay.x,btnReplay.y,bw,bh,12);
  ctx.fillStyle='rgba(212,168,75,0.15)';ctx.fill();
  ctx.strokeStyle=COLORS.GOLD;ctx.lineWidth=2;ctx.stroke();
  ctx.shadowBlur=0;
  ctx.font='bold 20px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillStyle=COLORS.GOLD;
  ctx.fillText('再来一局',cx,y+bh/2);
  ctx.restore();

  ctx.restore();
}

  ctx.font='16px sans-serif';
  ctx.textAlign='center';

});
