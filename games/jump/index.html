<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>廉颇·正义蹦蹦</title>
<link rel="stylesheet" href="../../shared/styles.css">
<style>
:root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;touch-action:none;user-select:none;-webkit-user-select:none}
#game{width:100%;height:100%;position:fixed;inset:0}
</style>
</head>
<body>
<div id="game"></div>
<script type="module">
import{createCanvas,createGameLoop,createParticleSystem,createFloatingText,drawRoundRect,formatScore,COLORS}from'../../shared/engine.js';
import{loadHeroList,preloadAvatars,getAvatarImage,GAME_HEROES}from'../../shared/heroes.js';
import{initAudio}from'../../shared/audio.js';
import{addScore,getPersonalBest}from'../../shared/leaderboard.js';
import{getCurrentSeason}from'../../shared/season.js';

// ═══════════════════════════════════════════════════════════
// Constants
// ═══════════════════════════════════════════════════════════
const GAME_ID = 'jump';
const HERO_ID = GAME_HEROES.LIANPO; // 105

// Isometric projection
const ISO_X = 0.75;   // x-component horizontal
const ISO_Y = 0.375;  // x-component vertical (approx 30deg)

// Charging
const CHARGE_RATE = 1.0;     // power per second
const MAX_CHARGE = 2.5;      // max seconds of charge
const BASE_DISTANCE = 120;   // base distance at power=1
const MAX_DISTANCE = 320;    // distance at max power

// Jump
const JUMP_DURATION = 0.45;  // seconds for the arc
const ARC_HEIGHT_FACTOR = 0.6;

// Platform
const PLAT_MIN_GAP = 90;
const PLAT_MAX_GAP = 180;
const PLAT_TYPES = ['tower','barracks','buff','jungle','crystal'];
const PLAT_COLORS = {
  tower:    { top: '#5B7DB1', side: '#3A5280', front: '#2E4268', label: '防御塔' },
  barracks: { top: '#6B8E6B', side: '#4A6B4A', front: '#3A5A3A', label: '兵营' },
  buff:     { top: '#C0392B', side: '#962D22', front: '#7B241C', label: 'BUFF' },
  jungle:   { top: '#8B7355', side: '#6B5642', front: '#554433', label: '野怪石台' },
  crystal:  { top: '#A77BCA', side: '#7D5A9B', front: '#5E3F7A', label: '水晶' },
};
const PLAT_SIZES = {
  tower: { w: 70, d: 70, h: 50 },
  barracks: { w: 100, d: 100, h: 35 },
  buff: { w: 50, d: 50, h: 55 },
  jungle: { w: 75, d: 75, h: 45 },
  crystal: { w: 65, d: 65, h: 65 },
};

// ═══════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════
const screen = createCanvas(document.getElementById('game'));
const { canvas, ctx, width: W } = screen;
let H = screen.height;

const particles = createParticleSystem(300);
const floatingText = createFloatingText();
let audio = null;

// Game state
let state = 'loading'; // loading, title, playing, jumping, falling, gameover
let score = 0;
let combo = 0;          // consecutive perfect landings
let bestScore = 0;
let jumpCount = 0;

// Platforms
let platforms = [];
let currentPlatIdx = 0;

// Camera (world offset)
let camX = 0, camY = 0;
let camTargetX = 0, camTargetY = 0;

// Lian Po
let lpX = 0, lpY = 0, lpZ = 0;       // world position
let lpScaleY = 1;                       // squish factor
let lpRotation = 0;                     // somersault during jump

// Charging
let charging = false;
let chargeTime = 0;
let chargePower = 0;

// Jump animation
let jumping = false;
let jumpT = 0;
let jumpStartX = 0, jumpStartY = 0, jumpStartZ = 0;
let jumpTargetX = 0, jumpTargetY = 0;
let jumpArcHeight = 0;
let jumpDir = 1; // 1 = right, -1 = left

// Falling animation
let falling = false;
let fallT = 0;
let fallStartZ = 0;

// Screen shake
let shakeX = 0, shakeY = 0;
let shakeMag = 0, shakeDecay = 0;

// Title animation
let titlePulse = 0;

// ═══════════════════════════════════════════════════════════
// Isometric Projection
// ═══════════════════════════════════════════════════════════
function toScreen(wx, wy, wz) {
  const sx = (wx - wy) * ISO_X;
  const sy = (wx + wy) * ISO_Y - wz;
  return { x: sx - camX + W / 2, y: sy - camY + H / 2 + 60 };
}

// ═══════════════════════════════════════════════════════════
// Platform Generation
// ═══════════════════════════════════════════════════════════
function createPlatform(wx, wy, type) {
  const size = PLAT_SIZES[type];
  return {
    wx, wy, wz: 0,
    w: size.w, d: size.d, h: size.h,
    type,
    landed: false,
    landAnim: 0,
    glowAnim: 0,
  };
}

function pickNextType(idx) {
  if ((idx + 1) % 10 === 0) return 'crystal';
  const r = Math.random();
  if (r < 0.35) return 'tower';
  if (r < 0.55) return 'barracks';
  if (r < 0.70) return 'buff';
  return 'jungle';
}

function generateNextPlatform() {
  const last = platforms[platforms.length - 1];
  const dir = Math.random() < 0.5 ? 1 : -1;
  const difficulty = Math.min(jumpCount / 30, 1);
  const gap = PLAT_MIN_GAP + Math.random() * (PLAT_MAX_GAP - PLAT_MIN_GAP) * (0.7 + difficulty * 0.3);

  let nx, ny;
  if (dir === 1) {
    // Right: increase X
    nx = last.wx + gap;
    ny = last.wy;
  } else {
    // Left: increase Y
    nx = last.wx;
    ny = last.wy + gap;
  }

  const type = pickNextType(platforms.length);
  const plat = createPlatform(nx, ny, type);
  plat._dir = dir; // direction from previous to this
  platforms.push(plat);
}

function initPlatforms() {
  platforms = [];
  const first = createPlatform(0, 0, 'tower');
  first.landed = true;
  platforms.push(first);
  generateNextPlatform();
}

// ═══════════════════════════════════════════════════════════
// Camera
// ═══════════════════════════════════════════════════════════
function centerCameraOnPlatform(p) {
  const s = toScreenRaw(p.wx, p.wy, p.h);
  camTargetX = s.x;
  camTargetY = s.y;
}

function toScreenRaw(wx, wy, wz) {
  return {
    x: (wx - wy) * ISO_X,
    y: (wx + wy) * ISO_Y - wz,
  };
}

function updateCamera(dt) {
  const speed = 8;
  camX += (camTargetX - camX) * Math.min(1, speed * dt);
  camY += (camTargetY - camY) * Math.min(1, speed * dt);
}

// ═══════════════════════════════════════════════════════════
// Drawing: Platform Shadow on Ground
// ═══════════════════════════════════════════════════════════
function drawPlatformShadow(p) {
  const center = toScreen(p.wx, p.wy, 0);
  const shadowOffsetX = 8;
  const shadowOffsetY = 6;
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(center.x + shadowOffsetX, center.y + shadowOffsetY + 10, p.w * 0.42, p.d * 0.16, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// Drawing: Platform (3D Shaded Isometric Box)
// ═══════════════════════════════════════════════════════════
let _animTime = 0;
function drawPlatform(p, isCurrent, isNext) {
  _animTime += 0.002;
  const hw = p.w / 2;
  const hd = p.d / 2;
  const baseH = p.h + (p.landAnim || 0);
  const colors = PLAT_COLORS[p.type];

  // Draw ground shadow first
  drawPlatformShadow(p);

  const isCylinder = (p.type === 'buff' || p.type === 'crystal');

  // 4 corners of top face
  const tl = toScreen(p.wx - hw, p.wy - hd, baseH);
  const tr = toScreen(p.wx + hw, p.wy - hd, baseH);
  const br = toScreen(p.wx + hw, p.wy + hd, baseH);
  const bl = toScreen(p.wx - hw, p.wy + hd, baseH);
  const center = toScreen(p.wx, p.wy, baseH);

  // Bottom corners
  const br0 = toScreen(p.wx + hw, p.wy + hd, 0);
  const bl0 = toScreen(p.wx - hw, p.wy + hd, 0);
  const tr0 = toScreen(p.wx + hw, p.wy - hd, 0);
  const center0 = toScreen(p.wx, p.wy, 0);

  ctx.save();

  if (isCylinder) {
    // ── Cylindrical platform (buff / crystal) ──
    const rx = p.w * 0.42;
    const ry = p.d * 0.18;
    const bodyH = baseH * ISO_Y * 2 + ry;

    // Cylinder body (gradient)
    const bodyGrad = ctx.createLinearGradient(center.x - rx, 0, center.x + rx, 0);
    bodyGrad.addColorStop(0, colors.front);
    bodyGrad.addColorStop(0.35, colors.side);
    bodyGrad.addColorStop(0.65, colors.top);
    bodyGrad.addColorStop(1, colors.front);
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(center.x, center.y + ry, rx, ry, 0, 0, Math.PI); // bottom half of top ellipse
    ctx.lineTo(center0.x + rx, center0.y + ry);
    ctx.ellipse(center0.x, center0.y + ry, rx, ry, 0, 0, Math.PI, true); // bottom ellipse reversed
    ctx.closePath();
    ctx.fill();

    // Bottom ellipse edge
    ctx.beginPath();
    ctx.ellipse(center0.x, center0.y + ry, rx, ry, 0, 0, Math.PI);
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Top ellipse (gradient fill)
    const topGrad = ctx.createRadialGradient(center.x - rx * 0.2, center.y - ry * 0.3, 0, center.x, center.y, rx);
    topGrad.addColorStop(0, lightenColor(colors.top, 40));
    topGrad.addColorStop(0.6, colors.top);
    topGrad.addColorStop(1, darkenColor(colors.top, 20));
    ctx.beginPath();
    ctx.ellipse(center.x, center.y, rx, ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = topGrad;
    ctx.fill();

    // Rim light on top ellipse
    ctx.beginPath();
    ctx.ellipse(center.x, center.y, rx, ry, 0, -Math.PI * 0.8, Math.PI * 0.1);
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Highlight spot on top
    ctx.beginPath();
    ctx.ellipse(center.x - rx * 0.2, center.y - ry * 0.2, rx * 0.25, ry * 0.25, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fill();

    // ── Buff glow aura ──
    if (p.type === 'buff') {
      const pulse = Math.sin(_animTime * 60) * 0.15 + 0.35;
      const glowGrad = ctx.createRadialGradient(center.x, center.y, rx * 0.3, center.x, center.y, rx * 1.6);
      glowGrad.addColorStop(0, `rgba(255,80,60,${pulse})`);
      glowGrad.addColorStop(1, 'rgba(255,80,60,0)');
      ctx.beginPath();
      ctx.ellipse(center.x, center.y, rx * 1.6, ry * 2.2, 0, 0, Math.PI * 2);
      ctx.fillStyle = glowGrad;
      ctx.fill();
    }

    // ── Crystal shimmer ──
    if (p.type === 'crystal') {
      const shimmer = Math.sin(_animTime * 80) * 0.2 + 0.4;
      const shimGrad = ctx.createRadialGradient(center.x, center.y, 0, center.x, center.y, rx * 1.8);
      shimGrad.addColorStop(0, `rgba(220,180,255,${shimmer})`);
      shimGrad.addColorStop(0.5, `rgba(180,120,255,${shimmer * 0.4})`);
      shimGrad.addColorStop(1, 'rgba(180,120,255,0)');
      ctx.beginPath();
      ctx.ellipse(center.x, center.y, rx * 1.8, ry * 2.5, 0, 0, Math.PI * 2);
      ctx.fillStyle = shimGrad;
      ctx.fill();

      // Sparkle dots
      for (let i = 0; i < 5; i++) {
        const angle = _animTime * 40 + i * Math.PI * 2 / 5;
        const dist = rx * (0.6 + Math.sin(_animTime * 30 + i) * 0.3);
        const sx = center.x + Math.cos(angle) * dist;
        const sy = center.y + Math.sin(angle) * dist * 0.4;
        const sparkAlpha = Math.max(0, Math.sin(_animTime * 50 + i * 2)) * 0.7;
        ctx.beginPath();
        ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${sparkAlpha})`;
        ctx.fill();
      }

      // Light rays
      ctx.save();
      ctx.globalAlpha = 0.08 + Math.sin(_animTime * 40) * 0.04;
      for (let i = 0; i < 4; i++) {
        const angle = _animTime * 20 + i * Math.PI / 2;
        const rayLen = rx * 2;
        ctx.beginPath();
        ctx.moveTo(center.x, center.y);
        ctx.lineTo(center.x + Math.cos(angle) * rayLen, center.y + Math.sin(angle) * rayLen * 0.4);
        ctx.strokeStyle = '#E0C0FF';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      ctx.restore();
    }

  } else {
    // ── Box platform (tower / barracks / jungle) ──

    // Right side face with gradient (brighter — directional light from upper-right)
    const rGrad = ctx.createLinearGradient(tr.x, tr.y, tr0.x, tr0.y);
    rGrad.addColorStop(0, lightenColor(colors.side, 15));
    rGrad.addColorStop(1, darkenColor(colors.side, 25));
    ctx.beginPath();
    ctx.moveTo(br.x, br.y); ctx.lineTo(tr.x, tr.y);
    ctx.lineTo(tr0.x, tr0.y); ctx.lineTo(br0.x, br0.y);
    ctx.closePath();
    ctx.fillStyle = rGrad;
    ctx.fill();

    // Front face with gradient (darker — away from light)
    const fGrad = ctx.createLinearGradient(bl.x, bl.y, bl0.x, bl0.y);
    fGrad.addColorStop(0, lightenColor(colors.front, 5));
    fGrad.addColorStop(1, darkenColor(colors.front, 30));
    ctx.beginPath();
    ctx.moveTo(bl.x, bl.y); ctx.lineTo(br.x, br.y);
    ctx.lineTo(br0.x, br0.y); ctx.lineTo(bl0.x, bl0.y);
    ctx.closePath();
    ctx.fillStyle = fGrad;
    ctx.fill();

    // Top face with radial gradient (lighter center, darker edges — overhead light)
    ctx.beginPath();
    ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
    ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
    ctx.closePath();
    // Use a radial gradient for the top face
    const topCx = (tl.x + tr.x + br.x + bl.x) / 4;
    const topCy = (tl.y + tr.y + br.y + bl.y) / 4;
    const topR = Math.max(p.w, p.d) * 0.55;
    const tGrad = ctx.createRadialGradient(topCx - topR * 0.15, topCy - topR * 0.15, 0, topCx, topCy, topR);
    tGrad.addColorStop(0, lightenColor(colors.top, 35));
    tGrad.addColorStop(0.5, colors.top);
    tGrad.addColorStop(1, darkenColor(colors.top, 15));
    ctx.fillStyle = tGrad;
    ctx.fill();

    // Highlight spot on top face
    ctx.beginPath();
    ctx.ellipse(topCx - topR * 0.15, topCy - topR * 0.2, topR * 0.2, topR * 0.12, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fill();

    // ── Rim light: bright lines along top edges ──
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.2;
    // Top-left to top-right (back edge)
    ctx.beginPath(); ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y); ctx.stroke();
    // Top-right to bottom-right (right edge)
    ctx.beginPath(); ctx.moveTo(tr.x, tr.y); ctx.lineTo(br.x, br.y); ctx.stroke();
    // Dimmer rim on front edges
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.moveTo(br.x, br.y); ctx.lineTo(bl.x, bl.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bl.x, bl.y); ctx.lineTo(tl.x, tl.y); ctx.stroke();

    // Side edge lines (vertical) — subtle
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(br.x, br.y); ctx.lineTo(br0.x, br0.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bl.x, bl.y); ctx.lineTo(bl0.x, bl0.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tr.x, tr.y); ctx.lineTo(tr0.x, tr0.y); ctx.stroke();

    // ── Type-specific decorations ──
    if (p.type === 'tower') {
      // Crenellations on top edges (small notches)
      const crenCount = 4;
      const crenSize = 3;
      for (let i = 0; i < crenCount; i++) {
        const t = (i + 0.5) / crenCount;
        // Along back edge (tl -> tr)
        const cx1 = tl.x + (tr.x - tl.x) * t;
        const cy1 = tl.y + (tr.y - tl.y) * t;
        ctx.fillStyle = lightenColor(colors.top, 20);
        ctx.fillRect(cx1 - crenSize / 2, cy1 - crenSize - 1, crenSize, crenSize);
        // Along right edge (tr -> br)
        const cx2 = tr.x + (br.x - tr.x) * t;
        const cy2 = tr.y + (br.y - tr.y) * t;
        ctx.fillRect(cx2 - crenSize / 2, cy2 - crenSize - 1, crenSize, crenSize);
      }
      // Metallic sheen on right side
      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.beginPath();
      ctx.moveTo(br.x, br.y); ctx.lineTo(tr.x, tr.y);
      ctx.lineTo(tr0.x, tr0.y); ctx.lineTo(br0.x, br0.y);
      ctx.closePath();
      const metalGrad = ctx.createLinearGradient(tr.x, tr.y, br0.x, br0.y);
      metalGrad.addColorStop(0, '#fff');
      metalGrad.addColorStop(0.4, 'transparent');
      metalGrad.addColorStop(0.6, '#fff');
      metalGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = metalGrad;
      ctx.fill();
      ctx.restore();
    }

    if (p.type === 'barracks') {
      // Horizontal wood-plank lines on front face
      const planks = 5;
      ctx.strokeStyle = 'rgba(0,0,0,0.12)';
      ctx.lineWidth = 0.7;
      for (let i = 1; i < planks; i++) {
        const t = i / planks;
        const lx = bl.x + (bl0.x - bl.x) * t;
        const ly = bl.y + (bl0.y - bl.y) * t;
        const rx2 = br.x + (br0.x - br.x) * t;
        const ry2 = br.y + (br0.y - br.y) * t;
        ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(rx2, ry2); ctx.stroke();
      }
      // Same on right side
      for (let i = 1; i < planks; i++) {
        const t = i / planks;
        const lx = tr.x + (tr0.x - tr.x) * t;
        const ly = tr.y + (tr0.y - tr.y) * t;
        const rx2 = br.x + (br0.x - br.x) * t;
        const ry2 = br.y + (br0.y - br.y) * t;
        ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(rx2, ry2); ctx.stroke();
      }
    }

    if (p.type === 'jungle') {
      // Rough edges — draw jagged overlay on top
      ctx.save();
      ctx.globalAlpha = 0.1;
      for (let i = 0; i < 6; i++) {
        const ox = (Math.sin(p.wx * 0.1 + i * 7) * 3);
        const oy = (Math.cos(p.wy * 0.1 + i * 5) * 2);
        ctx.beginPath();
        ctx.arc(topCx + ox * (i - 3), topCy + oy * (i - 3), 3 + i, 0, Math.PI * 2);
        ctx.fillStyle = i % 2 === 0 ? '#000' : '#fff';
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // ── Landing zone indicator on next platform ──
  if (isNext) {
    // Bullseye target on top face
    const tc = center;
    const ringR = Math.min(p.w, p.d) * 0.2;
    // Outer ring
    ctx.beginPath();
    ctx.ellipse(tc.x, tc.y, ringR, ringR * 0.4, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Inner ring
    ctx.beginPath();
    ctx.ellipse(tc.x, tc.y, ringR * 0.5, ringR * 0.2, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.stroke();
    // Perfect zone golden glow
    const pzGrad = ctx.createRadialGradient(tc.x, tc.y, 0, tc.x, tc.y, ringR * 0.5);
    pzGrad.addColorStop(0, 'rgba(212,168,75,0.2)');
    pzGrad.addColorStop(1, 'rgba(212,168,75,0)');
    ctx.beginPath();
    ctx.ellipse(tc.x, tc.y, ringR * 0.5, ringR * 0.2, 0, 0, Math.PI * 2);
    ctx.fillStyle = pzGrad;
    ctx.fill();
  }

  // ── Glow effect for current platform ──
  if (isCurrent && !jumping && !falling) {
    p.glowAnim += 0.03;
    const glowAlpha = 0.12 + Math.sin(p.glowAnim) * 0.08;
    if (isCylinder) {
      const rx = p.w * 0.42;
      const ry = p.d * 0.18;
      ctx.beginPath();
      ctx.ellipse(center.x, center.y, rx, ry, 0, 0, Math.PI * 2);
    } else {
      ctx.beginPath();
      ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
      ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
      ctx.closePath();
    }
    ctx.fillStyle = `rgba(212,168,75,${glowAlpha})`;
    ctx.fill();
  }

  ctx.restore();
}

// ── Color utility helpers ──
function lightenColor(hex, amount) {
  const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + amount);
  const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + amount);
  const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + amount);
  return `rgb(${r},${g},${b})`;
}
function darkenColor(hex, amount) {
  const r = Math.max(0, parseInt(hex.slice(1, 3), 16) - amount);
  const g = Math.max(0, parseInt(hex.slice(3, 5), 16) - amount);
  const b = Math.max(0, parseInt(hex.slice(5, 7), 16) - amount);
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════════════
// Drawing: Lian Po (3D Pawn / Chess-piece style)
// ═══════════════════════════════════════════════════════════
let _chargeDustTimer = 0;
let _landSquishTimer = 0;
function drawLianPo() {
  const pos = toScreen(lpX, lpY, lpZ);
  const avatarImg = getAvatarImage(HERO_ID);

  ctx.save();
  ctx.translate(pos.x, pos.y);

  if (jumping) {
    ctx.rotate(lpRotation);
  }

  // Scale for squish/stretch
  const scX = charging ? (1 + 0.15 * (chargePower / MAX_CHARGE)) : 1;
  const scY = lpScaleY;

  ctx.scale(scX, scY);

  const bodyW = 32;
  const bodyH = 38;
  const headR = 17;
  const baseRx = bodyW * 0.65;
  const baseRy = 7;
  const baseY = 0; // bottom of character

  // ── Elliptical base (chess piece base) ──
  const baseGrad = ctx.createLinearGradient(-baseRx, baseY - 3, baseRx, baseY + 3);
  baseGrad.addColorStop(0, '#2C3E50');
  baseGrad.addColorStop(0.5, '#4A6B8A');
  baseGrad.addColorStop(1, '#1A2530');
  ctx.beginPath();
  ctx.ellipse(0, baseY, baseRx, baseRy, 0, 0, Math.PI * 2);
  ctx.fillStyle = baseGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // ── Body: truncated oval shape (wider at bottom, narrower at top) ──
  const bodyTop = -bodyH - 2;
  const bodyBot = -4;
  const bodyMid = (bodyTop + bodyBot) / 2;
  const topW = bodyW * 0.42;
  const botW = bodyW * 0.55;
  const midW = bodyW * 0.58;

  // Body fill with gradient
  const bGrad = ctx.createLinearGradient(0, bodyTop, 0, bodyBot);
  bGrad.addColorStop(0, '#5A8AB5');
  bGrad.addColorStop(0.3, '#4A6B8A');
  bGrad.addColorStop(1, '#2C3E50');
  ctx.beginPath();
  ctx.moveTo(-topW, bodyTop);
  ctx.quadraticCurveTo(-midW, bodyMid, -botW, bodyBot);
  ctx.lineTo(botW, bodyBot);
  ctx.quadraticCurveTo(midW, bodyMid, topW, bodyTop);
  ctx.closePath();
  ctx.fillStyle = bGrad;
  ctx.fill();
  ctx.strokeStyle = '#1A2530';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── Specular highlight arc (upper-left of body) ──
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.beginPath();
  ctx.ellipse(-topW * 0.3, bodyTop + bodyH * 0.25, topW * 0.5, bodyH * 0.3, -0.2, -Math.PI * 0.4, Math.PI * 0.6);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();

  // ── Armor belt / stripe ──
  const beltY = bodyTop + bodyH * 0.45;
  const beltHalfW = topW + (botW - topW) * 0.45;
  ctx.fillStyle = '#D4A84B';
  ctx.beginPath();
  ctx.moveTo(-beltHalfW, beltY - 3);
  ctx.quadraticCurveTo(0, beltY - 5, beltHalfW, beltY - 3);
  ctx.lineTo(beltHalfW, beltY + 3);
  ctx.quadraticCurveTo(0, beltY + 1, -beltHalfW, beltY + 3);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#B8860B';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // ── Head: circle with avatar, slightly overlapping body top ──
  const headCy = bodyTop - headR + 5;

  // Head shadow behind (gives depth)
  ctx.beginPath();
  ctx.arc(1, headCy + 2, headR + 1, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fill();

  if (avatarImg) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, headCy, headR, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(avatarImg, -headR, headCy - headR, headR * 2, headR * 2);
    ctx.restore();
    // Border ring with gradient
    ctx.beginPath();
    ctx.arc(0, headCy, headR, 0, Math.PI * 2);
    ctx.strokeStyle = '#D4A84B';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // Rim highlight on head
    ctx.beginPath();
    ctx.arc(0, headCy, headR, -Math.PI * 0.8, -Math.PI * 0.1);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  } else {
    // Fallback head
    const hGrad = ctx.createRadialGradient(-3, headCy - 3, 0, 0, headCy, headR);
    hGrad.addColorStop(0, '#EAC85B');
    hGrad.addColorStop(1, '#B8860B');
    ctx.beginPath();
    ctx.arc(0, headCy, headR, 0, Math.PI * 2);
    ctx.fillStyle = hGrad;
    ctx.fill();
    ctx.strokeStyle = '#8B6508';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  ctx.restore();
}

function drawShadow() {
  if (state !== 'playing' && state !== 'jumping') return;
  const curPlat = platforms[currentPlatIdx];
  const nextPlat = platforms[currentPlatIdx + 1];
  const refPlat = (jumping && nextPlat) ? nextPlat : curPlat;
  if (!refPlat) return;
  const platH = refPlat.h;
  const shadowPos = toScreen(lpX, lpY, platH);

  const heightAbove = Math.max(0, lpZ - platH);
  const shadowScale = Math.max(0.3, 1 - heightAbove / 250);
  const shadowAlpha = Math.max(0.08, 0.5 * shadowScale);

  ctx.save();
  ctx.globalAlpha = shadowAlpha;
  // Soft shadow with radial gradient
  const sr = 18 * shadowScale;
  const sry = 7 * shadowScale;
  const sGrad = ctx.createRadialGradient(shadowPos.x, shadowPos.y + 2, 0, shadowPos.x, shadowPos.y + 2, sr);
  sGrad.addColorStop(0, 'rgba(0,0,0,0.7)');
  sGrad.addColorStop(0.6, 'rgba(0,0,0,0.3)');
  sGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.ellipse(shadowPos.x, shadowPos.y + 2, sr, sry, 0, 0, Math.PI * 2);
  ctx.fillStyle = sGrad;
  ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// Drawing: Power Meter (circular arc around character)
// ═══════════════════════════════════════════════════════════
function drawPowerBar() {
  if (!charging) return;

  const pos = toScreen(lpX, lpY, lpZ);
  const fill = chargePower / MAX_CHARGE;
  const radius = 38;
  const lineW = 4;
  const startAngle = -Math.PI * 0.5;
  const endAngle = startAngle + fill * Math.PI * 2;

  ctx.save();

  // Background ring (dim)
  ctx.beginPath();
  ctx.arc(pos.x, pos.y - 28, radius, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = lineW;
  ctx.stroke();

  // Colored arc — green to yellow to orange to red
  let arcColor;
  if (fill < 0.35) {
    arcColor = '#4CAF50';
  } else if (fill < 0.6) {
    arcColor = '#F1C40F';
  } else if (fill < 0.85) {
    arcColor = '#E67E22';
  } else {
    arcColor = '#E74C3C';
  }
  ctx.beginPath();
  ctx.arc(pos.x, pos.y - 28, radius, startAngle, endAngle);
  ctx.strokeStyle = arcColor;
  ctx.lineWidth = lineW;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Glow on the arc
  ctx.beginPath();
  ctx.arc(pos.x, pos.y - 28, radius, startAngle, endAngle);
  ctx.strokeStyle = arcColor;
  ctx.lineWidth = lineW + 4;
  ctx.globalAlpha = 0.2;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // At max power, pulse effect and shake hint
  if (fill > 0.95) {
    const pulse = Math.sin(_animTime * 100) * 0.3 + 0.5;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y - 28, radius + 4, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(231,76,60,${pulse})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Charge percentage text
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = arcColor;
  ctx.fillText(Math.round(fill * 100) + '%', pos.x, pos.y - 28 - radius - 10);

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// Drawing: HUD
// ═══════════════════════════════════════════════════════════
function drawHUD() {
  const st = screen.safeTop + 10;
  ctx.save();

  // Score
  ctx.font = 'bold 48px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.lineWidth = 4;
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.strokeText(score, W / 2, st);
  ctx.fillStyle = '#fff';
  ctx.fillText(score, W / 2, st);

  // Combo
  if (combo >= 2) {
    ctx.font = 'bold 18px sans-serif';
    ctx.fillStyle = COLORS.GOLD;
    ctx.fillText(`${combo}x COMBO`, W / 2, st + 54);
  }

  // Back button
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('< 返回', 16, st);

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// Drawing: Background (3D depth with gradient, mountains, grid)
// ═══════════════════════════════════════════════════════════
function drawBackground() {
  const season = getCurrentSeason();
  const cs = season.colorScheme;

  // ── Deep gradient sky (dark blue-purple at top, slightly lighter at bottom) ──
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0A0A2A');
  grad.addColorStop(0.3, cs.secondary || '#0B1929');
  grad.addColorStop(0.7, '#151535');
  grad.addColorStop(1, '#1E1E3A');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // ── Distant mountain silhouettes (faint, near top) ──
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#4A4A7A';
  const mBase = H * 0.28;
  ctx.beginPath();
  ctx.moveTo(0, mBase);
  ctx.lineTo(W * 0.08, mBase - 45);
  ctx.lineTo(W * 0.18, mBase - 20);
  ctx.lineTo(W * 0.30, mBase - 65);
  ctx.lineTo(W * 0.42, mBase - 30);
  ctx.lineTo(W * 0.55, mBase - 75);
  ctx.lineTo(W * 0.65, mBase - 40);
  ctx.lineTo(W * 0.78, mBase - 58);
  ctx.lineTo(W * 0.88, mBase - 25);
  ctx.lineTo(W, mBase - 50);
  ctx.lineTo(W, mBase);
  ctx.closePath();
  ctx.fill();
  // Second layer (slightly closer, lighter)
  ctx.globalAlpha = 0.04;
  ctx.fillStyle = '#6A6A9A';
  const m2Base = H * 0.34;
  ctx.beginPath();
  ctx.moveTo(0, m2Base);
  ctx.lineTo(W * 0.12, m2Base - 30);
  ctx.lineTo(W * 0.25, m2Base - 10);
  ctx.lineTo(W * 0.40, m2Base - 40);
  ctx.lineTo(W * 0.58, m2Base - 15);
  ctx.lineTo(W * 0.72, m2Base - 45);
  ctx.lineTo(W * 0.90, m2Base - 20);
  ctx.lineTo(W, m2Base - 35);
  ctx.lineTo(W, m2Base);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // ── Faint cloud wisps ──
  ctx.save();
  ctx.globalAlpha = 0.03;
  ctx.fillStyle = '#8888BB';
  for (let i = 0; i < 3; i++) {
    const cx = W * (0.2 + i * 0.3) + Math.sin(_animTime * 5 + i) * 15;
    const cy = H * 0.15 + i * 20;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 60 + i * 20, 8 + i * 3, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // ── Subtle isometric grid (ground plane reference) ──
  ctx.save();
  ctx.globalAlpha = 0.035;
  ctx.strokeStyle = '#8888CC';
  ctx.lineWidth = 0.5;
  const gridStep = 60;
  const ox = (camX * 0.3) % gridStep;
  const oy = (camY * 0.3) % gridStep;
  // Diagonal lines to suggest isometric ground
  for (let x = -gridStep * 2 + ox; x < W + gridStep * 2; x += gridStep) {
    ctx.beginPath();
    ctx.moveTo(x, H * 0.6);
    ctx.lineTo(x + H * 0.5, H);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, H * 0.6);
    ctx.lineTo(x - H * 0.5, H);
    ctx.stroke();
  }
  // Horizontal scanlines for floor
  ctx.globalAlpha = 0.02;
  for (let y = H * 0.65 + oy; y < H; y += gridStep * 0.5) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  ctx.restore();

  // ── Ground plane gradient at bottom (spatial reference) ──
  ctx.save();
  const floorGrad = ctx.createLinearGradient(0, H * 0.8, 0, H);
  floorGrad.addColorStop(0, 'rgba(30,30,60,0)');
  floorGrad.addColorStop(1, 'rgba(30,30,60,0.3)');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, H * 0.8, W, H * 0.2);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// Screen Shake
// ═══════════════════════════════════════════════════════════
function triggerShake(magnitude, decay) {
  shakeMag = magnitude;
  shakeDecay = decay || 15;
}

function updateShake(dt) {
  if (shakeMag > 0.1) {
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag *= Math.pow(0.001, dt / (1 / shakeDecay));
  } else {
    shakeX = 0;
    shakeY = 0;
    shakeMag = 0;
  }
}

// ═══════════════════════════════════════════════════════════
// Landing Logic
// ═══════════════════════════════════════════════════════════
function checkLanding() {
  const nextPlat = platforms[currentPlatIdx + 1];
  if (!nextPlat) return 'miss';

  const dx = lpX - nextPlat.wx;
  const dy = lpY - nextPlat.wy;
  const hw = nextPlat.w / 2;
  const hd = nextPlat.d / 2;

  if (Math.abs(dx) <= hw && Math.abs(dy) <= hd) {
    // On platform!
    const centerDist = Math.sqrt((dx / hw) ** 2 + (dy / hd) ** 2);
    if (centerDist <= 0.2) return 'perfect';
    if (centerDist <= 0.9) return 'normal';
    return 'edge';
  }
  return 'miss';
}

function handleLanding(result) {
  const nextPlat = platforms[currentPlatIdx + 1];

  if (result === 'miss') {
    // Fall!
    state = 'falling';
    falling = true;
    fallT = 0;
    fallStartZ = lpZ;
    if (audio) audio.playDeath();
    return;
  }

  // Landed!
  currentPlatIdx++;
  jumpCount++;
  nextPlat.landed = true;

  // Snap position
  lpZ = nextPlat.h;

  // Landing squish animation (scaleY briefly compresses then bounces back)
  lpScaleY = 0.65;
  _landSquishTimer = 0.25;

  // Score calculation
  let points = 1;
  let isPerfect = result === 'perfect';

  if (isPerfect) {
    combo++;
    points = Math.min(combo * 2, 30);
    if (nextPlat.type === 'buff') points *= 3;
  } else {
    combo = 0;
  }

  if (nextPlat.type === 'crystal') {
    points += 5;
  }

  score += points;

  // Effects
  const landPos = toScreen(nextPlat.wx, nextPlat.wy, nextPlat.h);

  if (isPerfect) {
    // Perfect landing: golden particle burst + screen flash
    particles.emit(landPos.x, landPos.y, {
      count: 25, speed: 140, life: 0.9, color: COLORS.GOLD, size: 4, gravity: 100
    });
    // Extra white flash particles
    particles.emit(landPos.x, landPos.y - 5, {
      count: 8, speed: 60, life: 0.4, color: '#fff', size: 3, gravity: 50
    });
    floatingText.add(landPos.x, landPos.y - 40, `PERFECT +${points}`, {
      color: COLORS.GOLD, size: 22, duration: 1.2
    });
    triggerShake(6, 20);
    if (audio) {
      audio.playScore();
      if (combo >= 2) audio.playCombo(Math.min(combo, 8));
    }
  } else if (result === 'edge') {
    // Edge landing: small dust
    particles.emit(landPos.x, landPos.y, {
      count: 4, speed: 40, life: 0.35, color: '#999', size: 2.5, gravity: 70
    });
    floatingText.add(landPos.x, landPos.y - 30, `+${points}`, {
      color: '#ccc', size: 16, duration: 0.8
    });
    triggerShake(2, 15);
    if (audio) audio.playHit();
  } else {
    // Normal landing: dust burst radiating outward
    particles.emit(landPos.x, landPos.y, {
      count: 8, speed: 90, life: 0.5, color: '#B0C4DE', size: 3, gravity: 90
    });
    // Secondary dust puffs
    particles.emit(landPos.x, landPos.y + 3, {
      count: 4, speed: 30, life: 0.6, color: 'rgba(200,210,230,0.6)', size: 4, gravity: -15
    });
    floatingText.add(landPos.x, landPos.y - 35, `+${points}`, {
      color: '#fff', size: 18, duration: 1
    });
    triggerShake(4, 18);
    if (audio) audio.playHit();
  }

  // Platform compress animation on land
  nextPlat.landAnim = -8;

  // Center camera
  centerCameraOnPlatform(nextPlat);

  // Generate next platform
  generateNextPlatform();

  // Clean old platforms (keep last 5)
  while (currentPlatIdx > 4) {
    platforms.shift();
    currentPlatIdx--;
  }

  // Reset character state — snap Lian Po to platform center for clean next jump
  jumping = false;
  lpX = nextPlat.wx;
  lpY = nextPlat.wy;
  lpRotation = 0;
  lpScaleY = 1;
  state = 'playing';
}

// ═══════════════════════════════════════════════════════════
// Jump Execution
// ═══════════════════════════════════════════════════════════
function executeJump() {
  if (chargePower < 0.05) {
    charging = false;
    chargeTime = 0;
    chargePower = 0;
    lpScaleY = 1;
    return;
  }

  const nextPlat = platforms[currentPlatIdx + 1];
  if (!nextPlat) return;

  // Direction to next platform
  const dxWorld = nextPlat.wx - lpX;
  const dyWorld = nextPlat.wy - lpY;
  const dirAngle = Math.atan2(dyWorld, dxWorld);

  // Jump distance based on charge
  const distance = BASE_DISTANCE + (MAX_DISTANCE - BASE_DISTANCE) * (chargePower / MAX_CHARGE);

  jumpStartX = lpX;
  jumpStartY = lpY;
  jumpStartZ = lpZ;
  jumpTargetX = lpX + Math.cos(dirAngle) * distance;
  jumpTargetY = lpY + Math.sin(dirAngle) * distance;
  jumpArcHeight = distance * ARC_HEIGHT_FACTOR;

  jumping = true;
  jumpT = 0;
  state = 'jumping';
  charging = false;
  chargeTime = 0;
  chargePower = 0;

  if (audio) audio.playStart();
}

// ═══════════════════════════════════════════════════════════
// Input Handling
// ═══════════════════════════════════════════════════════════
function handlePointerDown(x, y) {
  if (state === 'title') {
    // Check back button
    if (x < 80 && y < screen.safeTop + 40) {
      goToLobby();
      return;
    }
    startGame();
    return;
  }

  if (state === 'gameover') {
    // Replay button: drawn at cy+65, height 44, width 180
    const cy = H / 2;
    const btnY = cy + 65;
    const btnH = 44;
    if (y >= btnY && y <= btnY + btnH && x > W / 2 - 90 && x < W / 2 + 90) {
      startGame();
      return;
    }
    // Back to lobby: drawn at btnY + btnH + 20 area
    if (y >= btnY + btnH + 10 && y <= btnY + btnH + 45 && x > W / 2 - 60 && x < W / 2 + 60) {
      goToLobby();
      return;
    }
    return;
  }

  if (state === 'playing') {
    // Check back button
    if (x < 80 && y < screen.safeTop + 40) {
      goToLobby();
      return;
    }
    // Start charging
    charging = true;
    chargeTime = 0;
    chargePower = 0;
    state = 'playing'; // keep as playing, charge updates in update()
  }
}

function handlePointerUp(x, y) {
  if (charging && state === 'playing') {
    executeJump();
  }
}

// Mouse support
canvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  ensureAudio();
  const rect = canvas.getBoundingClientRect();
  const scale = rect.width / W;
  handlePointerDown(
    (e.clientX - rect.left) / scale,
    (e.clientY - rect.top) / scale
  );
});
canvas.addEventListener('mouseup', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scale = rect.width / W;
  handlePointerUp(
    (e.clientX - rect.left) / scale,
    (e.clientY - rect.top) / scale
  );
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  ensureAudio();
  const t = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const scale = rect.width / W;
  handlePointerDown(
    (t.clientX - rect.left) / scale,
    (t.clientY - rect.top) / scale
  );
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const scale = rect.width / W;
  handlePointerUp(
    (t.clientX - rect.left) / scale,
    (t.clientY - rect.top) / scale
  );
}, { passive: false });

// Prevent context menu
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ═══════════════════════════════════════════════════════════
// Game Flow
// ═══════════════════════════════════════════════════════════
function ensureAudio() {
  if (!audio) {
    audio = initAudio();
  }
}

function goToLobby() {
  if (audio) audio.stopBGM(0.5);
  window.location.href = '../../';
}

function startGame() {
  score = 0;
  combo = 0;
  jumpCount = 0;
  jumping = false;
  falling = false;
  charging = false;
  chargeTime = 0;
  chargePower = 0;
  lpRotation = 0;
  lpScaleY = 1;
  shakeMag = 0;

  initPlatforms();
  const first = platforms[0];
  lpX = first.wx;
  lpY = first.wy;
  lpZ = first.h;

  centerCameraOnPlatform(first);
  camX = camTargetX;
  camY = camTargetY;

  state = 'playing';
  particles.clear();

  if (audio) {
    audio.playBGM('hook');
    audio.playStart();
  }
}

function gameOver() {
  state = 'gameover';
  if (audio) {
    audio.stopBGM(1);
  }

  // Save score
  const pb = getPersonalBest(GAME_ID);
  const isNew = !pb || score > pb.score;
  if (score > 0) {
    addScore(GAME_ID, score, HERO_ID, '廉颇');
  }
  if (isNew && score > 0 && audio) {
    audio.playNewRecord();
  }
  bestScore = getPersonalBest(GAME_ID)?.score || 0;
}

// ═══════════════════════════════════════════════════════════
// Title Screen
// ═══════════════════════════════════════════════════════════
function drawTitle() {
  drawBackground();

  const breathe = Math.sin(titlePulse) * 0.03 + 1;

  ctx.save();

  // Title
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${Math.round(36 * breathe)}px sans-serif`;
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#000';
  ctx.strokeText('廉颇·正义蹦蹦', W / 2, H * 0.22);
  ctx.fillStyle = COLORS.GOLD;
  ctx.fillText('廉颇·正义蹦蹦', W / 2, H * 0.22);

  // Subtitle
  ctx.font = '14px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('王者荣耀 · 小游戏合集', W / 2, H * 0.22 + 32);

  // Avatar
  const avatarImg = getAvatarImage(HERO_ID);
  if (avatarImg) {
    const ax = W / 2, ay = H * 0.42;
    const ar = 45;
    ctx.save();
    ctx.beginPath();
    ctx.arc(ax, ay, ar, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(avatarImg, ax - ar, ay - ar, ar * 2, ar * 2);
    ctx.restore();
    ctx.beginPath();
    ctx.arc(ax, ay, ar, 0, Math.PI * 2);
    ctx.strokeStyle = COLORS.GOLD;
    ctx.lineWidth = 3;
    ctx.stroke();

    // Glow ring
    ctx.beginPath();
    ctx.arc(ax, ay, ar + 5, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(212,168,75,${0.3 + Math.sin(titlePulse * 2) * 0.15})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Hero name
  ctx.font = 'bold 20px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText('廉颇', W / 2, H * 0.42 + 60);
  ctx.font = '13px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('正义爆轰 · 坦克', W / 2, H * 0.42 + 82);

  // Personal best
  ctx.font = '16px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText(`最高分: ${bestScore}`, W / 2, H * 0.62);

  // How to play
  ctx.font = '13px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText('长按蓄力 · 松手跳跃 · 精准落地', W / 2, H * 0.70);

  // Start hint
  const hintAlpha = 0.5 + Math.sin(titlePulse * 3) * 0.3;
  ctx.font = 'bold 18px sans-serif';
  ctx.fillStyle = `rgba(212,168,75,${hintAlpha})`;
  ctx.fillText('点击任意位置开始', W / 2, H * 0.80);

  // Season
  const season = getCurrentSeason();
  ctx.font = '12px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText(`赛季: ${season.name}`, W / 2, H * 0.88);

  // Back button
  ctx.textAlign = 'left';
  ctx.font = '16px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('< 返回', 16, screen.safeTop + 10);

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// Game Over Screen
// ═══════════════════════════════════════════════════════════
function drawGameOver() {
  // Draw game scene underneath (frozen)
  drawBackground();
  drawScene();

  // Overlay
  ctx.save();
  ctx.globalAlpha = 0.75;
  ctx.fillStyle = '#1A1A2E';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  const cy = H / 2;

  // Title
  ctx.textAlign = 'center';
  ctx.font = 'bold 32px sans-serif';
  ctx.fillStyle = COLORS.GOLD;
  ctx.fillText('游戏结束', W / 2, cy - 80);

  // Score
  ctx.font = 'bold 56px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(formatScore(score), W / 2, cy - 20);

  // Best
  const pb = getPersonalBest(GAME_ID);
  const isNewRecord = pb && score >= pb.score && score > 0;
  ctx.font = '16px sans-serif';
  ctx.fillStyle = isNewRecord ? COLORS.GOLD : 'rgba(255,255,255,0.6)';
  ctx.fillText(
    isNewRecord ? `新纪录! 最高分: ${formatScore(bestScore)}` : `最高分: ${formatScore(bestScore)}`,
    W / 2, cy + 20
  );

  // Jump count
  ctx.font = '14px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(`跳跃次数: ${jumpCount}`, W / 2, cy + 45);

  // Replay button
  const btnW = 180, btnH = 44;
  const btnX = W / 2 - btnW / 2, btnY = cy + 65;
  ctx.fillStyle = COLORS.GOLD;
  drawRoundRect(ctx, btnX, btnY, btnW, btnH, 22);
  ctx.fill();
  ctx.font = 'bold 18px sans-serif';
  ctx.fillStyle = COLORS.DARK;
  ctx.fillText('再来一局', W / 2, btnY + btnH / 2);

  // Back to lobby
  ctx.font = '15px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('返回大厅', W / 2, btnY + btnH + 30);

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// Scene Drawing (platforms + character)
// ═══════════════════════════════════════════════════════════
function drawScene() {
  // Draw platforms from back to front (sort by wx+wy for painter's algo)
  const sorted = platforms
    .map((p, i) => ({ p, i }))
    .sort((a, b) => (a.p.wx + a.p.wy) - (b.p.wx + b.p.wy));

  for (const { p, i } of sorted) {
    const isCurrent = i === currentPlatIdx;
    const isNext = i === currentPlatIdx + 1;
    drawPlatform(p, isCurrent, isNext);
  }

  // Shadow
  drawShadow();

  // Lian Po (draw after platforms for correct layering)
  if (state !== 'gameover') {
    drawLianPo();
  }
}

// ═══════════════════════════════════════════════════════════
// Update
// ═══════════════════════════════════════════════════════════
function update(dt) {
  H = screen.height;

  if (state === 'title') {
    titlePulse += dt * 3; // smooth animation speed
    return;
  }

  if (state === 'gameover') {
    particles.update(dt);
    floatingText.update(dt);
    return;
  }

  // Charging
  if (charging && state === 'playing') {
    chargeTime += dt;
    chargePower = Math.min(chargeTime * CHARGE_RATE, MAX_CHARGE);

    // Squish effect (compress Y toward 0.6)
    lpScaleY = 1 - 0.4 * (chargePower / MAX_CHARGE);

    // Shake at high charge
    if (chargePower > MAX_CHARGE * 0.7) {
      const intensity = (chargePower - MAX_CHARGE * 0.7) / (MAX_CHARGE * 0.3);
      shakeMag = Math.max(shakeMag, intensity * 3);
    }

    // Platform compress
    const curPlat = platforms[currentPlatIdx];
    if (curPlat) {
      curPlat.landAnim = -5 * (chargePower / MAX_CHARGE);
    }

    // Charging dust particles rising from feet
    _chargeDustTimer += dt;
    if (_chargeDustTimer > 0.08 && chargePower > 0.3) {
      _chargeDustTimer = 0;
      const feetPos = toScreen(lpX, lpY, lpZ);
      particles.emit(feetPos.x + (Math.random() - 0.5) * 16, feetPos.y, {
        count: 1, speed: 15, life: 0.4,
        color: 'rgba(200,200,220,0.5)', size: 2, gravity: -40
      });
    }
  }

  // Jump animation
  if (state === 'jumping' && jumping) {
    jumpT += dt / JUMP_DURATION;

    if (jumpT >= 1) {
      jumpT = 1;
      lpX = jumpTargetX;
      lpY = jumpTargetY;

      // Check landing
      const result = checkLanding();
      handleLanding(result);
    } else {
      // Interpolate position
      lpX = jumpStartX + (jumpTargetX - jumpStartX) * jumpT;
      lpY = jumpStartY + (jumpTargetY - jumpStartY) * jumpT;

      // Parabolic arc
      const arcT = jumpT;
      lpZ = jumpStartZ + jumpArcHeight * 4 * arcT * (1 - arcT);

      // Somersault rotation
      lpRotation = jumpT * Math.PI * 2;

      // Stretch body while in air
      lpScaleY = 1 + 0.2 * Math.sin(jumpT * Math.PI);

      // Jump trail particles (fading circles along the arc)
      if (Math.random() < 0.6) {
        const pos = toScreen(lpX, lpY, lpZ);
        particles.emit(pos.x, pos.y + 5, {
          count: 1, speed: 8, life: 0.5,
          color: 'rgba(212,168,75,0.4)', size: 4, gravity: 15
        });
        // Secondary subtle trail
        if (Math.random() < 0.3) {
          particles.emit(pos.x + (Math.random() - 0.5) * 10, pos.y + 8, {
            count: 1, speed: 5, life: 0.3,
            color: 'rgba(180,200,220,0.3)', size: 2.5, gravity: 20
          });
        }
      }
    }
  }

  // Falling animation
  if (state === 'falling' && falling) {
    fallT += dt;
    lpZ = fallStartZ - fallT * fallT * 800; // accelerating fall

    if (fallT > 1.2) {
      falling = false;
      gameOver();
    }

    // Shrink while falling
    lpScaleY = Math.max(0.3, 1 - fallT * 0.5);
    lpRotation += dt * 8;
  }

  // Landing squish recovery (bounce back from 0.65 to 1.0)
  if (_landSquishTimer > 0 && !charging && !jumping && !falling) {
    _landSquishTimer -= dt;
    if (_landSquishTimer > 0.15) {
      // Still squishing phase
      lpScaleY = 0.65 + (0.35 * (1 - (_landSquishTimer - 0.15) / 0.10));
    } else if (_landSquishTimer > 0) {
      // Bounce back phase — slight overshoot to 1.05 then settle
      const t = 1 - _landSquishTimer / 0.15;
      lpScaleY = 1.0 + 0.08 * Math.sin(t * Math.PI);
    } else {
      lpScaleY = 1;
    }
  }

  // Platform land animation recovery
  for (const p of platforms) {
    if (p.landAnim !== 0 && !charging) {
      p.landAnim *= 0.85;
      if (Math.abs(p.landAnim) < 0.2) p.landAnim = 0;
    }
  }

  updateCamera(dt);
  updateShake(dt);
  particles.update(dt);
  floatingText.update(dt);
}

// ═══════════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════════
function render() {
  ctx.save();

  // Apply screen shake
  if (shakeMag > 0.1) {
    ctx.translate(shakeX, shakeY);
  }

  if (state === 'title') {
    drawTitle();
  } else if (state === 'gameover') {
    drawGameOver();
  } else {
    drawBackground();
    drawScene();
    drawPowerBar();
    particles.render(ctx);
    floatingText.render(ctx);
    drawHUD();
  }

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// Initialization
// ═══════════════════════════════════════════════════════════
async function init() {
  state = 'loading';

  // Draw loading
  ctx.fillStyle = '#1A1A2E';
  ctx.fillRect(0, 0, W, H);
  ctx.font = '18px sans-serif';
  ctx.fillStyle = COLORS.GOLD;
  ctx.textAlign = 'center';
  ctx.fillText('加载中...', W / 2, H / 2);

  // Load hero data
  await loadHeroList();
  await preloadAvatars([HERO_ID]);

  // Get personal best
  const pb = getPersonalBest(GAME_ID);
  bestScore = pb ? pb.score : 0;

  // Start game loop
  const loop = createGameLoop(update, render);
  loop.start();

  state = 'title';
}

init();
</script>
