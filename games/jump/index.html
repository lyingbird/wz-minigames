// ═══════════════════════════════════════════════════════════
// HUD Particle System (lightweight 2D)
// ═══════════════════════════════════════════════════════════
function emitHudParticles(sx, sy, opts = {}) {
  const count = opts.count || 10;
  const speed = opts.speed || 100;
  const life = opts.life || 0.8;
  const color = opts.color || '#D4A84B';
  const size = opts.size || 4;
  const gravity = opts.gravity || 0;
  for (let i = 0; i < count && hudParticles.length < MAX_HUD_PARTICLES; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = speed * (0.5 + Math.random() * 0.5);
    const l = life * (0.7 + Math.random() * 0.3);
    hudParticles.push({
      x: sx, y: sy,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: l, maxLife: l,
      color, size: size * (0.6 + Math.random() * 0.4),
      gravity
    });
  }
}

function addHudFloat(sx, sy, text, opts = {}) {
  hudFloats.push({
    x: sx, y: sy, text,
    color: opts.color || '#D4A84B',
    size: opts.size || 24,
    duration: opts.duration || 1,
    rise: opts.rise || 50,
    elapsed: 0
  });
}

function updateHud(dt) {
  // Particles
  for (let i = hudParticles.length - 1; i >= 0; i--) {
    const p = hudParticles[i];
    p.life -= dt;
    if (p.life <= 0) { hudParticles.splice(i, 1); continue; }
    p.vy += p.gravity * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }
  // Floats
  for (let i = hudFloats.length - 1; i >= 0; i--) {
    hudFloats[i].elapsed += dt;
    if (hudFloats[i].elapsed >= hudFloats[i].duration) hudFloats.splice(i, 1);
  }
}

function renderHudParticles() {
  const s = getHudScale();
  hudCtx.save();
  for (const p of hudParticles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    hudCtx.globalAlpha = alpha;
    hudCtx.fillStyle = p.color;
    hudCtx.beginPath();
    hudCtx.arc(p.x / s, p.y / s, p.size, 0, Math.PI * 2);
    hudCtx.fill();
  }
  hudCtx.restore();
}

function renderHudFloats() {
  const s = getHudScale();
  hudCtx.save();
  hudCtx.textAlign = 'center';
  hudCtx.textBaseline = 'middle';
  for (const item of hudFloats) {
    const t = item.elapsed / item.duration;
    const alpha = 1 - t;
    const yOff = item.rise * t;
    const scale = 1 + t * 0.3;
    hudCtx.globalAlpha = Math.max(0, alpha);
    hudCtx.font = `bold ${Math.round(item.size * scale)}px sans-serif`;
    const dx = item.x / s;
    const dy = item.y / s - yOff;
    hudCtx.lineWidth = 3;
    hudCtx.strokeStyle = '#1A1A2E';
    hudCtx.strokeText(item.text, dx, dy);
    hudCtx.fillStyle = item.color;
    hudCtx.fillText(item.text, dx, dy);
  }
  hudCtx.restore();
}

// ═══════════════════════════════════════════════════════════
// Heavy Slam Effects (3rd hit)
// ═══════════════════════════════════════════════════════════
function generateCrackLines(sx, sy) {
  const lines = [];
  const numLines = 8;
  for (let i = 0; i < numLines; i++) {
    const angle = (Math.PI * 2 / numLines) * i + Math.random() * 0.3;
    const length = 30 + Math.random() * 50;
    const midX = sx + Math.cos(angle) * length * 0.5 + (Math.random() - 0.5) * 10;
    const midY = sy + Math.sin(angle) * length * 0.5 + (Math.random() - 0.5) * 10;
    const endX = sx + Math.cos(angle) * length;
    const endY = sy + Math.sin(angle) * length;
    lines.push({ sx, sy, midX, midY, endX, endY });
  }
  return lines;
}

function renderGroundCrack(c, s) {
  if (crackTimer < 0) return;
  const alpha = Math.max(0, 1 - crackTimer * 2); // fade over 0.5s
  if (alpha <= 0) return;
  c.save();
  c.globalAlpha = alpha;
  for (const line of crackLines) {
    c.beginPath();
    c.moveTo(line.sx / s, line.sy / s);
    c.lineTo(line.midX / s, line.midY / s);
    c.lineTo(line.endX / s, line.endY / s);
    c.strokeStyle = 'rgba(255, 100, 50, 0.8)';
    c.lineWidth = 2;
    c.stroke();
  }
  c.restore();
}

function renderShockwave(c, s) {
  if (shockwaveTimer < 0) return;
  const radius = shockwaveTimer * 200;
  const alpha = Math.max(0, 1 - shockwaveTimer * 2);
  if (alpha <= 0) return;
  c.save();
  c.beginPath();
  c.arc(shockwaveX / s, shockwaveY / s, radius / s, 0, Math.PI * 2);
  c.strokeStyle = `rgba(255, 68, 0, ${alpha})`;
  c.lineWidth = 3;
  c.stroke();
  // Inner ring
  const innerAlpha = Math.max(0, alpha - 0.2);
  c.beginPath();
  c.arc(shockwaveX / s, shockwaveY / s, radius * 0.6 / s, 0, Math.PI * 2);
  c.strokeStyle = `rgba(255, 200, 50, ${innerAlpha})`;
  c.lineWidth = 2;
  c.stroke();
  c.restore();
}

function renderHitCycleHUD(c) {
  const W = DESIGN_WIDTH;
  const st = getSafeTop();
  const cy = st + 60; // below score
  const spacing = 22;
  const baseR = 7;

  c.save();
  c.textAlign = 'center';
  c.textBaseline = 'middle';

  for (let i = 0; i < 3; i++) {
    const cx = W / 2 + (i - 1) * spacing;
    const filled = i < hitCycle;
    const isThird = (i === 2);
    const isReady = (hitCycle === 2 && isThird);

    let r = baseR;
    // Pulse the 3rd circle when ready
    if (isReady) {
      r = baseR + Math.sin(_animTime * 8) * 3;
    }

    c.beginPath();
    c.arc(cx, cy, r, 0, Math.PI * 2);

    if (filled) {
      c.fillStyle = isThird ? '#FF3300' : COLORS.GOLD;
      c.fill();
    } else if (isReady) {
      // Pulsing red fill
      const pulse = 0.5 + Math.sin(_animTime * 8) * 0.3;
      c.fillStyle = `rgba(255, 51, 0, ${pulse})`;
      c.fill();
      c.strokeStyle = '#FF3300';
      c.lineWidth = 2;
      c.stroke();
      // Outer glow
      c.beginPath();
      c.arc(cx, cy, r + 4, 0, Math.PI * 2);
      c.strokeStyle = `rgba(255, 51, 0, ${pulse * 0.5})`;
      c.lineWidth = 1.5;
      c.stroke();
    } else {
      c.strokeStyle = 'rgba(255,255,255,0.3)';
      c.lineWidth = 1.5;
      c.stroke();
    }
  }

  // Label when 3rd hit ready
  if (hitCycle === 2) {
    const pulse = 0.6 + Math.sin(_animTime * 6) * 0.4;
    c.font = 'bold 11px sans-serif';
    c.fillStyle = `rgba(255, 68, 0, ${pulse})`;
    c.fillText('重锤!', W / 2, cy + 16);
  }

  c.restore();
}

function triggerHeavySlam(screenPos) {

  shockwaveY = screenPos.y;

  crackTimer = 0;
  crackX = screenPos.x;
  crackY = screenPos.y;
  crackLines = generateCrackLines(screenPos.x, screenPos.y);
  // Camera zoom
  cameraZoomTimer = 0;

    count: 35, speed: 180, life: 1.2, color: '#FF6633', size: 5, gravity: 120

    count: 20, speed: 100, life: 0.8, color: '#FFaa33', size: 3, gravity: 80

    count: 15, speed: 60, life: 0.6, color: '#fff', size: 3, gravity: 60

  // Floating text
  addHudFloat(screenPos.x, screenPos.y - 60, '天崩地裂!', {
    color: '#FFD700', size: 32, duration: 1.5, rise: 70
  });
  // Wobble ALL nearby platform meshes
  for (let i = 0; i < platformMeshes.length; i++) {
    platformMeshes[i].userData.landBounce = 0.4;
  }
  // Explosion sound
  if (audio) {
    if (audio.playExplosion) audio.playExplosion();
    else audio.playDeath(); // fallback
  }
}

// ═══════════════════════════════════════════════════════════
// Platform 3D Creation
// ═══════════════════════════════════════════════════════════
function createPlatformMesh(platData) {
  const group = new THREE.Group();
  const size = PLAT_SIZES[platData.type];
  const colors = PLAT_COLORS[platData.type];
  const isCylinder = (platData.type === 'buff' || platData.type === 'crystal');

  if (isCylinder) {
    // Cylinder platform
    const topR = platData.type === 'crystal' ? 0.6 : 0.5;
    const botR = platData.type === 'crystal' ? 0.8 : 0.5;
    const geo = new THREE.CylinderGeometry(topR, botR, size.h, 24);
    const mat = new THREE.MeshStandardMaterial({
      color: colors.color,
      metalness: 0.3,
      roughness: 0.7,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = size.h / 2;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);

    // Emissive glow ring on top
    const glowGeo = new THREE.TorusGeometry(topR * 0.7, 0.03, 8, 24);
    const glowMat = new THREE.MeshStandardMaterial({
      color: colors.color,
      emissive: colors.color,
      emissiveIntensity: 0.8,
      metalness: 0.1,
      roughness: 0.5,
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.y = size.h + 0.02;
    glow.rotation.x = Math.PI / 2;
    group.add(glow);
    group.userData.glowMesh = glow;
  } else {
    // Box platform
    const geo = new THREE.BoxGeometry(size.w, size.h, size.d);
    const mat = new THREE.MeshStandardMaterial({
      color: colors.color,
      metalness: 0.3,
      roughness: 0.7,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = size.h / 2;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);

    // Type-specific decorations
    if (platData.type === 'tower') {
      // Crenellations (small boxes on edges)
      const crenSize = 0.08;
      for (let i = 0; i < 4; i++) {
        const t = (i + 0.5) / 4;
        // Along x edge
        const cx = new THREE.Mesh(
          new THREE.BoxGeometry(crenSize, crenSize * 1.5, crenSize),
          new THREE.MeshStandardMaterial({ color: 0x5B7DB1, metalness: 0.4, roughness: 0.6 })
        );
        cx.position.set(-size.w / 2 + size.w * t, size.h + crenSize * 0.7, size.d / 2);
        cx.castShadow = true;
        group.add(cx);
        // Along z edge
        const cz = cx.clone();
        cz.position.set(size.w / 2, size.h + crenSize * 0.7, -size.d / 2 + size.d * t);
        group.add(cz);
      }
    }

    if (platData.type === 'barracks') {
      // Roof ridge line
      const ridgeGeo = new THREE.BoxGeometry(size.w * 0.9, 0.05, 0.05);
      const ridgeMat = new THREE.MeshStandardMaterial({ color: 0x4A6B4A, roughness: 0.8 });
      const ridge = new THREE.Mesh(ridgeGeo, ridgeMat);
      ridge.position.y = size.h + 0.03;
      group.add(ridge);
    }

    if (platData.type === 'jungle') {
      // Slight rotation for organic feel
      group.rotation.y = (Math.random() - 0.5) * 0.15;
      // Small rocks on top
      for (let i = 0; i < 3; i++) {
        const rockGeo = new THREE.SphereGeometry(0.06 + Math.random() * 0.04, 6, 5);
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x665544, roughness: 0.9 });
        const rock = new THREE.Mesh(rockGeo, rockMat);
        rock.position.set(
          (Math.random() - 0.5) * size.w * 0.6,
          size.h + 0.03,
          (Math.random() - 0.5) * size.d * 0.6
        );
        rock.castShadow = true;
        group.add(rock);
      }
    }
  }

  // Landing zone indicator (small disc on top)
  const lzGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.02, 16);
  const lzMat = new THREE.MeshStandardMaterial({
    color: 0xD4A84B,
    emissive: 0xD4A84B,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 0,
    metalness: 0.2,
    roughness: 0.5,
  });
  const lz = new THREE.Mesh(lzGeo, lzMat);
  lz.position.y = size.h + 0.02;
  group.add(lz);
  group.userData.landingZone = lz;

  // Position in world
  group.position.set(platData.wx, 0, platData.wz);
  group.userData.platData = platData;
  group.userData.baseY = 0;

  return group;
}

// ═══════════════════════════════════════════════════════════
// Platform Generation (game logic)
// ═══════════════════════════════════════════════════════════
function createPlatform(wx, wz, type) {
  return {
    wx, wz, h: PLAT_SIZES[type].h,
    w: PLAT_SIZES[type].w,
    d: PLAT_SIZES[type].d,
    type,
    landed: false,
    landAnim: 0,
    _dir: 0,
  };
}

function pickNextType(idx) {
  if ((idx + 1) % 10 === 0) return 'crystal';
  const r = Math.random();
  if (r < 0.35) return 'tower';
  if (r < 0.55) return 'barracks';
  if (r < 0.70) return 'buff';
  return 'jungle';
}

function generateNextPlatform() {
  const last = platforms[platforms.length - 1];
  const dir = Math.random() < 0.5 ? 1 : -1;
  const difficulty = Math.min(jumpCount / 30, 1);
  const gap = PLAT_MIN_GAP + Math.random() * (PLAT_MAX_GAP - PLAT_MIN_GAP) * (0.7 + difficulty * 0.3);

  let nx, nz;
  if (dir === 1) {
    nx = last.wx + gap;
    nz = last.wz;
  } else {
    nx = last.wx;
    nz = last.wz + gap;
  }

  const type = pickNextType(platforms.length);
  const plat = createPlatform(nx, nz, type);
  plat._dir = dir;
  platforms.push(plat);

  // Create 3D mesh
  const mesh = createPlatformMesh(plat);
  scene.add(mesh);
  platformMeshes.push(mesh);
}

function initPlatforms() {
  // Remove old meshes
  for (const m of platformMeshes) scene.remove(m);
  platforms = [];
  platformMeshes = [];

  const first = createPlatform(0, 0, 'tower');
  first.landed = true;
  platforms.push(first);

  const mesh = createPlatformMesh(first);
  scene.add(mesh);
  platformMeshes.push(mesh);

  generateNextPlatform();
}

// ═══════════════════════════════════════════════════════════
// Camera Control
// ═══════════════════════════════════════════════════════════
function centerCameraOnPlatform(p) {
  cameraTarget.set(p.wx, 0, p.wz);
}

function updateCamera(dt) {
  const currentTarget = new THREE.Vector3(
    camera.position.x - 10,
    0,
    camera.position.z - 10
  );
  currentTarget.lerp(cameraTarget, Math.min(1, 8 * dt));

  // Camera zoom effect for heavy slam
  let zoomOffset = 0;
  if (cameraZoomTimer >= 0 && cameraZoomTimer < 0.3) {
    // Quick zoom in then back out
    const t = cameraZoomTimer / 0.3;
    zoomOffset = Math.sin(t * Math.PI) * -1.5; // zoom in by reducing distance
  }

  // Screen shake for heavy slam
  let shakeX = 0, shakeY = 0;
  if (cameraZoomTimer >= 0 && cameraZoomTimer < 0.3) {
    const intensity = Math.max(0, 1 - cameraZoomTimer / 0.3) * 0.15;
    shakeX = (Math.random() - 0.5) * intensity;
    shakeY = (Math.random() - 0.5) * intensity;
  }

  camera.position.set(
    currentTarget.x + 10 + zoomOffset + shakeX,
    10 + shakeY,
    currentTarget.z + 10 + zoomOffset
  );
  camera.lookAt(currentTarget);

  // Update directional light to follow
  dirLight.position.set(currentTarget.x + 8, 15, currentTarget.z + 8);
  dirLight.target.position.copy(currentTarget);
  dirLight.target.updateMatrixWorld();

  // Update ground position to follow camera
  ground.position.set(currentTarget.x, -0.01, currentTarget.z);
}

// ═══════════════════════════════════════════════════════════
// Landing Logic
// ═══════════════════════════════════════════════════════════
function checkLanding() {
  const nextPlat = platforms[currentPlatIdx + 1];
  if (!nextPlat) return 'miss';

  const dx = lpX - nextPlat.wx;
  const dz = lpZ - nextPlat.wz;
  const hw = nextPlat.w / 2;
  const hd = nextPlat.d / 2;

  const isCylinder = (nextPlat.type === 'buff' || nextPlat.type === 'crystal');

  if (isCylinder) {
    const topR = nextPlat.type === 'crystal' ? 0.6 : 0.5;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist <= topR) {
      const centerDist = dist / topR;
      if (centerDist <= 0.3) return 'perfect';
      if (centerDist <= 0.8) return 'normal';
      return 'edge';
    }
    return 'miss';
  }

  if (Math.abs(dx) <= hw && Math.abs(dz) <= hd) {
    const centerDist = Math.sqrt((dx / hw) ** 2 + (dz / hd) ** 2);
    if (centerDist <= 0.2) return 'perfect';
    if (centerDist <= 0.9) return 'normal';
    return 'edge';
  }
  return 'miss';
}

// Project 3D world position to 2D screen for HUD effects
function worldToScreen(wx, wy, wz) {
  const v = new THREE.Vector3(wx, wy, wz);
  v.project(camera);
  return {
    x: (v.x * 0.5 + 0.5) * window.innerWidth,
    y: (-v.y * 0.5 + 0.5) * window.innerHeight
  };
}

function handleLanding(result) {
  const nextPlat = platforms[currentPlatIdx + 1];

  if (result === 'miss') {
    state = 'falling';
    falling = true;
    fallT = 0;
    fallStartY = lpY;
    hitCycle = 0; // Reset cycle on miss
    if (audio) audio.playDeath();
    return;
  }

  // Check if this is the heavy slam (3rd hit)
  const isHeavySlam = heavySlamActive;

  // Landed!
  currentPlatIdx++;
  jumpCount++;
  nextPlat.landed = true;
  lpY = nextPlat.h;

  // Landing squish (heavier on slam)
  lpScaleY = isHeavySlam ? 0.45 : 0.65;
  _landSquishTimer = isHeavySlam ? 0.4 : 0.25;

  // Score
  let points = 1;
  let isPerfect = result === 'perfect';

  if (isPerfect) {
    combo++;
    points = Math.min(combo * 2, 30);
    if (nextPlat.type === 'buff') points *= 3;
  } else {
    combo = 0;
  }
  if (nextPlat.type === 'crystal') points += 5;

  // Apply x3 multiplier for heavy slam!
  if (isHeavySlam) {
    points *= 3;
  }
  score += points;

  // Screen-space effects
  const screenPos = worldToScreen(nextPlat.wx, nextPlat.h + 0.5, nextPlat.wz);

  // Heavy slam effects (3rd hit)
  if (isHeavySlam) {
    triggerHeavySlam(screenPos);
    // Screen shake is handled via cameraZoomTimer in update
  }

  if (isPerfect) {
    emitHudParticles(screenPos.x, screenPos.y, {
      count: isHeavySlam ? 45 : 25, speed: isHeavySlam ? 200 : 140, life: isHeavySlam ? 1.2 : 0.9, color: COLORS.GOLD, size: isHeavySlam ? 5 : 4, gravity: 100
    });
    emitHudParticles(screenPos.x, screenPos.y - 5, {
      count: isHeavySlam ? 15 : 8, speed: 60, life: 0.4, color: '#fff', size: 3, gravity: 50
    });
    if (!isHeavySlam) {
      addHudFloat(screenPos.x, screenPos.y - 40, `PERFECT +${points}`, {
        color: COLORS.GOLD, size: 22, duration: 1.2
      });
    } else {
      addHudFloat(screenPos.x, screenPos.y - 30, `PERFECT x3 +${points}`, {
        color: '#FF4400', size: 26, duration: 1.4
      });
    }
    if (audio) {
      audio.playScore();
      if (combo >= 2) audio.playCombo(Math.min(combo, 8));
    }
  } else if (result === 'edge') {
    emitHudParticles(screenPos.x, screenPos.y, {
      count: isHeavySlam ? 12 : 4, speed: isHeavySlam ? 80 : 40, life: 0.35, color: isHeavySlam ? '#FF8844' : '#999', size: 2.5, gravity: 70
    });
    if (!isHeavySlam) {
      addHudFloat(screenPos.x, screenPos.y - 30, `+${points}`, {
        color: '#ccc', size: 16, duration: 0.8
      });
    }
    if (audio) audio.playHit();
  } else {
    emitHudParticles(screenPos.x, screenPos.y, {
      count: isHeavySlam ? 20 : 8, speed: isHeavySlam ? 140 : 90, life: 0.5, color: isHeavySlam ? '#FF6644' : '#B0C4DE', size: 3, gravity: 90
    });
    if (!isHeavySlam) {
      addHudFloat(screenPos.x, screenPos.y - 35, `+${points}`, {
        color: '#fff', size: 18, duration: 1
      });
    }
    if (audio) audio.playHit();
  }

  // Platform wobble (bounce via mesh scale) - bigger for slam
  const meshIdx = currentPlatIdx;
  if (platformMeshes[meshIdx]) {
    platformMeshes[meshIdx].userData.landBounce = isHeavySlam ? 0.6 : 0.3;
  }

  // Advance hit cycle
  hitCycle = (hitCycle + 1) % 3;

  // Turn off slam glow light
  if (slamGlowLight) slamGlowLight.intensity = 0;

  // Center camera
  centerCameraOnPlatform(nextPlat);

  // Generate next platform
  generateNextPlatform();

  // Clean old platforms
  while (currentPlatIdx > MAX_PLATFORMS - 3) {
    platforms.shift();
    const oldMesh = platformMeshes.shift();
    if (oldMesh) scene.remove(oldMesh);
    currentPlatIdx--;
  }

  // Reset character
  jumping = false;
  lpX = nextPlat.wx;
  lpZ = nextPlat.wz;
  lpRotation = 0;
  lpScaleY = 1;
  state = 'playing';
}

// ═══════════════════════════════════════════════════════════
// Jump Execution
// ═══════════════════════════════════════════════════════════
function executeJump() {
  if (chargePower < 0.05) {
    charging = false;
    chargeTime = 0;
    chargePower = 0;
    lpScaleY = 1;
    return;
  }

  const nextPlat = platforms[currentPlatIdx + 1];
  if (!nextPlat) return;

  const dxWorld = nextPlat.wx - lpX;
  const dzWorld = nextPlat.wz - lpZ;
  const dirAngle = Math.atan2(dzWorld, dxWorld);

  const distance = BASE_DISTANCE + (MAX_DISTANCE - BASE_DISTANCE) * (chargePower / MAX_CHARGE);

  jumpStartX = lpX;
  jumpStartY = lpY;
  jumpStartZ = lpZ;
  jumpTargetX = lpX + Math.cos(dirAngle) * distance;
  jumpTargetZ = lpZ + Math.sin(dirAngle) * distance;
  // 3rd hit: 1.3x arc height
  const arcMult = (hitCycle === 2) ? 1.3 : 1.0;
  jumpArcHeight = distance * ARC_HEIGHT_FACTOR * arcMult;

  jumping = true;
  jumpT = 0;
  state = 'jumping';
  heavySlamActive = (hitCycle === 2); // Mark if this is the heavy slam jump
  charging = false;
  chargeTime = 0;
  chargePower = 0;

  // Reset platform compress
  if (platformMeshes[currentPlatIdx]) {
    platformMeshes[currentPlatIdx].userData.landBounce = 0.15;
  }

  if (audio) audio.playStart();
}

// ═══════════════════════════════════════════════════════════
// Input Handling
// ═══════════════════════════════════════════════════════════
const DESIGN_W = 390;

function eventToDesign(clientX, clientY) {
  const scale = window.innerWidth / DESIGN_W;
  return {
    x: clientX / scale,
    y: clientY / scale
  };
}

function getSafeTop() {
  const style = getComputedStyle(document.documentElement);
  return (parseInt(style.getPropertyValue('--sat')) || 0) / getHudScale() + 10;
}

function handlePointerDown(clientX, clientY) {
  const { x, y } = eventToDesign(clientX, clientY);
  const designH = getDesignH();

  if (state === 'title') {
    if (x < 80 && y < getSafeTop() + 30) {
      goToLobby();
      return;
    }
    startGame();
    return;
  }

  if (state === 'gameover') {
    if (!gameOverReady) return;
    const cy = designH / 2;
    const btnY = cy + 65;
    const btnH = 44;
    if (y >= btnY && y <= btnY + btnH && x > DESIGN_W / 2 - 90 && x < DESIGN_W / 2 + 90) {
      startGame();
      return;
    }
    if (y >= btnY + btnH + 10 && y <= btnY + btnH + 45 && x > DESIGN_W / 2 - 60 && x < DESIGN_W / 2 + 60) {
      goToLobby();
      return;
    }
    return;
  }

  if (state === 'playing') {
    if (x < 80 && y < getSafeTop() + 30) {
      goToLobby();
      return;
    }
    charging = true;
    chargeTime = 0;
    chargePower = 0;
  }
}

function handlePointerUp() {
  if (charging && state === 'playing') {
    executeJump();
  }
}

// Mouse support
container.addEventListener('mousedown', (e) => {
  e.preventDefault();
  ensureAudio();
  handlePointerDown(e.clientX, e.clientY);
});
container.addEventListener('mouseup', (e) => {
  e.preventDefault();
  handlePointerUp();
});

// Touch support
container.addEventListener('touchstart', (e) => {
  e.preventDefault();
  ensureAudio();
  const t = e.changedTouches[0];
  handlePointerDown(t.clientX, t.clientY);
}, { passive: false });

container.addEventListener('touchend', (e) => {
  e.preventDefault();
  handlePointerUp();
}, { passive: false });

container.addEventListener('contextmenu', e => e.preventDefault());

// ═══════════════════════════════════════════════════════════
// Game Flow
// ═══════════════════════════════════════════════════════════
function ensureAudio() {
  if (!audio) {
    audio = initAudio();
  }
}

function goToLobby() {
  if (audio) audio.stopBGM(0.5);
  window.location.href = '../../';
}

function startGame() {
  score = 0;
  combo = 0;
  jumpCount = 0;
  jumping = false;
  falling = false;
  charging = false;
  chargeTime = 0;
  chargePower = 0;
  lpRotation = 0;
  lpScaleY = 1;
  hudFloats = [];
  hudParticles = [];
  hitCycle = 0;
  heavySlamActive = false;
  shockwaveTimer = -1;
  crackTimer = -1;
  cameraZoomTimer = -1;
  if (slamGlowLight) slamGlowLight.intensity = 0;

  initPlatforms();
  const first = platforms[0];
  lpX = first.wx;
  lpZ = first.wz;
  lpY = first.h;

  // Position character
  lianpo.position.set(lpX, first.h, lpZ);
  lianpo.visible = true;

  centerCameraOnPlatform(first);
  // Snap camera immediately
  camera.position.set(first.wx + 10, 10, first.wz + 10);
  camera.lookAt(new THREE.Vector3(first.wx, 0, first.wz));

  state = 'playing';

  if (audio) {
    audio.playBGM('hook');
    audio.playStart();
  }
}

function gameOver() {
  state = 'gameover';
  gameOverReady = false;
  gameOverRank = -1;
  if (audio) audio.stopBGM(1);

  async function handleGameOver() {
    if (score > 0 && isTopScore(GAME_ID, score)) {
      const name = await showNicknameInput(hudCanvas, score, '进入今日前5!');
      const result = addScore(GAME_ID, score, name);
      gameOverRank = result.rank;
    } else if (score > 0) {
      const result = addScore(GAME_ID, score, getPlayerName());
      gameOverRank = result.rank;
    }
    const pb = getPersonalBest(GAME_ID);
    const isNew = !bestScore || score > bestScore;
    bestScore = pb?.score || 0;
    if (isNew && score > 0 && audio) audio.playNewRecord();
    gameOverReady = true;
  }
  handleGameOver();
}

// ═══════════════════════════════════════════════════════════
// HUD Drawing Helpers
// ═══════════════════════════════════════════════════════════
function drawRoundRect(ctx, x, y, w, h, radius) {
  const r = Math.min(radius || 8, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ═══════════════════════════════════════════════════════════
// HUD: Title Screen
// ═══════════════════════════════════════════════════════════
function drawTitleHUD() {
  const s = getHudScale();
  const W = DESIGN_WIDTH;
  const H = getDesignH();
  const c = hudCtx;
  const breathe = Math.sin(titlePulse) * 0.03 + 1;

  // Semi-transparent backdrop
  c.save();
  c.globalAlpha = 0.7;
  c.fillStyle = '#0A0A2A';
  c.fillRect(0, 0, W, H);
  c.globalAlpha = 1;

  // Title
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.font = `bold ${Math.round(36 * breathe)}px sans-serif`;
  c.lineWidth = 4;
  c.strokeStyle = '#000';
  c.strokeText('廉颇·正义蹦蹦', W / 2, H * 0.22);
  c.fillStyle = COLORS.GOLD;
  c.fillText('廉颇·正义蹦蹦', W / 2, H * 0.22);

  // Subtitle
  c.font = '14px sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.5)';
  c.fillText('王者荣耀 · 小游戏合集', W / 2, H * 0.22 + 32);

  // Avatar
  const avatarImg = getAvatarImage(HERO_ID);
  if (avatarImg) {
    const ax = W / 2, ay = H * 0.42;
    const ar = 45;
    c.save();
    c.beginPath();
    c.arc(ax, ay, ar, 0, Math.PI * 2);
    c.clip();
    c.drawImage(avatarImg, ax - ar, ay - ar, ar * 2, ar * 2);
    c.restore();
    c.beginPath();
    c.arc(ax, ay, ar, 0, Math.PI * 2);
    c.strokeStyle = COLORS.GOLD;
    c.lineWidth = 3;
    c.stroke();

    c.beginPath();
    c.arc(ax, ay, ar + 5, 0, Math.PI * 2);
    c.strokeStyle = `rgba(212,168,75,${0.3 + Math.sin(titlePulse * 2) * 0.15})`;
    c.lineWidth = 2;
    c.stroke();

  // Hero name
  c.font = 'bold 20px sans-serif';
  c.fillStyle = '#fff';
  c.fillText('廉颇', W / 2, H * 0.42 + 60);
  c.font = '13px sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.5)';
  c.fillText('正义爆轰 · 坦克', W / 2, H * 0.42 + 82);

  // Personal best
  c.font = '16px sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.7)';
  c.fillText(`最高分: ${bestScore}`, W / 2, H * 0.62);

  // How to play
  c.font = '13px sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.4)';
  c.fillText('长按蓄力 · 松手跳跃 · 精准落地', W / 2, H * 0.70);

  // Start hint
  const hintAlpha = 0.5 + Math.sin(titlePulse * 3) * 0.3;
  c.font = 'bold 18px sans-serif';
  c.fillStyle = `rgba(212,168,75,${hintAlpha})`;
  c.fillText('点击任意位置开始', W / 2, H * 0.80);

  // Season
  const season = getCurrentSeason();
  c.font = '12px sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.3)';
  c.fillText(`赛季: ${season.name}`, W / 2, H * 0.88);

  // Back button
  c.textAlign = 'left';
  c.font = '16px sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.6)';
  c.fillText('< 返回', 16, getSafeTop());

  c.restore();

  // Score
  c.font = 'bold 48px sans-serif';
  c.fillStyle = '#fff';

  }

  c.fillText('再来一局', W / 2, btnY + btnH / 2);

  c.fillStyle = 'rgba(255,255,255,0.5)';

// ═══════════════════════════════════════════════════════════
// HUD: In-Game
// ═══════════════════════════════════════════════════════════
function drawGameHUD() {
  const W = DESIGN_WIDTH;
  const c = hudCtx;
  const st = getSafeTop();

  c.save();

  // Score
  c.font = 'bold 48px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'top';
  c.lineWidth = 4;
  c.strokeStyle = 'rgba(0,0,0,0.5)';
  c.strokeText(score, W / 2, st);
  c.fillStyle = '#fff';
  c.fillText(score, W / 2, st);

  // Combo (shifted down to make room for hit cycle indicator)
  if (combo >= 2) {
    c.font = 'bold 18px sans-serif';
    c.fillStyle = COLORS.GOLD;
    c.fillText(`${combo}x COMBO`, W / 2, st + 88);
  }

  // Back button
  c.font = '16px sans-serif';
  c.textAlign = 'left';
  c.fillStyle = 'rgba(255,255,255,0.6)';
  c.fillText('< 返回', 16, st);

  c.restore();

  // Power meter (2D arc on HUD)
  if (charging) {
    drawPowerMeter(c);
  }
}

function drawPowerMeter(c) {
  // Draw power ring at center-bottom area of screen
  const W = DESIGN_WIDTH;
  const H = getDesignH();

  // Project character position to screen
  const charScreen = worldToScreen(lpX, lpY + 0.5, lpZ);
  const s = getHudScale();
  const px = charScreen.x / s;
  const py = charScreen.y / s;

  const fill = chargePower / MAX_CHARGE;
  const radius = 38;
  const lineW = 4;
  const startAngle = -Math.PI * 0.5;
  const endAngle = startAngle + fill * Math.PI * 2;

  c.save();

  // Background ring
  c.beginPath();
  c.arc(px, py - 28, radius, 0, Math.PI * 2);
  c.strokeStyle = 'rgba(255,255,255,0.1)';
  c.lineWidth = lineW;
  c.stroke();

  // Color arc (all red on 3rd hit charge)
  let arcColor;
  if (hitCycle === 2) {
    const pulse = 0.7 + Math.sin(_animTime * 10) * 0.3;
    arcColor = `rgba(255, 34, 0, ${pulse})`;
  } else if (fill < 0.35) arcColor = '#4CAF50';
  else if (fill < 0.6) arcColor = '#F1C40F';
  else if (fill < 0.85) arcColor = '#E67E22';
  else arcColor = '#E74C3C';

  c.beginPath();
  c.arc(px, py - 28, radius, startAngle, endAngle);
  c.strokeStyle = arcColor;
  c.lineWidth = lineW;
  c.lineCap = 'round';
  c.stroke();

  // Glow
  c.beginPath();
  c.arc(px, py - 28, radius, startAngle, endAngle);
  c.strokeStyle = arcColor;
  c.lineWidth = lineW + 4;
  c.globalAlpha = 0.2;
  c.stroke();
  c.globalAlpha = 1;

  // Max power pulse
  if (fill > 0.95) {
    const pulse = Math.sin(_animTime * 100) * 0.3 + 0.5;
    c.beginPath();
    c.arc(px, py - 28, radius + 4, 0, Math.PI * 2);
    c.strokeStyle = `rgba(231,76,60,${pulse})`;
    c.lineWidth = 2;
    c.stroke();
  }

  // Percentage text
  c.font = 'bold 12px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = arcColor;
  c.fillText(Math.round(fill * 100) + '%', px, py - 28 - radius - 10);

  c.restore();
}

// ═══════════════════════════════════════════════════════════
// Update
// ═══════════════════════════════════════════════════════════
function update(dt) {
  _animTime += dt;

  if (state === 'title') {
    titlePulse += dt * 3;
    // Animate character idle on title
    lianpo.visible = false;
    return;
  }

  if (state === 'gameover') {
    updateHud(dt);
    return;
  }

  // Character visible
  lianpo.visible = true;

  // Charging
  if (charging && state === 'playing') {
    chargeTime += dt;
    chargePower = Math.min(chargeTime * CHARGE_RATE, MAX_CHARGE);

    // Squish body
    lpScaleY = 1 - 0.4 * (chargePower / MAX_CHARGE);

    // Platform compress during charge
    if (platformMeshes[currentPlatIdx]) {
      const compressAmt = 0.15 * (chargePower / MAX_CHARGE);
      platformMeshes[currentPlatIdx].scale.y = 1 - compressAmt;
    }

    // 3rd hit charge: RED GLOW effects
    if (hitCycle === 2) {
      const glowIntensity = 1.5 + Math.sin(_animTime * 10) * 0.8;
      if (slamGlowLight) {
        slamGlowLight.position.set(lpX, lpY + 0.5, lpZ);
        slamGlowLight.intensity = glowIntensity * (chargePower / MAX_CHARGE);
      }
      // Tint character materials toward red (via emissive)
      const redAmt = 0.3 * (chargePower / MAX_CHARGE);
      gemMat.emissiveIntensity = 0.7 + redAmt * 2;
      armorRedMat.emissiveIntensity = redAmt * 1.5;
      armorRedMat.emissive = armorRedMat.emissive || new THREE.Color();
      armorRedMat.emissive.setHex(0xFF2200);
      armorMat.emissiveIntensity = redAmt;
      armorMat.emissive = armorMat.emissive || new THREE.Color();
      armorMat.emissive.setHex(0xFF1100);
      // Emit red charging particles on HUD
      if (Math.random() < 0.3) {
        const charScreen = worldToScreen(lpX, lpY + 0.3, lpZ);
        emitHudParticles(charScreen.x, charScreen.y, {
          count: 1, speed: 30, life: 0.3, color: '#FF3300', size: 3, gravity: -50
        });
      }
    }
  } else {
    // Reset emissive when not charging 3rd hit
    if (slamGlowLight) slamGlowLight.intensity = 0;
    gemMat.emissiveIntensity = 0.7;
    armorRedMat.emissiveIntensity = 0;
    armorMat.emissiveIntensity = 0;
  }

  // Update slam effect timers
  if (shockwaveTimer >= 0) {
    shockwaveTimer += dt;
    if (shockwaveTimer > 0.5) shockwaveTimer = -1;
  }
  if (crackTimer >= 0) {
    crackTimer += dt;
    if (crackTimer > 0.5) crackTimer = -1;
  }
  if (cameraZoomTimer >= 0) {
    cameraZoomTimer += dt;
    if (cameraZoomTimer > 0.3) cameraZoomTimer = -1;
  }

  // Jump animation
  if (state === 'jumping' && jumping) {
    jumpT += dt / JUMP_DURATION;

    if (jumpT >= 1) {
      jumpT = 1;
      lpX = jumpTargetX;
      lpZ = jumpTargetZ;

      const result = checkLanding();
      handleLanding(result);
    } else {
      lpX = jumpStartX + (jumpTargetX - jumpStartX) * jumpT;
      lpZ = jumpStartZ + (jumpTargetZ - jumpStartZ) * jumpT;

      // Parabolic arc (Y is up in Three.js)
      const arcT = jumpT;
      lpY = jumpStartY + jumpArcHeight * 4 * arcT * (1 - arcT);

      // Somersault (full double flip on 3rd hit)
      const flipCount = heavySlamActive ? 2 : 1;
      lpRotation = jumpT * Math.PI * 2 * flipCount;

      // Stretch
      lpScaleY = 1 + 0.2 * Math.sin(jumpT * Math.PI);
    }
  }

  // Falling
  if (state === 'falling' && falling) {
    fallT += dt;
    lpY = fallStartY - fallT * fallT * 15;

    if (fallT > 1.2) {
      falling = false;
      gameOver();
    }

    lpScaleY = Math.max(0.3, 1 - fallT * 0.5);
    lpRotation += dt * 8;
  }

  // Landing squish recovery
  if (_landSquishTimer > 0 && !charging && !jumping && !falling) {
    _landSquishTimer -= dt;
    if (_landSquishTimer > 0.15) {
      lpScaleY = 0.65 + (0.35 * (1 - (_landSquishTimer - 0.15) / 0.10));
    } else if (_landSquishTimer > 0) {
      const t = 1 - _landSquishTimer / 0.15;
      lpScaleY = 1.0 + 0.08 * Math.sin(t * Math.PI);
    } else {
      lpScaleY = 1;
    }
  }

  // Update character mesh
  lianpo.position.set(lpX, lpY, lpZ);

  // Idle bob
  if (state === 'playing' && !charging && !jumping && !falling) {
    lianpo.position.y = lpY + Math.sin(_animTime * 3) * 0.02;
  }

  // Squish/stretch
  const scX = charging ? (1 + 0.15 * (chargePower / MAX_CHARGE)) : 1;
  body.scale.set(scX, lpScaleY, scX);
  head.position.y = 0.65 * lpScaleY;

  // Rotation (somersault around X axis for jump)
  if (jumping || falling) {
    lianpo.rotation.x = lpRotation;
    lianpo.rotation.y = 0;
    lianpo.rotation.z = 0;
  } else {
    lianpo.rotation.set(0, 0, 0);
  }

  // Platform land bounce animation
  for (let i = 0; i < platformMeshes.length; i++) {
    const mesh = platformMeshes[i];
    if (mesh.userData.landBounce) {
      mesh.userData.landBounce *= 0.88;
      if (mesh.userData.landBounce < 0.005) {
        mesh.userData.landBounce = 0;
        mesh.scale.y = 1;
      } else {
        mesh.scale.y = 1 - mesh.userData.landBounce * 0.5;
      }
    }
    // Restore platform compress after jump
    if (!charging && mesh.scale.y < 1 && !mesh.userData.landBounce) {
      mesh.scale.y += dt * 3;
      if (mesh.scale.y > 1) mesh.scale.y = 1;
    }
  }

  // Update landing zone visibility
  for (let i = 0; i < platformMeshes.length; i++) {
    const mesh = platformMeshes[i];
    const lz = mesh.userData.landingZone;
    if (lz) {
      const isNext = i === currentPlatIdx + 1;
      lz.material.opacity = isNext ? (0.4 + Math.sin(_animTime * 4) * 0.2) : 0;
    }
    // Glow animation for buff/crystal
    const glowMesh = mesh.userData.glowMesh;
    if (glowMesh) {
      glowMesh.material.emissiveIntensity = 0.5 + Math.sin(_animTime * 4) * 0.3;
    }
  }

  // Crystal platform rotation
  for (let i = 0; i < platforms.length; i++) {
    if (platforms[i].type === 'crystal' && platformMeshes[i]) {
      platformMeshes[i].rotation.y += dt * 0.5;
    }
  }

  updateCamera(dt);
  updateHud(dt);
}

// ═══════════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════════
function render() {
  // Clear HUD
  const hudW = DESIGN_WIDTH;
  const hudH = getDesignH();
  hudCtx.clearRect(0, 0, hudW, hudH);

  // Render 3D scene
  renderer.render(scene, camera);

  // Render HUD overlay
  hudCtx.save();
  // Scale HUD to design width
  const s = getHudScale();
  // HUD canvas is already scaled via setTransform, but we need design coords
  // setTransform was set to DPR scale. We need to add game design scale.
  hudCtx.setTransform(DPR * s, 0, 0, DPR * s, 0, 0);

  if (state === 'title') {
    drawTitleHUD();
  } else if (state === 'gameover') {
    drawGameOverHUD();
  } else {
    drawGameHUD();
    renderHitCycleHUD(hudCtx);
    renderGroundCrack(hudCtx, getHudScale());
    renderShockwave(hudCtx, getHudScale());
    renderHudParticles();
    renderHudFloats();
  }

  hudCtx.restore();
}

// ═══════════════════════════════════════════════════════════
// Window Resize
// ═══════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const aspect = w / h;

  camera.left = frustumSize * aspect / -2;
  camera.right = frustumSize * aspect / 2;
  camera.top = frustumSize / 2;
  camera.bottom = frustumSize / -2;
  camera.updateProjectionMatrix();

  renderer.setSize(w, h);
  resizeHud();
});

// ═══════════════════════════════════════════════════════════
// Initialization
// ═══════════════════════════════════════════════════════════
async function init() {
  state = 'loading';

  // Show loading on HUD
  hudCtx.save();
  const s = getHudScale();
  hudCtx.setTransform(DPR * s, 0, 0, DPR * s, 0, 0);
  hudCtx.fillStyle = '#1A1A2E';
  hudCtx.fillRect(0, 0, DESIGN_WIDTH, getDesignH());
  hudCtx.font = '18px sans-serif';
  hudCtx.fillStyle = COLORS.GOLD;
  hudCtx.textAlign = 'center';
  hudCtx.fillText('加载中...', DESIGN_WIDTH / 2, getDesignH() / 2);
  hudCtx.restore();

  // Load hero data
  await loadHeroList();
  await preloadAvatars([HERO_ID]);

  // Get personal best
  const pb = getPersonalBest(GAME_ID);
  bestScore = pb ? pb.score : 0;

  // Hide character initially
  lianpo.visible = false;

  // Set up initial scene with a platform for the background
  initPlatforms();
  centerCameraOnPlatform(platforms[0]);
  camera.position.set(platforms[0].wx + 10, 10, platforms[0].wz + 10);
  camera.lookAt(new THREE.Vector3(platforms[0].wx, 0, platforms[0].wz));

  // Start game loop
  const loop = createGameLoop(update, render);
  loop.start();

  state = 'title';
}

init();
</script>
